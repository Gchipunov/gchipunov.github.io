<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UNDC Dual Contouring Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">
        <h2>Unsigned Dual Contouring Concept</h2>
        <p>Visualizing intersecting "opposite" manifolds within a unit cell.</p>
    </div>
    <canvas id="glCanvas"></canvas>

<script id="vs" type="x-shader/x-vertex">#version 300 es
    in vec3 position;
    in vec3 normal;
    uniform mat4 modelViewMatrix;
    uniform mat4 projectionMatrix;
    out vec3 vNormal;
    out vec3 vPos;

    void main() {
        vNormal = normal;
        vPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
</script>

<script id="fs" type="x-shader/x-fragment">#version 300 es
    precision highp float;
    in vec3 vNormal;
    in vec3 vPos;
    out vec4 outColor;

    void main() {
        vec3 lightDir = normalize(vec3(1.0, 1.0, 2.0));
        float diff = max(dot(normalize(vNormal), lightDir), 0.2);
        
        // Color based on height to mimic the "two-neighbor" orange/purple split
        vec3 color = (vPos.y > 0.0) ? vec3(1.0, 0.6, 0.2) : vec3(0.7, 0.0, 0.5);
        
        outColor = vec4(color * diff, 1.0);
    }
</script>

<script>
/**
 * Simplified Geometry Generator 
 * Mimics the 'Tunnel' topology seen in UNDC papers
 */
const canvas = document.getElementById('glCanvas');
const gl = canvas.getContext('webgl2');

function createTunnelGeometry() {
    const vertices = [];
    const normals = [];
    const segments = 32;

    // We are mathematically generating the "Dual" surface of 
    // a saddle-like intersection (Scherk's Surface approximation)
    for (let i = 0; i <= segments; i++) {
        for (let j = 0; j <= segments; j++) {
            let u = (i / segments - 0.5) * 2.0;
            let v = (j / segments - 0.5) * 2.0;

            // Parametric function for the surface in the image
            // z = log(cos(x)/cos(y)) - simplified for visual match
            let x = u;
            let z = v;
            let y = 0.5 * Math.sin(x * Math.PI) * Math.cos(z * Math.PI);

            vertices.push(x, y, z);
            
            // Approximate Normals
            let nx = -Math.cos(x * Math.PI);
            let ny = 1.0;
            let nz = -Math.sin(z * Math.PI);
            let len = Math.sqrt(nx*nx + ny*ny + nz*nz);
            normals.push(nx/len, ny/len, nz/len);
        }
    }

    const indices = [];
    for (let i = 0; i < segments; i++) {
        for (let j = 0; j < segments; j++) {
            let row1 = i * (segments + 1);
            let row2 = (i + 1) * (segments + 1);
            indices.push(row1 + j, row1 + j + 1, row2 + j);
            indices.push(row1 + j + 1, row2 + j + 1, row2 + j);
        }
    }
    return { 
        position: new Float32Array(vertices), 
        normal: new Float32Array(normals), 
        index: new Uint16Array(indices) 
    };
}

// WebGL Setup Logic
function init() {
    const geo = createTunnelGeometry();
    
    const program = createProgram(gl, "vs", "fs");
    const vao = gl.createVertexArray();
    gl.bindVertexArray(vao);

    const posBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
    gl.bufferData(gl.ARRAY_BUFFER, geo.position, gl.STATIC_DRAW);
    const posLoc = gl.getAttribLocation(program, "position");
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 0, 0);

    const normBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, normBuf);
    gl.bufferData(gl.ARRAY_BUFFER, geo.normal, gl.STATIC_DRAW);
    const normLoc = gl.getAttribLocation(program, "normal");
    gl.enableVertexAttribArray(normLoc);
    gl.vertexAttribPointer(normLoc, 3, gl.FLOAT, false, 0, 0);

    const idxBuf = gl.createBuffer();
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, geo.index, gl.STATIC_DRAW);

    const mvLoc = gl.getUniformLocation(program, "modelViewMatrix");
    const prLoc = gl.getUniformLocation(program, "projectionMatrix");

    function render(time) {
        time *= 0.001;
        gl.clearColor(0.1, 0.1, 0.1, 1);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
        gl.enable(gl.DEPTH_TEST);

        const aspect = canvas.clientWidth / canvas.clientHeight;
        const pMat = perspective(45 * Math.PI / 180, aspect, 0.1, 100.0);
        
        let mvMat = lookAt([2, 2, 4], [0, 0, 0], [0, 1, 0]);
        mvMat = multiply(mvMat, rotateY(time));

        gl.useProgram(program);
        gl.uniformMatrix4fv(mvLoc, false, mvMat);
        gl.uniformMatrix4fv(prLoc, false, pMat);

        gl.bindVertexArray(vao);
        gl.drawElements(gl.TRIANGLES, geo.index.length, gl.UNSIGNED_SHORT, 0);
        requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
}

// --- Helper Math Functions (Matrix) ---
function createProgram(gl, vsId, fsId) {
    const vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, document.getElementById(vsId).text);
    gl.compileShader(vs);
    const fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs, document.getElementById(fsId).text);
    gl.compileShader(fs);
    const prog = gl.createProgram();
    gl.attachShader(prog, vs); gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    return prog;
}

function perspective(fov, aspect, near, far) {
    const f = 1.0 / Math.tan(fov / 2);
    return [f/aspect, 0, 0, 0, 0, f, 0, 0, 0, 0, (far+near)/(near-far), -1, 0, 0, (2*far*near)/(near-far), 0];
}

function lookAt(eye, center, up) {
    const z = normalizeVec(subtractVec(eye, center));
    const x = normalizeVec(crossVec(up, z));
    const y = crossVec(z, x);
    return [x[0], y[0], z[0], 0, x[1], y[1], z[1], 0, x[2], y[2], z[2], 0, -dotVec(x, eye), -dotVec(y, eye), -dotVec(z, eye), 1];
}

function rotateY(angle) {
    const c = Math.cos(angle), s = Math.sin(angle);
    return [c, 0, -s, 0, 0, 1, 0, 0, s, 0, c, 0, 0, 0, 0, 1];
}

function multiply(a, b) {
    let out = new Float32Array(16);
    for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
            out[i*4+j] = a[i*4+0]*b[0*4+j] + a[i*4+1]*b[1*4+j] + a[i*4+2]*b[2*4+j] + a[i*4+3]*b[3*4+j];
        }
    }
    return out;
}

function subtractVec(a, b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
function normalizeVec(a) { let l = Math.sqrt(a[0]*a[0]+a[1]*a[1]+a[2]*a[2]); return [a[0]/l, a[1]/l, a[2]/l]; }
function crossVec(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function dotVec(a, b) { return a[0]*b[0] + a[1]*b[1] + a[2]*b[2]; }

window.onload = init;
</script>
</body>
</html>
