<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL 2D Platformer with Fan</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 2px solid #555;
            background-color: #111;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .instructions { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="instructions">
        <strong>Controls:</strong> Left/Right Arrows to move, Up Arrow to jump.<br>
        <strong>Red:</strong> Player | <strong>Gray:</strong> Platforms | <strong>Cyan:</strong> Fan (Sucks from below, pushes from above)
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    // --- WEBGL SETUP ---
    const canvas = document.getElementById('gameCanvas');
    const gl = canvas.getContext('webgl');

    if (!gl) {
        alert('WebGL not supported in your browser.');
        throw new Error('WebGL not supported');
    }

    // Vertex Shader (converts pixel coordinates to WebGL clip space)
    const vsSource = `
        attribute vec2 a_position;
        uniform vec2 u_resolution;
        uniform vec2 u_position;
        uniform vec2 u_size;
        
        void main() {
            // Scale and translate the quad
            vec2 pixelPos = (a_position * u_size) + u_position;
            // Convert pixels to 0.0 to 1.0
            vec2 zeroToOne = pixelPos / u_resolution;
            // Convert 0.0->1.0 to -1.0->1.0
            vec2 zeroToTwo = zeroToOne * 2.0;
            vec2 clipSpace = zeroToTwo - 1.0;
            // Flip Y axis so 0 is at the top
            gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
        }
    `;

    // Fragment Shader (colors the shapes)
    const fsSource = `
        precision mediump float;
        uniform vec4 u_color;
        
        void main() {
            gl_FragColor = u_color;
        }
    `;

    // Compile Shader Function
    function compileShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('Shader compile error:', gl.getShaderInfoLog(shader));
            gl.deleteShader(shader);
            return null;
        }
        return shader;
    }

    const vertexShader = compileShader(gl, gl.VERTEX_SHADER, vsSource);
    const fragmentShader = compileShader(gl, gl.FRAGMENT_SHADER, fsSource);

    // Link Program
    const program = gl.createProgram();
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);
    gl.useProgram(program);

    // Look up locations
    const positionLocation = gl.getAttribLocation(program, "a_position");
    const resolutionLocation = gl.getUniformLocation(program, "u_resolution");
    const uPositionLocation = gl.getUniformLocation(program, "u_position");
    const uSizeLocation = gl.getUniformLocation(program, "u_size");
    const colorLocation = gl.getUniformLocation(program, "u_color");

    // Create a 1x1 unit quad buffer
    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    const positions = [
        0, 0,
        1, 0,
        0, 1,
        0, 1,
        1, 0,
        1, 1,
    ];
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

    // Setup viewport and common uniforms
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.uniform2f(resolutionLocation, canvas.width, canvas.height);

    function drawRect(x, y, w, h, color) {
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        gl.uniform2f(uPositionLocation, x, y);
        gl.uniform2f(uSizeLocation, w, h);
        gl.uniform4fv(colorLocation, color);

        gl.drawArrays(gl.TRIANGLES, 0, 6);
    }

    // --- GAME ENGINE & LOGIC ---

    const keys = { left: false, right: false, up: false };

    window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft') keys.left = true;
        if (e.code === 'ArrowRight') keys.right = true;
        if (e.code === 'ArrowUp') keys.up = true;
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowLeft') keys.left = false;
        if (e.code === 'ArrowRight') keys.right = false;
        if (e.code === 'ArrowUp') keys.up = false;
    });

    const player = {
        x: 50, y: 500, w: 24, h: 24,
        vx: 0, vy: 0,
        speed: 5, jumpPower: 12,
        onGround: false,
        color: [0.9, 0.2, 0.2, 1.0] // Red
    };

    const gravity = 0.6;
    const maxFallSpeed = 15;
    
    // Normal Platforms
    const platforms = [
        { x: 0, y: 580, w: 800, h: 20, color: [0.5, 0.5, 0.5, 1.0] },    // Floor
        { x: 100, y: 450, w: 150, h: 20, color: [0.6, 0.6, 0.6, 1.0] },  // Platform 1
        { x: 550, y: 350, w: 150, h: 20, color: [0.6, 0.6, 0.6, 1.0] },  // Platform 2
        { x: 50, y: 250, w: 150, h: 20, color: [0.6, 0.6, 0.6, 1.0] },   // Platform 3
    ];

    // The Fan (behaves as a platform for collision, but applies forces)
    const fan = { x: 350, y: 400, w: 100, h: 20, color: [0.0, 0.8, 1.0, 1.0] };
    
    // Treat the fan as a solid platform as well
    const allSolids = [...platforms, fan];

    function checkAABB(a, b) {
        return a.x < b.x + b.w &&
               a.x + a.w > b.x &&
               a.y < b.y + b.h &&
               a.y + a.h > b.y;
    }

    function update() {
        // 1. Horizontal Movement
        if (keys.left) player.vx = -player.speed;
        else if (keys.right) player.vx = player.speed;
        else player.vx = 0;

        player.x += player.vx;

        // Horizontal Collision
        for (let p of allSolids) {
            if (checkAABB(player, p)) {
                if (player.vx > 0) player.x = p.x - player.w; // Hit left edge
                else if (player.vx < 0) player.x = p.x + p.w; // Hit right edge
                player.vx = 0;
            }
        }

        // Screen boundaries (Horizontal)
        if (player.x < 0) player.x = 0;
        if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

        // 2. Vertical Movement & Gravity
        player.vy += gravity;
        
        // --- FAN LOGIC ---
        // Check if player is horizontally aligned with the fan
        if (player.x + player.w > fan.x && player.x < fan.x + fan.w) {
            
            // PUSH UP (Above the fan)
            if (player.y + player.h <= fan.y && player.y > fan.y - 300) {
                // Apply upward acceleration, stronger closer to the fan
                let distance = fan.y - (player.y + player.h);
                let force = 1.5 - (distance / 300) * 1.5;
                player.vy -= force;
            }
            
            // SUCK UP (Below the fan)
            if (player.y >= fan.y + fan.h && player.y < fan.y + fan.h + 250) {
                // Suction force combating gravity
                player.vy -= 1.2; 
            }
        }
        
        if (player.vy > maxFallSpeed) player.vy = maxFallSpeed;
        player.y += player.vy;

        // Vertical Collision
        player.onGround = false;
        for (let p of allSolids) {
            if (checkAABB(player, p)) {
                if (player.vy > 0) {
                    // Falling onto platform
                    player.y = p.y - player.h;
                    player.onGround = true;
                } else if (player.vy < 0) {
                    // Hitting head on bottom of platform/fan
                    player.y = p.y + p.h;
                }
                player.vy = 0;
            }
        }

        // Jumping
        if (keys.up && player.onGround) {
            player.vy = -player.jumpPower;
        }

        // Screen boundaries (Vertical reset if fall out of bounds)
        if (player.y > canvas.height) {
            player.x = 50;
            player.y = 500;
            player.vy = 0;
        }
    }

    function render() {
        // Clear canvas
        gl.clearColor(0.07, 0.07, 0.07, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT);

        // Draw Fan Airstream visual indicators (Transparent blue-ish rects)
        // Upstream
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        drawRect(fan.x, fan.y - 300, fan.w, 300, [0.0, 0.8, 1.0, 0.1]); 
        // Downstream (Suction)
        drawRect(fan.x, fan.y + fan.h, fan.w, 250, [0.0, 0.8, 1.0, 0.05]); 
        gl.disable(gl.BLEND);

        // Draw Platforms
        for (let p of platforms) {
            drawRect(p.x, p.y, p.w, p.h, p.color);
        }

        // Draw Fan Unit
        drawRect(fan.x, fan.y, fan.w, fan.h, fan.color);

        // Draw Player
        drawRect(player.x, player.y, player.w, player.h, player.color);
    }

    function loop() {
        update();
        render();
        requestAnimationFrame(loop);
    }

    // Start Game
    loop();

</script>
</body>
</html>
