<body class="spark-widget-shell app-layout" style="height: auto; overflow: visible;">
<script>
/**
 * Tank Terrain Simulator
 * Features: Procedural Deformable Terrain, Tank Physics, Projectile Craters, Mobile Controls
 */

const { state } = WH.createApp({
    title: "Tank Terrain Simulator",
    params: {
        seed: { value: 12345, min: 1, max: 99999, step: 1, label: "Terrain Seed" },
        roughness: { value: 0.8, min: 0.1, max: 2.0, step: 0.1, label: "Roughness" },
        reset: { type: 'button', label: 'Reset Terrain', onClick: (s) => { s.triggerReset = (s.triggerReset || 0) + 1; } }
    },
    internal_state: {
        triggerReset: 0,
        shells: 9999,
        fireRequested: false
    },
    sizing: { viz: { height: 400 } }
});

WH.initThree('viz', ({ scene, camera, renderer, controls, pointer }) => {
    // --- Constants & Assets ---
    const GRID_SIZE = 40;
    const GRID_RES = 64;
    const TERRAIN_COLOR = 0x556b2f; // Olive Drab
    const DIRT_COLOR = 0x8b4513;    // Saddle Brown
    const TANK_COLOR = 0x2f4f4f;    // Dark Slate Gray
    
    // --- Scene Setup ---
    scene.background = new THREE.Color(WH.getColor('--surface-container-low'));
    camera.position.set(25, 20, 25);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2.1;

    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x404040, 1.5));

    // --- Terrain System ---
    // A simplified deformable mesh approach (heightfield as a proxy for voxels)
    const geometry = new THREE.PlaneGeometry(GRID_SIZE, GRID_SIZE, GRID_RES - 1, GRID_RES - 1);
    geometry.rotateX(-Math.PI / 2);
    const material = new THREE.MeshStandardMaterial({ 
        color: TERRAIN_COLOR, 
        flatShading: true,
        roughness: 0.8
    });
    const terrain = new THREE.Mesh(geometry, material);
    terrain.receiveShadow = true;
    scene.add(terrain);

    const vertices = geometry.attributes.position.array;
    const originalHeights = new Float32Array(vertices.length / 3);

    const generateTerrain = () => {
        const s = state.seed / 1000;
        const r = state.roughness;
        for (let i = 0; i < originalHeights.length; i++) {
            const ix = i % GRID_RES;
            const iz = Math.floor(i / GRID_RES);
            const x = (ix / GRID_RES) * 10;
            const z = (iz / GRID_RES) * 10;
            
            // Simple deterministic noise
            const h = (Math.sin(x * r + s) * Math.cos(z * r + s * 1.1) + 
                      Math.sin(x * r * 0.5 - s * 0.5) * 0.5) * 3;
            
            originalHeights[i] = h;
            vertices[i * 3 + 1] = h;
        }
        geometry.attributes.position.needsUpdate = true;
        geometry.computeVertexNormals();
    };

    const applyDeformation = (point, radius, depth) => {
        let changed = false;
        for (let i = 0; i < originalHeights.length; i++) {
            const vx = vertices[i * 3];
            const vz = vertices[i * 3 + 2];
            const dx = vx - point.x;
            const dz = vz - point.z;
            const distSq = dx * dx + dz * dz;
            if (distSq < radius * radius) {
                const dist = Math.sqrt(distSq);
                const influence = 1 - (dist / radius);
                vertices[i * 3 + 1] -= influence * depth;
                changed = true;
            }
        }
        if (changed) {
            geometry.attributes.position.needsUpdate = true;
            geometry.computeVertexNormals();
        }
    };

    generateTerrain();

    // --- Tank Model ---
    const tankGroup = new THREE.Group();
    scene.add(tankGroup);

    const hull = new THREE.Mesh(
        new THREE.BoxGeometry(2.5, 0.8, 4),
        new THREE.MeshStandardMaterial({ color: TANK_COLOR })
    );
    hull.position.y = 0.4;
    hull.castShadow = true;
    tankGroup.add(hull);

    const turret = new THREE.Mesh(
        new THREE.BoxGeometry(1.5, 0.6, 1.8),
        new THREE.MeshStandardMaterial({ color: TANK_COLOR })
    );
    turret.position.y = 1.1;
    turret.castShadow = true;
    tankGroup.add(turret);

    const barrelPivot = new THREE.Group();
    barrelPivot.position.set(0, 1.1, 0.8);
    tankGroup.add(barrelPivot);

    const barrel = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, 2.5),
        new THREE.MeshStandardMaterial({ color: 0x111111 })
    );
    barrel.rotateX(Math.PI / 2);
    barrel.position.z = 1.25;
    barrelPivot.add(barrel);

    // --- Physics State ---
    let tankPos = new THREE.Vector3(0, 0, 0);
    let tankVel = 0;
    let tankRot = 0;
    let turretRot = 0;
    let barrelPitch = 0;
    let projectiles = [];

    const getTerrainHeight = (x, z) => {
        const ix = Math.floor(WH.map(x, -GRID_SIZE/2, GRID_SIZE/2, 0, GRID_RES-1));
        const iz = Math.floor(WH.map(z, -GRID_SIZE/2, GRID_SIZE/2, 0, GRID_RES-1));
        if (ix < 0 || ix >= GRID_RES || iz < 0 || iz >= GRID_RES) return 0;
        return vertices[(iz * GRID_RES + ix) * 3 + 1];
    };

    const fireShell = () => {
        if (state.shells <= 0) return;
        state.shells--;
        
        const shell = new THREE.Mesh(
            new THREE.SphereGeometry(0.15),
            new THREE.MeshBasicMaterial({ color: 0xffff00 })
        );
        
        // Direction from barrel
        const dir = new THREE.Vector3(0, 0, 1);
        dir.applyQuaternion(barrelPivot.quaternion);
        dir.applyQuaternion(tankGroup.quaternion);
        
        const startPos = new THREE.Vector3().setFromMatrixPosition(barrel.matrixWorld);
        shell.position.copy(startPos);
        
        projectiles.push({
            mesh: shell,
            vel: dir.multiplyScalar(25),
            life: 5
        });
        scene.add(shell);
    };

    // UI Feedback
    const updateHUD = () => {
        ui.setEditorial({
            hud: [
                { label: "Shells", value: state.shells.toString() },
                { label: "Status", value: "Ready" }
            ]
        });
    };

    // --- Loop ---
    return ({ time, dt, pointer }) => {
        // Handle Reset
        if (state.triggerReset !== this.lastReset) {
            generateTerrain();
            this.lastReset = state.triggerReset;
            state.shells = 10;
            updateHUD();
        }

        // Input Handling (WASD + Arrows)
        // Since we lack window listeners, we use pointer interactions for movement
        // Left half of screen = Joystick Drive, Right half = Aim
        const w = renderer.domElement.clientWidth;
        const h = renderer.domElement.clientHeight;
        
        if (pointer.isDown) {
            const ndcX = (pointer.x / w) * 2 - 1;
            const ndcY = -(pointer.y / h) * 2 + 1;

            if (ndcX < 0) {
                // Drive
                tankVel = WH.lerp(tankVel, ndcY * 8, dt * 5);
                tankRot -= ndcX * 2 * dt;
            } else {
                // Aim
                turretRot -= (ndcX - 0.5) * 4 * dt;
                barrelPitch = WH.clamp(barrelPitch + ndcY * dt, -0.2, 0.6);
            }
        } else {
            tankVel *= 0.95;
        }

        // Click/Tap to Fire (if on right side)
        if (pointer.isDown && !this.wasDown && pointer.x > w * 0.8) {
            fireShell();
            updateHUD();
        }
        this.wasDown = pointer.isDown;

        // Tank Physics
        tankGroup.rotation.y = tankRot;
        const moveX = Math.sin(tankRot) * tankVel * dt;
        const moveZ = Math.cos(tankRot) * tankVel * dt;
        
        tankPos.x += moveX;
        tankPos.z += moveZ;
        
        // Clamp to terrain bounds
        tankPos.x = WH.clamp(tankPos.x, -18, 18);
        tankPos.z = WH.clamp(tankPos.z, -18, 18);
        
        const groundY = getTerrainHeight(tankPos.x, tankPos.z);
        tankPos.y = WH.lerp(tankPos.y, groundY, dt * 10);
        tankGroup.position.copy(tankPos);

        // Adjust hull pitch based on slope
        const aheadY = getTerrainHeight(tankPos.x + Math.sin(tankRot)*0.5, tankPos.z + Math.cos(tankRot)*0.5);
        const pitch = Math.atan2(tankPos.y - aheadY, 0.5);
        hull.rotation.x = WH.lerp(hull.rotation.x, pitch, dt * 5);

        turret.rotation.y = turretRot;
        barrelPivot.rotation.y = turretRot;
        barrelPivot.rotation.x = -barrelPitch;

        // Projectile Physics
        for (let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];
            p.vel.y -= 9.8 * dt; // Gravity
            p.mesh.position.addScaledVector(p.vel, dt);
            p.life -= dt;

            const groundAtP = getTerrainHeight(p.mesh.position.x, p.mesh.position.z);
            if (p.mesh.position.y <= groundAtP || p.life < 0) {
                if (p.mesh.position.y <= groundAtP + 0.5) {
                    applyDeformation(p.mesh.position, 1.8, 0.8);
                }
                scene.remove(p.mesh);
                projectiles.splice(i, 1);
            }
        }

        controls.update();
    };
}, { height: 400 });

// Initialize HUD
ui.setEditorial({
    hud: [
        { label: "Shells", value: "10" },
        { label: "Control", value: "Tap/Drag" }
    ]
});
</script><div class="widget-container"><div class="widget-header"><div class="header-top"><h3 class="widget-title">Tank Terrain Simulator</h3><div class="primary-actions-container"><button class="primary-action-btn" title="Reset Terrain"><span class="material-icons">replay</span></button></div></div></div><div class="editorial-layout" id="editorial-layout"><div class="editorial-viz-panel"><div class="widget-ui-part viz-container grow relative overflow-hidden viz-full-height" id="viz" style="height: 400px;"><div class="viz-badges" id="viz-badges"></div><div class="viz-legend" id="viz-legend" style="display: none;"></div><canvas data-engine="three.js r146" class="viz-three-canvas" width="708" height="300" style="touch-action: none;"></canvas></div></div><div class="widget-dashboard" id="widget-dashboard"></div><div class="editorial-text-panel" id="editorial-text-panel" tabindex="0"><div class="editorial-hud" tabindex="0"><div class="editorial-hud-item"><span class="editorial-hud-label">Shells</span><span class="editorial-hud-value" style="color: inherit;">10</span></div><div class="editorial-hud-item"><span class="editorial-hud-label">Status</span><span class="editorial-hud-value" style="color: inherit;">Ready</span></div></div></div></div><div class="controls-root widget-ui-part p-m bg-surface w-full controls-grid" id="controls-root" style="--control-label-width: 92px;"><div class="controls-row row-slider" data-key="seed"><label class="controls-label" title="Terrain Seed" for="slider-0" id="slider-0-label">Terrain Seed</label><div class="slider-wrap"><input class="slider" type="range" min="1" max="99999" step="1" id="slider-0" style="--progress: 12.344246884937698%;"></div><input class="slider-input" type="number" min="1" max="99999" step="1" aria-labelledby="slider-0-label"></div><div class="controls-row row-slider" data-key="roughness"><label class="controls-label" title="Roughness" for="slider-1" id="slider-1-label">Roughness</label><div class="slider-wrap"><input class="slider" type="range" min="0.1" max="2" step="0.1" id="slider-1" style="--progress: 36.8421052631579%;"></div><input class="slider-input" type="number" min="0.1" max="2" step="0.1" aria-labelledby="slider-1-label"></div></div></div>
