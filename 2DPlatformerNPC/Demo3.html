<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebGL 2D Platformer - Mobile, Combat & Exploration</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
            overflow: hidden; 
            touch-action: none; 
        }
        #game-container {
            position: relative;
            width: 800px;
            max-width: 100vw;
            aspect-ratio: 4/3; 
        }
        canvas {
            width: 100%;
            height: 100%;
            background-color: #87CEEB;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }
        
        /* --- MOBILE UI CONTROLS --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; 
        }

        #joystick-base {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: auto;
            touch-action: none;
        }
        #joystick-stick {
            position: absolute;
            top: 35px;
            left: 35px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
        }

        .action-btns {
            position: absolute;
            bottom: 20px;
            right: 20px;
            pointer-events: auto;
            display: grid;
            grid-template-areas: 
                ". jump"
                "punch kick";
            gap: 15px;
        }
        .btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            touch-action: none;
        }
        .btn:active { background: rgba(255, 255, 255, 0.6); }
        
        #btn-jump { grid-area: jump; }
        #btn-punch { grid-area: punch; }
        #btn-kick { grid-area: kick; }

        p { margin-top: 10px; font-size: 14px; text-align: center; padding: 0 10px; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="ui-layer">
            <div id="joystick-base">
                <div id="joystick-stick"></div>
            </div>
            <div class="action-btns">
                <div class="btn" id="btn-jump">JUMP</div>
                <div class="btn" id="btn-punch">PUNCH</div>
                <div class="btn" id="btn-kick">KICK</div>
            </div>
        </div>
    </div>
    
    <p>Desktop: <b>Arrows</b> to Move/Climb/Jump, <b>Z</b> to Punch, <b>X</b> to Kick.</p>

<script>
    const canvas = document.getElementById("gameCanvas");
    const gl = canvas.getContext("webgl");

    if (!gl) alert("WebGL not supported in your browser.");

    // --- 1. WEBGL SHADERS ---
    const vertexShaderSource = `
        attribute vec2 a_position;
        uniform vec2 u_resolution;
        uniform vec2 u_translation;
        uniform vec2 u_scale;

        void main() {
            vec2 position = (a_position * u_scale) + u_translation;
            vec2 zeroToOne = position / u_resolution;
            vec2 zeroToTwo = zeroToOne * 2.0;
            vec2 clipSpace = zeroToTwo - 1.0;
            gl_Position = vec4(clipSpace, 0.0, 1.0);
        }
    `;

    const fragmentShaderSource = `
        precision mediump float;
        uniform vec4 u_color;
        void main() { gl_FragColor = u_color; }
    `;

    // --- 2. WEBGL SETUP ---
    function compileShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(shader));
        return shader;
    }

    const program = gl.createProgram();
    gl.attachShader(program, compileShader(gl, gl.VERTEX_SHADER, vertexShaderSource));
    gl.attachShader(program, compileShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource));
    gl.linkProgram(program);
    gl.useProgram(program);

    const positionLocation = gl.getAttribLocation(program, "a_position");
    const resolutionLocation = gl.getUniformLocation(program, "u_resolution");
    const colorLocation = gl.getUniformLocation(program, "u_color");
    const translationLocation = gl.getUniformLocation(program, "u_translation");
    const scaleLocation = gl.getUniformLocation(program, "u_scale");

    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0, 0, 1, 0, 0, 1, 0, 1, 1, 0, 1, 1]), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(positionLocation);
    gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
    gl.uniform2f(resolutionLocation, canvas.width, canvas.height);

    // --- 3. GAME STATE & WORLD MAP ---
    const gravity = -0.6;
    const friction = 0.8;
    const worldWidth = 1600;  // 2 Screens Wide
    const worldHeight = 1200; // 2 Screens Tall

    // Segmented Camera
    let camera = { x: 0, y: 0 };
    let targetCamera = { x: 0, y: 0 };

    const baseColor = [0.1, 0.5, 0.9, 1.0];
    const player = { 
        x: 100, y: 100, w: 32, h: 32, vx: 0, vy: 0, speed: 5, jumpPower: 12, 
        grounded: false, color: baseColor, facing: 1, attackTimer: 0, attackType: 0 
    };
    
    const npc = { x: 250, y: 100, w: 32, h: 32, vx: 0, vy: 0, speed: 2.5, jumpPower: 11, grounded: false, lastX: 250, color: [0.9, 0.2, 0.2, 1.0], facing: 1 };
    
    let enemies = [
        { x: 500, y: 180, w: 32, h: 32, vx: 0, vy: 0, speed: 2, dir: 1, grounded: false, color: [0.6, 0.1, 0.8, 1.0] },
        { x: 1000, y: 50, w: 32, h: 32, vx: 0, vy: 0, speed: 3, dir: -1, grounded: false, color: [0.6, 0.1, 0.8, 1.0] },
        { x: 300, y: 750, w: 32, h: 32, vx: 0, vy: 0, speed: 2, dir: 1, grounded: false, color: [0.6, 0.1, 0.8, 1.0] }
    ];

    const platforms = [
        // Screen 1 (Bottom Left)
        { x: 0, y: 0, w: 800, h: 50, color: [0.2, 0.6, 0.2, 1.0] },
        { x: 200, y: 150, w: 150, h: 20, color: [0.5, 0.3, 0.1, 1.0] },
        { x: 450, y: 250, w: 150, h: 20, color: [0.5, 0.3, 0.1, 1.0] },
        { x: 100, y: 350, w: 150, h: 20, color: [0.5, 0.3, 0.1, 1.0] },
        // Screen 2 (Bottom Right)
        { x: 800, y: 0, w: 800, h: 50, color: [0.2, 0.6, 0.2, 1.0] },
        { x: 900, y: 150, w: 300, h: 20, color: [0.5, 0.3, 0.1, 1.0] },
        { x: 1300, y: 300, w: 200, h: 20, color: [0.5, 0.3, 0.1, 1.0] },
        // Screen 3 (Top Left)
        { x: 0, y: 600, w: 300, h: 50, color: [0.2, 0.6, 0.2, 1.0] },
        { x: 450, y: 600, w: 350, h: 50, color: [0.2, 0.6, 0.2, 1.0] },
        { x: 200, y: 750, w: 150, h: 20, color: [0.5, 0.3, 0.1, 1.0] }
    ];

    // Ladders for climbing
    const ladders = [
        { x: 700, y: 50, w: 40, h: 550, color: [0.9, 0.5, 0.1, 1.0] } // Connects Bottom Left to Top Left
    ];

    let attackBox = null;

    // --- 4. INPUT LOGIC ---
    const keys = {};
    let joyX = 0, joyY = 0; 
    
    window.addEventListener("keydown", (e) => keys[e.code] = true);
    window.addEventListener("keyup", (e) => keys[e.code] = false);

    const joyBase = document.getElementById("joystick-base");
    const joyStick = document.getElementById("joystick-stick");
    let touchId = null;

    joyBase.addEventListener("touchstart", (e) => { e.preventDefault(); touchId = e.changedTouches[0].identifier; updateJoystick(e.changedTouches[0]); });
    joyBase.addEventListener("touchmove", (e) => { e.preventDefault(); for (let t of e.changedTouches) if (t.identifier === touchId) updateJoystick(t); });
    const resetJoystick = (e) => {
        e.preventDefault();
        for (let t of e.changedTouches) {
            if (t.identifier === touchId) {
                touchId = null; joyX = 0; joyY = 0;
                joyStick.style.transform = `translate(0px, 0px)`;
            }
        }
    };
    joyBase.addEventListener("touchend", resetJoystick);
    joyBase.addEventListener("touchcancel", resetJoystick);

    function updateJoystick(touch) {
        let rect = joyBase.getBoundingClientRect();
        let diffX = touch.clientX - (rect.left + rect.width / 2);
        let diffY = touch.clientY - (rect.top + rect.height / 2);
        let dist = Math.sqrt(diffX*diffX + diffY*diffY);
        let maxRadius = rect.width / 2 - 25; 
        
        if (dist > maxRadius) { diffX = (diffX / dist) * maxRadius; diffY = (diffY / dist) * maxRadius; }
        joyStick.style.transform = `translate(${diffX}px, ${diffY}px)`;
        
        joyX = diffX / maxRadius;
        joyY = -diffY / maxRadius; // Invert Y (up is positive in game world)
    }

    const bindBtn = (id, keyCode) => {
        let btn = document.getElementById(id);
        btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[keyCode] = true; });
        btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[keyCode] = false; });
    };
    bindBtn("btn-jump", "ArrowUp"); bindBtn("btn-punch", "KeyZ"); bindBtn("btn-kick", "KeyX");

    // --- 5. PHYSICS & LOGIC ---
    function checkAABB(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

    function updateEntity(ent) {
        let hitWall = false;

        // X-Axis
        ent.x += ent.vx;
        for (let p of platforms) {
            if (checkAABB(ent, p)) {
                if (ent.vx > 0) ent.x = p.x - ent.w; else if (ent.vx < 0) ent.x = p.x + p.w; 
                ent.vx = 0; hitWall = true;
            }
        }

        // Y-Axis
        ent.y += ent.vy;
        ent.grounded = false;
        for (let p of platforms) {
            if (checkAABB(ent, p)) {
                if (ent.vy > 0) { ent.y = p.y - ent.h; ent.vy = 0; } 
                else if (ent.vy < 0) { ent.y = p.y + p.h; ent.vy = 0; ent.grounded = true; }
            }
        }

        // World Bounds
        if (ent.x < 0) { ent.x = 0; ent.vx = 0; hitWall = true;}
        if (ent.x + ent.w > worldWidth) { ent.x = worldWidth - ent.w; ent.vx = 0; hitWall = true; }
        if (ent.y < 0) { ent.y = 0; ent.vy = 0; ent.grounded = true; } 
        if (ent.y + ent.h > worldHeight) { ent.y = worldHeight - ent.h; ent.vy = 0; }
        
        return hitWall;
    }

    function update() {
        // --- Player Movement ---
        let movingX = 0;
        if (keys["ArrowRight"]) movingX = 1;
        else if (keys["ArrowLeft"]) movingX = -1;
        else if (Math.abs(joyX) > 0.1) movingX = joyX;

        if (movingX !== 0) { player.vx = player.speed * movingX; player.facing = movingX > 0 ? 1 : -1; } 
        else { player.vx *= friction; }

        // --- Climbing Logic ---
        let onLadder = false;
        for (let l of ladders) if (checkAABB(player, l)) onLadder = true;

        if (onLadder) {
            player.vy = 0; // Disable gravity
            let climbingY = 0;
            if (keys["ArrowUp"]) climbingY = 1;
            else if (keys["ArrowDown"]) climbingY = -1;
            else if (Math.abs(joyY) > 0.1) climbingY = joyY;
            
            player.vy = climbingY * 4; // Climb speed
            player.grounded = true; // Allows jumping off ladder
        } else {
            player.vy += gravity; // Apply standard gravity
        }

        if (keys["ArrowUp"] && player.grounded && !onLadder) {
            player.vy = player.jumpPower; player.grounded = false;
        }

        // --- Combat Logic ---
        attackBox = null;
        if (player.attackTimer > 0) {
            player.attackTimer--;
            attackBox = {
                x: player.facing === 1 ? player.x + player.w : player.x - 20,
                y: player.attackType === 1 ? player.y + 16 : player.y + 4,
                w: 20, h: 12, color: player.attackType === 1 ? [1.0, 0.8, 0.0, 1.0] : [1.0, 0.5, 0.0, 1.0]
            };

            for (let i = enemies.length - 1; i >= 0; i--) {
                if (checkAABB(attackBox, enemies[i])) enemies.splice(i, 1);
            }
        } else {
            if (keys["KeyZ"]) { player.attackTimer = 15; player.attackType = 1; }
            else if (keys["KeyX"]) { player.attackTimer = 15; player.attackType = 2; }
        }

        // --- Camera Segment Transition ---
        targetCamera.x = Math.floor(player.x / canvas.width) * canvas.width;
        targetCamera.y = Math.floor(player.y / canvas.height) * canvas.height;
        camera.x += (targetCamera.x - camera.x) * 0.1; // Smooth glide
        camera.y += (targetCamera.y - camera.y) * 0.1;

        // --- NPC & Enemy AI ---
        if (npc.x < player.x - 40) { npc.vx = npc.speed; npc.facing = 1; }
        else if (npc.x > player.x + 40) { npc.vx = -npc.speed; npc.facing = -1; }
        else { npc.vx *= friction; }

        npc.vy += gravity;
        if (Math.abs(npc.vx) > 0.5 && Math.abs(npc.x - npc.lastX) < 0.1 && npc.grounded) {
            npc.vy = npc.jumpPower; npc.grounded = false;
        }
        npc.lastX = npc.x;

        player.color = baseColor;
        for (let e of enemies) {
            e.vy += gravity;
            e.vx = e.speed * e.dir;
            if (updateEntity(e) || (e.vx === 0 && !e.grounded)) e.dir *= -1; 
            if (checkAABB(player, e) && player.attackTimer === 0) player.color = [1.0, 0.0, 0.0, 1.0];
        }

        updateEntity(player);
        updateEntity(npc);
    }

    // --- 6. RENDERING ---
    function drawRect(x, y, w, h, color) {
        // Apply Camera Offset Here
        gl.uniform2f(translationLocation, x - camera.x, y - camera.y);
        gl.uniform2f(scaleLocation, w, h);
        gl.uniform4fv(colorLocation, color);
        gl.drawArrays(gl.TRIANGLES, 0, 6);
    }

    function drawCharacter(ent) {
        let x = ent.x, y = ent.y, col = ent.color, f = ent.facing || 1;
        
        // LEGS (Handle kicking animation)
        if (ent === player && player.attackTimer > 0 && player.attackType === 2) {
            drawRect(f === 1 ? x + 16 : x - 4, y + 4, 20, 6, col); // Stretched Kick Leg
            drawRect(x + 12, y, 8, 8, col); // Standing Leg
        } else {
            drawRect(x + 4, y, 8, 8, col); // Left Leg
            drawRect(x + 20, y, 8, 8, col); // Right Leg
        }
        
        // BODY
        drawRect(x + 6, y + 8, 20, 14, col);
        
        // HEAD & EYE
        drawRect(x + 8, y + 22, 16, 10, col);
        drawRect(f === 1 ? x + 18 : x + 10, y + 26, 4, 4, [1,1,1,1]); // White Eye indicating direction
        
        // ARMS (Handle punching animation)
        let armX = f === 1 ? x + 12 : x + 2;
        if (ent === player && player.attackTimer > 0 && player.attackType === 1) {
            drawRect(f === 1 ? x + 16 : x - 4, y + 12, 20, 6, col); // Stretched Punch Arm
        } else {
            drawRect(armX, y + 12, 18, 6, col); // Normal Arm
        }
    }

    function render() {
        gl.clearColor(0, 0, 0, 0);
        gl.clear(gl.COLOR_BUFFER_BIT);

        for (let p of platforms) drawRect(p.x, p.y, p.w, p.h, p.color);
        
        // Draw Ladders (with simple rungs)
        for (let l of ladders) {
            drawRect(l.x, l.y, l.w, l.h, l.color);
            for(let r = l.y + 10; r < l.y + l.h; r += 30) drawRect(l.x - 5, r, l.w + 10, 5, l.color);
        }

        // Draw basic blocks for enemies
        for (let e of enemies) drawRect(e.x, e.y, e.w, e.h, e.color);

        // Draw Anatomical Characters
        drawCharacter(npc);
        drawCharacter(player);

        if (attackBox) drawRect(attackBox.x, attackBox.y, attackBox.w, attackBox.h, attackBox.color);
    }

    function loop() { update(); render(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
