<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scrap & Salvage RTS</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            text-shadow: 1px 1px 2px #000;
            font-size: 16px;
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #aaa;
            font-size: 12px;
            pointer-events: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2>RESOURCES</h2>
        <div id="scrap-display">Scrap Metal: 0</div>
        <div id="shoe-display">Old Shoes: 0</div>
        <div id="glass-display">Broken Glass: 0</div>
    </div>

    <div id="instructions">
        <strong>Controls:</strong> Left-click a unit to select them. Right-click anywhere to order them to move/harvest.
    </div>

    <canvas id="glCanvas"></canvas>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 a_position;
        uniform vec2 u_resolution;
        uniform vec2 u_translation;
        uniform vec2 u_scale;
        void main() {
            vec2 scaledPosition = a_position * u_scale;
            vec2 position = scaledPosition + u_translation;
            vec2 zeroToOne = position / u_resolution;
            vec2 zeroToTwo = zeroToOne * 2.0;
            vec2 clipSpace = zeroToTwo - 1.0;
            gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
        }
    </script>

    <script id="fs" type="x-shader/x-fragment">
        precision mediump float;
        uniform vec4 u_color;
        void main() {
            gl_FragColor = u_color;
        }
    </script>

    <script>
        // --- Game State & Data ---
        const resources = { scrap: 0, shoes: 0, glass: 0 };
        const entities = [];
        let selectedEntity = null;

        const MAP_WIDTH = window.innerWidth;
        const MAP_HEIGHT = window.innerHeight;

        // --- Initialize WebGL ---
        const canvas = document.getElementById('glCanvas');
        canvas.width = MAP_WIDTH;
        canvas.height = MAP_HEIGHT;
        const gl = canvas.getContext('webgl');

        if (!gl) {
            alert('WebGL not supported by your browser!');
        }

        // Setup shaders and program
        const vsSource = document.getElementById('vs').text;
        const fsSource = document.getElementById('fs').text;

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);
        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Unable to initialize the shader program.');
        }

        gl.useProgram(program);

        // Look up uniform/attribute locations
        const positionLocation = gl.getAttribLocation(program, 'a_position');
        const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
        const translationLocation = gl.getUniformLocation(program, 'u_translation');
        const scaleLocation = gl.getUniformLocation(program, 'u_scale');
        const colorLocation = gl.getUniformLocation(program, 'u_color');

        // Provide resolution for ortho matrix math
        gl.uniform2f(resolutionLocation, MAP_WIDTH, MAP_HEIGHT);

        // Standard 1x1 2D quad buffer centered at origin
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
            -0.5, -0.5,
             0.5, -0.5,
            -0.5,  0.5,
            -0.5,  0.5,
             0.5, -0.5,
             0.5,  0.5,
        ]), gl.STATIC_DRAW);

        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        // --- Helper Drawing Function ---
        function drawQuad(x, y, width, height, r, g, b, a = 1.0) {
            gl.uniform2f(translationLocation, x, y);
            gl.uniform2f(scaleLocation, width, height);
            gl.uniform2f(resolutionLocation, canvas.width, canvas.height); 
            gl.uniform4f(colorLocation, r, g, b, a);
            gl.drawArrays(gl.TRIANGLES, 0, 6);
        }

        // --- Entity Class Definitions ---
        class Entity {
            constructor(x, y, w, h, color, type) {
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = h;
                this.color = color; // [r, g, b]
                this.type = type;
            }
            draw() {
                drawQuad(this.x, this.y, this.w, this.h, this.color[0], this.color[1], this.color[2], 1.0);
            }
        }

        class StaticStructure extends Entity {
            constructor(x, y, w, h, color, type) {
                super(x, y, w, h, color, type);
            }
        }

        class Worker extends Entity {
            constructor(x, y, type) {
                // Land worker is gray/yellow, boat worker is cyan
                let color = type === 'land' ? [0.8, 0.7, 0.2] : [0.0, 0.8, 0.9];
                super(x, y, 16, 16, color, type);
                this.targetX = x;
                this.targetY = y;
                this.speed = 2.0;
                this.inventory = { type: null, amount: 0 };
                this.capacity = 10;
                this.targetResource = null;
                this.targetShed = null;
                this.state = 'IDLE'; // IDLE, MOVING, HARVESTING, RETURNING
            }

            update() {
                // State Logic Loop
                if (this.state === 'HARVESTING' && this.targetResource) {
                    let dist = Math.hypot(this.targetResource.x - this.x, this.targetResource.y - this.y);
                    if (dist > 10) {
                        this.moveTo(this.targetResource.x, this.targetResource.y);
                    } else {
                        // Core requirement: Harvest specific items based on domain
                        this.inventory.amount += 0.1;
                        if (this.type === 'land') this.inventory.type = 'scrap';
                        if (this.type === 'boat') this.inventory.type = this.targetResource.type === 'river' ? 'shoes' : 'glass';

                        if (this.inventory.amount >= this.capacity) {
                            this.inventory.amount = this.capacity;
                            this.state = 'RETURNING';
                            this.targetShed = findClosestShed(this.x, this.y);
                        }
                    }
                }

                if (this.state === 'RETURNING' && this.targetShed) {
                    let dist = Math.hypot(this.targetShed.x - this.x, this.targetShed.y - this.y);
                    if (dist > 15) {
                        this.moveTo(this.targetShed.x, this.targetShed.y);
                    } else {
                        resources[this.inventory.type] += Math.floor(this.inventory.amount);
                        this.inventory.amount = 0;
                        this.inventory.type = null;
                        
                        if (this.targetResource) {
                            this.state = 'HARVESTING';
                        } else {
                            this.state = 'IDLE';
                        }
                    }
                }

                if (this.state === 'MOVING') {
                    let dist = Math.hypot(this.targetX - this.x, this.targetY - this.y);
                    if (dist > 2) {
                        this.moveTo(this.targetX, this.targetY);
                    } else {
                        this.state = 'IDLE';
                    }
                }
            }

            moveTo(tx, ty) {
                let dx = tx - this.x;
                let dy = ty - this.y;
                let angle = Math.atan2(dy, dx);
                
                // Constraints: Boat workers swim in water, Land workers stay on ground
                let nextX = this.x + Math.cos(angle) * this.speed;
                let nextY = this.y + Math.sin(angle) * this.speed;
                let targetTerrain = getTerrainAt(nextX, nextY);

                if (this.type === 'boat' && (targetTerrain === 'river' || targetTerrain === 'lake')) {
                    this.x = nextX;
                    this.y = nextY;
                } else if (this.type === 'land' && targetTerrain === 'land') {
                    this.x = nextX;
                    this.y = nextY;
                } else {
                    // Path blocked by terrain boundaries, stop moving
                    if(this.state === 'MOVING') this.state = 'IDLE';
                }
            }

            draw() {
                super.draw();
                // Draw selection ring if active
                if (selectedEntity === this) {
                    drawQuad(this.x, this.y - 12, 6, 6, 1.0, 0.0, 0.0, 1.0);
                }
                // Draw cargo cart/bag visually attached to unit
                if (this.inventory.amount > 0) {
                    drawQuad(this.x - 8, this.y + 8, 8, 8, 0.5, 0.4, 0.3, 1.0);
                }
            }
        }

        // --- Helper Algorithms ---
        function getTerrainAt(x, y) {
            // Check River zone
            if (x > MAP_WIDTH * 0.4 && x < MAP_WIDTH * 0.55) return 'river';
            // Check Lake zone
            if (Math.hypot(x - (MAP_WIDTH * 0.8), y - (MAP_HEIGHT * 0.35)) < 130) return 'lake';
            // Rest is land/landfill junk yard
            return 'land';
        }

        function findClosestShed(x, y) {
            return entities.filter(e => e.type === 'shed')
                .reduce((closest, current) => {
                    let d1 = Math.hypot(closest.x - x, closest.y - y);
                    let d2 = Math.hypot(current.x - x, current.y - y);
                    return d2 < d1 ? current : closest;
                });
        }

        // --- Map Initialization ---
        // Setup Static Environmental Zones and Buildings
        const junkyardLandfill = new StaticStructure(MAP_WIDTH * 0.15, MAP_HEIGHT * 0.5, MAP_WIDTH * 0.25, MAP_HEIGHT * 0.7, [0.25, 0.2, 0.18], 'landfill');
        const shed1 = new StaticStructure(MAP_WIDTH * 0.1, MAP_HEIGHT * 0.15, 60, 60, [0.6, 0.3, 0.2], 'shed');
        const shed2 = new StaticStructure(MAP_WIDTH * 0.7, MAP_HEIGHT * 0.75, 60, 60, [0.6, 0.3, 0.2], 'shed');

        entities.push(junkyardLandfill, shed1, shed2);

        // Resources Spawning
        // 1. Landfill Scrap Piles
        for (let i = 0; i < 6; i++) {
            entities.push(new StaticStructure(MAP_WIDTH * 0.08 + (i * 25), MAP_HEIGHT * 0.4 + (Math.random() * 150), 20, 20, [0.4, 0.4, 0.4], 'scrap_pile'));
        }
        // 2. River Shoes
        for (let i = 0; i < 4; i++) {
            entities.push(new StaticStructure(MAP_WIDTH * 0.45 + (Math.random()*30), MAP_HEIGHT * 0.2 + (i * 120), 12, 12, [0.54, 0.27, 0.07], 'river'));
        }
        // 3. Lake Broken Glass Bottles
        for (let i = 0; i < 4; i++) {
            let angle = Math.random() * Math.PI * 2;
            let radius = Math.random() * 60;
            entities.push(new StaticStructure(MAP_WIDTH * 0.8 + Math.cos(angle)*radius, MAP_HEIGHT * 0.35 + Math.sin(angle)*radius, 10, 10, [0.7, 0.9, 0.9], 'lake_glass'));
        }

        // Add Workers
        const worker1 = new Worker(MAP_WIDTH * 0.2, MAP_HEIGHT * 0.2, 'land');
        const worker2 = new Worker(MAP_WIDTH * 0.25, MAP_HEIGHT * 0.2, 'land');
        const boatWorker1 = new Worker(MAP_WIDTH * 0.48, MAP_HEIGHT * 0.1, 'boat');
        const boatWorker2 = new Worker(MAP_WIDTH * 0.78, MAP_HEIGHT * 0.35, 'boat');

        entities.push(worker1, worker2, boatWorker1, boatWorker2);

        // --- Interaction Handlers ---
        window.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (e.button === 0) { // Left Click: Select Unit
                selectedEntity = null;
                for (let ent of entities) {
                    if (ent instanceof Worker) {
                        if (Math.hypot(ent.x - mouseX, ent.y - mouseY) < 20) {
                            selectedEntity = ent;
                            break;
                        }
                    }
                }
            } else if (e.button === 2) { // Right Click: Give Commands
                e.preventDefault();
                if (selectedEntity && selectedEntity instanceof Worker) {
                    
                    // Check if player targeted a resource node
                    let targetNode = null;
                    for (let ent of entities) {
                        if (ent.type.includes('pile') || ent.type === 'river' || ent.type === 'lake_glass') {
                            if (Math.hypot(ent.x - mouseX, ent.y - mouseY) < 25) {
                                targetNode = ent;
                                break;
                            }
                        }
                    }

                    if (targetNode) {
                        // Filter out non-allowed harvesting tasks by environment
                        if (selectedEntity.type === 'land' && targetNode.type === 'scrap_pile') {
                            selectedEntity.targetResource = targetNode;
                            selectedEntity.state = 'HARVESTING';
                        } else if (selectedEntity.type === 'boat' && (targetNode.type === 'river' || targetNode.type === 'lake_glass')) {
                            selectedEntity.targetResource = targetNode;
                            selectedEntity.state = 'HARVESTING';
                        }
                    } else {
                        // Standard ground move order
                        selectedEntity.state = 'MOVING';
                        selectedEntity.targetX = mouseX;
                        selectedEntity.targetY = mouseY;
                        selectedEntity.targetResource = null;
                    }
                }
            }
        });

        // Suppress browser right click context menu
        window.addEventListener('contextmenu', e => e.preventDefault());

        // Adjust resolution matrix dynamically on resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        });

        // --- Core Engine Loop ---
        function loop() {
            // Clear Frame Buffers
            gl.clearColor(0.15, 0.3, 0.15, 1.0); // Default land grass color tint
            gl.clear(gl.COLOR_BUFFER_BIT);

            // 1. Draw Environment Underlays First
            // Render River
            drawQuad(MAP_WIDTH * 0.47, MAP_HEIGHT * 0.5, MAP_WIDTH * 0.15, MAP_HEIGHT, 0.1, 0.4, 0.7, 1.0);
            // Render Lake
            drawQuad(MAP_WIDTH * 0.8, MAP_HEIGHT * 0.35, 260, 260, 0.1, 0.4, 0.6, 1.0);

            // 2. Update & Draw Entities
            for (let ent of entities) {
                if (ent instanceof Worker) {
                    ent.update();
                }
                ent.draw();
            }

            // 3. Keep HUD Labels synchronous
            document.getElementById('scrap-display').innerText = `Scrap Metal: ${resources.scrap}`;
            document.getElementById('shoe-display').innerText = `Old Shoes: ${resources.shoes}`;
            document.getElementById('glass-display').innerText = `Broken Glass: ${resources.glass}`;

            requestAnimationFrame(loop);
        }

        // Fire Engine
        gl.viewport(0, 0, canvas.width, canvas.height);
        requestAnimationFrame(loop);

    </script>
</body>
</html>
