<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Hammer Editor</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        #ui-overlay { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 5px; }
        button { cursor: pointer; background: #444; color: white; border: 1px solid #666; padding: 5px 10px; margin-top: 10px; }
        button:hover { background: #555; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <h2>Web Hammer v0.1</h2>
    <p>Controls: Right-Click to Rotate | WASD to Move</p>
    <button onclick="addBrush()">Add Cube Brush</button>
    <button onclick="exportVMF()">Export .VMF (Console)</button>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

    let scene, camera, renderer, controls;
    let brushes = [];

    init();
    animate();

    function init() {
        // 1. Scene & Camera
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(200, 200, 200);

        // 2. Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 3. Grid Helper (The Hammer Grid)
        const size = 1024;
        const divisions = 64;
        const gridHelper = new THREE.GridHelper(size, divisions, 0x444444, 0x333333);
        scene.add(gridHelper);

        // 4. Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        // 5. Controls
        controls = new OrbitControls(camera, renderer.domElement);
        
        window.addEventListener('resize', onWindowResize, false);
    }

    window.addBrush = function() {
        const geometry = new THREE.BoxGeometry(64, 64, 64);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x888888, 
            wireframe: false,
            transparent: true,
            opacity: 0.8 
        });
        const cube = new THREE.Mesh(geometry, material);
        
        // Add wireframe overlay
        const geo = new THREE.EdgesGeometry(cube.geometry);
        const mat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
        const wireframe = new THREE.LineSegments(geo, mat);
        cube.add(wireframe);

        cube.position.y = 32; // Sit on grid
        scene.add(cube);
        brushes.push(cube);
    };

    window.exportVMF = function() {
        let vmfHeader = `versioninfo\n{\n\t"editorversion" "400"\n\t"formatversion" "100"\n}\nworld\n{\n\t"id" "1"\n\t"mapversion" "1"\n`;
        
        brushes.forEach((b, index) => {
            const pos = b.position;
            const s = 32; // Half-width
            // Simplified VMF Brush Logic (Generates a single solid block)
            vmfHeader += `\tsolid\n\t{\n\t\t"id" "${index + 2}"\n\t\t"side"\n\t\t{\n\t\t\t"plane" "(${pos.x-s} ${pos.y+s} ${pos.z+s}) (${pos.x+s} ${pos.y+s} ${pos.z+s}) (${pos.x+s} ${pos.y+s} ${pos.z-s})"\n\t\t\t"material" "TOOLS/TOOLSNODRAW"\n\t\t}\n\t\t// ... (Other 5 sides would go here)\n\t}\n`;
        });

        vmfHeader += `}`;
        console.log("Generated VMF (Partial):", vmfHeader);
        alert("Check console (F12) for VMF output. In a full app, this would download a .vmf file.");
    };

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
