<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web-Hammer Editor v0.2</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Courier New', monospace; }
        #container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff00; background: rgba(0,0,0,0.8); 
              padding: 20px; border: 1px solid #00ff00; z-index: 10; pointer-events: auto; }
        button { background: #222; color: #00ff00; border: 1px solid #00ff00; padding: 8px; cursor: pointer; margin-top: 10px; width: 100%; }
        button:hover { background: #00ff00; color: #000; }
    </style>
</head>
<body>

<div id="ui">
    <strong>WEB-HAMMER CONSOLE</strong><br>
    <small>Status: Renderer Active</small><hr>
    <button onclick="window.addBrush()">GENERATE BRUSH</button>
</div>

<div id="container"></div>

<script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    let scene, camera, renderer, controls;

    function init() {
        // 1. Scene Setup
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        // 2. Camera Setup
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(256, 256, 256);

        // 3. Renderer - Fixed for better compatibility
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        // 4. Pivot / Axis Lines (Hammer Style)
        // Red = X, Green = Y, Blue = Z
        const axesHelper = new THREE.AxesHelper(128); 
        scene.add(axesHelper);

        // 5. The Grid
        const grid = new THREE.GridHelper(1024, 32, 0x333333, 0x222222);
        scene.add(grid);

        // 6. Lighting
        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(1, 1, 1);
        scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

        // 7. Controls
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    // Global Exposure for UI Buttons
    window.addBrush = () => {
        const geo = new THREE.BoxGeometry(64, 64, 64);
        const mat = new THREE.MeshStandardMaterial({ color: 0x555555 });
        const mesh = new THREE.Mesh(geo, mat);
        
        // Wireframe overlay for that "Editor" look
        const wireGeo = new THREE.EdgesGeometry(geo);
        const wireMat = new THREE.LineBasicMaterial({ color: 0xffffff });
        const wireframe = new THREE.LineSegments(wireGeo, wireMat);
        
        mesh.add(wireframe);
        mesh.position.y = 32; // Align to grid floor
        scene.add(mesh);
    };

    // Run
    init();
</script>
</body>
</html>
