<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebGL Mobile Platformer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a2e;
            touch-action: none; /* Prevents default pull-to-refresh on mobile */
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: 120px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn:active {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="controls">
    <div class="btn-group">
        <div class="btn" id="btnLeft">⬅️</div>
        <div class="btn" id="btnRight">➡️</div>
    </div>
    <div class="btn-group">
        <div class="btn" id="btnDash">💨</div>
        <div class="btn" id="btnJump">⬆️</div>
    </div>
</div>

<script>
/** * 1. WEBGL BOILERPLATE & SHADERS 
 */
const canvas = document.getElementById('gameCanvas');
const gl = canvas.getContext('webgl', { alpha: false });

const vertexShaderSource = `
    attribute vec2 a_position;
    uniform vec2 u_resolution;
    uniform vec2 u_translation;
    uniform vec2 u_scale;
    void main() {
        vec2 scaledPosition = a_position * u_scale;
        vec2 position = scaledPosition + u_translation;
        vec2 zeroToOne = position / u_resolution;
        vec2 zeroToTwo = zeroToOne * 2.0;
        vec2 clipSpace = zeroToTwo - 1.0;
        gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
    }
`;

const fragmentShaderSource = `
    precision mediump float;
    uniform vec4 u_color;
    void main() {
        gl_FragColor = u_color;
    }
`;

function createShader(gl, type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
    }
    return shader;
}

const program = gl.createProgram();
gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vertexShaderSource));
gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource));
gl.linkProgram(program);
gl.useProgram(program);

// Lookups
const positionLocation = gl.getAttribLocation(program, "a_position");
const resolutionLocation = gl.getUniformLocation(program, "u_resolution");
const colorLocation = gl.getUniformLocation(program, "u_color");
const translationLocation = gl.getUniformLocation(program, "u_translation");
const scaleLocation = gl.getUniformLocation(program, "u_scale");

// Unit quad buffer (0 to 1)
const positionBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
    0, 0,  1, 0,  0, 1,
    0, 1,  1, 0,  1, 1,
]), gl.STATIC_DRAW);

gl.enableVertexAttribArray(positionLocation);
gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

// Helper to draw rectangles
function drawRect(x, y, width, height, color) {
    gl.uniform2f(translationLocation, x, y);
    gl.uniform2f(scaleLocation, width, height);
    gl.uniform4f(colorLocation, color[0], color[1], color[2], color[3]);
    gl.drawArrays(gl.TRIANGLES, 0, 6);
}

/** * 2. GAME LOGIC & STATE 
 */
let width, height;
function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    gl.viewport(0, 0, width, height);
}
window.addEventListener('resize', resize);
resize();

// Input State
const keys = { left: false, right: false, jump: false, dash: false };

// Player State
const player = {
    x: width / 2, y: 100, w: 30, h: 30,
    vx: 0, vy: 0,
    speed: 5, jumpForce: 12, gravity: 0.6,
    isGrounded: false,
    dashTimer: 0, dashCooldown: 0, dashDuration: 15, dashSpeed: 15,
    facingRight: true
};

// Level design
const platforms = [
    { x: 0, y: height - 50, w: width * 2, h: 50 }, // Ground
    { x: 100, y: height - 150, w: 150, h: 20 },
    { x: width/2 - 50, y: height - 250, w: 150, h: 20 },
    { x: width - 200, y: height - 350, w: 150, h: 20 }
];

// Wind Particles
let particles = [];
function spawnWindTwirl(px, py, isDashing) {
    const pCount = isDashing ? 3 : 1; // Thicker effect when dashing
    for(let i=0; i<pCount; i++) {
        particles.push({
            angle: Math.random() * Math.PI * 2,
            radius: 20 + Math.random() * 20,
            yOffset: (Math.random() - 0.5) * 40,
            speed: 0.15 + Math.random() * 0.1, // Rotation speed
            life: 1.0,
            decay: 0.03 + Math.random() * 0.02
        });
    }
}

/** * 3. CONTROLS 
 */
function bindBtn(id, key) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; }, {passive: false});
    btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; }, {passive: false});
    btn.addEventListener('mousedown', () => keys[key] = true);
    btn.addEventListener('mouseup', () => keys[key] = false);
    btn.addEventListener('mouseleave', () => keys[key] = false);
}
bindBtn('btnLeft', 'left');
bindBtn('btnRight', 'right');
bindBtn('btnJump', 'jump');
bindBtn('btnDash', 'dash');

// Keyboard fallback for desktop testing
window.addEventListener('keydown', e => {
    if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
    if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
    if(e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.jump = true;
    if(e.code === 'ShiftLeft' || e.code === 'KeyZ') keys.dash = true;
});
window.addEventListener('keyup', e => {
    if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    if(e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.jump = false;
    if(e.code === 'ShiftLeft' || e.code === 'KeyZ') keys.dash = false;
});

/** * 4. MAIN LOOP 
 */
function update() {
    // --- Physics & Input ---
    player.vy += player.gravity; // Gravity

    // Dash Logic
    if (player.dashCooldown > 0) player.dashCooldown--;
    if (player.dashTimer > 0) {
        player.dashTimer--;
        player.vy = 0; // Freeze Y during dash
        player.vx = player.facingRight ? player.dashSpeed : -player.dashSpeed;
        spawnWindTwirl(player.x, player.y, true); // DASH TWIRL
    } else {
        // Normal Movement
        if (keys.left) { player.vx = -player.speed; player.facingRight = false; }
        else if (keys.right) { player.vx = player.speed; player.facingRight = true; }
        else { player.vx = 0; }

        // Jump Logic
        if (keys.jump && player.isGrounded) {
            player.vy = -player.jumpForce;
            player.isGrounded = false;
        }

        // Trigger Dash
        if (keys.dash && player.dashCooldown <= 0) {
            player.dashTimer = player.dashDuration;
            player.dashCooldown = 60; // 1 second cooldown
        }
    }

    // Jump Twirl Effect (if moving up)
    if (player.vy < -2 && player.dashTimer <= 0) {
        spawnWindTwirl(player.x, player.y, false);
    }

    // Apply Velocity
    player.x += player.vx;
    player.y += player.vy;

    // --- Collision Detection (AABB) ---
    player.isGrounded = false;
    for (let p of platforms) {
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y + player.h > p.y && player.y < p.y + p.h) {
            
            // Resolve collision (simplistic top-down bias)
            if (player.vy > 0 && player.y + player.h - player.vy <= p.y) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.isGrounded = true;
            } else if (player.vy < 0 && player.y - player.vy >= p.y + p.h) {
                player.y = p.y + p.h;
                player.vy = 0; // Hit head
            }
        }
    }

    // Screen bounds
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > width) player.x = width - player.w;
    if (player.y > height) { player.y = 100; player.vy = 0; } // Respawn if fall

    // --- Update Particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.angle += p.speed;
        p.life -= p.decay;
        p.radius *= 0.95; // Pull in slightly as they spin
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function render() {
    gl.viewport(0, 0, width, height);
    gl.clearColor(0.1, 0.1, 0.18, 1.0); // Dark background
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.uniform2f(resolutionLocation, width, height);

    // Enable blending for transparent particles
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

    // Draw Platforms
    for (let p of platforms) {
        drawRect(p.x, p.y, p.w, p.h, [0.3, 0.4, 0.5, 1.0]);
    }

    // Draw Particles (Wind Twirl behind player)
    let pCenterX = player.x + player.w/2;
    let pCenterY = player.y + player.h/2;
    for (let p of particles) {
        let px = pCenterX + Math.cos(p.angle) * p.radius;
        let py = pCenterY + p.yOffset + Math.sin(p.angle) * (p.radius * 0.5); // Elliptical twirl
        let alpha = Math.max(0, p.life);
        drawRect(px, py, 4, 4, [0.6, 0.9, 1.0, alpha]); // Cyan wind
    }

    // Draw Player
    let playerColor = player.dashTimer > 0 ? [0.0, 1.0, 0.8, 1.0] : [0.9, 0.2, 0.3, 1.0];
    drawRect(player.x, player.y, player.w, player.h, playerColor);
}

function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

// Start Game
loop();
</script>
</body>
</html>
