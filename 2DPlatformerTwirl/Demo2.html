<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebGL Mobile Platformer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a2e;
            touch-action: none; /* Prevents default pull-to-refresh on mobile */
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* Gamepad UI Container */
        #gamepad-ui {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let touches pass through where there are no controls */
        }

        /* Virtual Joystick Base */
        .joystick-base {
            position: absolute;
            bottom: 30px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: auto;
            box-sizing: border-box;
        }
        #joy-left { left: 30px; }
        #joy-right { right: 30px; }

        /* Virtual Joystick Stick/Knob */
        .joystick-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            margin-top: -25px;
            margin-left: -25px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: transform 0.05s linear;
        }
        
        /* Fart / Jump Button */
        #btn-fart {
            position: absolute;
            bottom: 160px;
            right: 40px;
            width: 70px;
            height: 70px;
            background: rgba(100, 255, 100, 0.2);
            border: 2px solid rgba(100, 255, 100, 0.5);
            border-radius: 50%;
            color: #baffba;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 0 0 10px rgba(100, 255, 100, 0.2);
        }
        #btn-fart:active {
            background: rgba(100, 255, 100, 0.5);
            box-shadow: 0 0 20px rgba(100, 255, 100, 0.6);
        }
        
        /* Labels */
        .joy-label {
            position: absolute;
            top: -25px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="gamepad-ui">
    <div class="joystick-base" id="joy-left">
        <div class="joy-label">MOVE</div>
        <div class="joystick-stick" id="stick-left"></div>
    </div>
    
    <div id="btn-fart">💨</div>

    <div class="joystick-base" id="joy-right">
        <div class="joy-label">DASH</div>
        <div class="joystick-stick" id="stick-right"></div>
    </div>
</div>

<script>
/** * 1. WEBGL BOILERPLATE & SHADERS */
const canvas = document.getElementById('gameCanvas');
const gl = canvas.getContext('webgl', { alpha: false });

const vertexShaderSource = `
    attribute vec2 a_position;
    uniform vec2 u_resolution;
    uniform vec2 u_translation;
    uniform vec2 u_scale;
    void main() {
        vec2 scaledPosition = a_position * u_scale;
        vec2 position = scaledPosition + u_translation;
        vec2 zeroToOne = position / u_resolution;
        vec2 zeroToTwo = zeroToOne * 2.0;
        vec2 clipSpace = zeroToTwo - 1.0;
        gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
    }
`;

const fragmentShaderSource = `
    precision mediump float;
    uniform vec4 u_color;
    void main() {
        gl_FragColor = u_color;
    }
`;

function createShader(gl, type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) return null;
    return shader;
}

const program = gl.createProgram();
gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vertexShaderSource));
gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource));
gl.linkProgram(program);
gl.useProgram(program);

const positionLocation = gl.getAttribLocation(program, "a_position");
const resolutionLocation = gl.getUniformLocation(program, "u_resolution");
const colorLocation = gl.getUniformLocation(program, "u_color");
const translationLocation = gl.getUniformLocation(program, "u_translation");
const scaleLocation = gl.getUniformLocation(program, "u_scale");

const positionBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([ 0,0, 1,0, 0,1, 0,1, 1,0, 1,1 ]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(positionLocation);
gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

function drawRect(x, y, width, height, color) {
    gl.uniform2f(translationLocation, x, y);
    gl.uniform2f(scaleLocation, width, height);
    gl.uniform4f(colorLocation, color[0], color[1], color[2], color[3]);
    gl.drawArrays(gl.TRIANGLES, 0, 6);
}

/** * 2. GAME LOGIC & STATE */
let width, height;
function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    gl.viewport(0, 0, width, height);
}
window.addEventListener('resize', resize);
resize();

const player = {
    x: width / 2, y: 100, w: 30, h: 30,
    vx: 0, vy: 0,
    speed: 6, jumpForce: 14, gravity: 0.6,
    isGrounded: false,
    dashTimer: 0, dashCooldown: 0, dashDuration: 12, dashSpeed: 20,
    dashDirX: 0, dashDirY: 0
};

const platforms = [
    { x: 0, y: height - 50, w: width * 2, h: 50 },
    { x: 100, y: height - 150, w: 150, h: 20 },
    { x: width/2 - 50, y: height - 250, w: 150, h: 20 },
    { x: width - 200, y: height - 350, w: 150, h: 20 }
];

// Particle Systems
let windParticles = [];
let fartParticles = [];

function spawnWindTwirl(px, py) {
    for(let i=0; i<3; i++) {
        windParticles.push({
            angle: Math.random() * Math.PI * 2,
            radius: 20 + Math.random() * 20,
            yOffset: (Math.random() - 0.5) * 40,
            speed: 0.2 + Math.random() * 0.1,
            life: 1.0, decay: 0.04 + Math.random() * 0.02
        });
    }
}

function spawnFartBlast(px, py) {
    for(let i=0; i<20; i++) {
        fartParticles.push({
            x: px + (Math.random() - 0.5) * 20,
            y: py,
            vx: (Math.random() - 0.5) * 4,
            vy: Math.random() * 5 + 1, // Shoot downwards
            size: 5 + Math.random() * 10,
            life: 1.0, decay: 0.02 + Math.random() * 0.03
        });
    }
}

/** * 3. JOYSTICK & TOUCH CONTROLS */
class VirtualJoystick {
    constructor(baseId, stickId) {
        this.base = document.getElementById(baseId);
        this.stick = document.getElementById(stickId);
        this.x = 0; // Normalized -1 to 1
        this.y = 0; // Normalized -1 to 1
        this.touchId = null;
        this.maxRadius = 40; // Max visual distance the stick can travel

        this.base.addEventListener('touchstart', this.onStart.bind(this), {passive: false});
        window.addEventListener('touchmove', this.onMove.bind(this), {passive: false});
        window.addEventListener('touchend', this.onEnd.bind(this), {passive: false});
        window.addEventListener('touchcancel', this.onEnd.bind(this), {passive: false});
    }

    onStart(e) {
        e.preventDefault();
        const touch = e.changedTouches[0];
        this.touchId = touch.identifier;
        this.updatePos(touch.clientX, touch.clientY);
    }

    onMove(e) {
        if (this.touchId === null) return;
        for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === this.touchId) {
                e.preventDefault();
                this.updatePos(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
                break;
            }
        }
    }

    onEnd(e) {
        for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === this.touchId) {
                this.touchId = null;
                this.x = 0;
                this.y = 0;
                this.stick.style.transform = `translate(0px, 0px)`;
                break;
            }
        }
    }

    updatePos(clientX, clientY) {
        const rect = this.base.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        let dx = clientX - centerX;
        let dy = clientY - centerY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        // Cap visual stick position
        if (distance > this.maxRadius) {
            dx = (dx / distance) * this.maxRadius;
            dy = (dy / distance) * this.maxRadius;
        }
        
        // Output normalized values (-1 to 1)
        this.x = dx / this.maxRadius;
        this.y = dy / this.maxRadius;
        
        this.stick.style.transform = `translate(${dx}px, ${dy}px)`;
    }
}

const leftJoy = new VirtualJoystick('joy-left', 'stick-left');
const rightJoy = new VirtualJoystick('joy-right', 'stick-right');

// Fart Button Logic
let keys = { fart: false };
const btnFart = document.getElementById('btn-fart');
btnFart.addEventListener('touchstart', (e) => { e.preventDefault(); keys.fart = true; }, {passive: false});
btnFart.addEventListener('touchend', (e) => { e.preventDefault(); keys.fart = false; }, {passive: false});
btnFart.addEventListener('mousedown', () => keys.fart = true);
btnFart.addEventListener('mouseup', () => keys.fart = false);

/** * 4. MAIN LOOP */
function update() {
    // --- Physics & Input ---
    player.vy += player.gravity; // Apply Gravity

    if (player.dashCooldown > 0) player.dashCooldown--;

    // Dash Execution (Right Joystick)
    // Calculate how far the right joystick is pulled
    const dashMag = Math.sqrt(rightJoy.x**2 + rightJoy.y**2);
    
    // Trigger dash if pulled significantly and ready
    if (dashMag > 0.5 && player.dashCooldown <= 0 && player.dashTimer <= 0) {
        player.dashTimer = player.dashDuration;
        player.dashCooldown = 60; // 1 second cooldown
        // Normalize direction vector
        player.dashDirX = rightJoy.x / dashMag;
        player.dashDirY = rightJoy.y / dashMag; 
    }

    if (player.dashTimer > 0) {
        // Dashing state (Ignores gravity and normal movement)
        player.dashTimer--;
        player.vx = player.dashDirX * player.dashSpeed;
        player.vy = player.dashDirY * player.dashSpeed;
        spawnWindTwirl(player.x, player.y);
    } else {
        // Normal Movement (Left Joystick)
        // Only allow movement if stick is pushed past a tiny deadzone
        if (Math.abs(leftJoy.x) > 0.1) {
            player.vx = leftJoy.x * player.speed;
        } else {
            player.vx *= 0.8; // Friction
        }

        // Fart Jump
        if (keys.fart && player.isGrounded) {
            player.vy = -player.jumpForce;
            player.isGrounded = false;
            keys.fart = false; // Require re-press
            spawnFartBlast(player.x + player.w/2, player.y + player.h); // Boom!
        }
    }

    // Apply Velocity
    player.x += player.vx;
    player.y += player.vy;

    // --- Collision Detection ---
    player.isGrounded = false;
    for (let p of platforms) {
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y + player.h > p.y && player.y < p.y + p.h) {
            
            if (player.vy > 0 && player.y + player.h - player.vy <= p.y) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.isGrounded = true;
            } else if (player.vy < 0 && player.y - player.vy >= p.y + p.h) {
                player.y = p.y + p.h;
                player.vy = 0; // Hit head
            }
        }
    }

    // Screen bounds
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > width) player.x = width - player.w;
    if (player.y > height) { player.y = 100; player.vy = 0; }

    // --- Update Particles ---
    // Wind Twirls
    for (let i = windParticles.length - 1; i >= 0; i--) {
        let p = windParticles[i];
        p.angle += p.speed;
        p.life -= p.decay;
        p.radius *= 0.93;
        if (p.life <= 0) windParticles.splice(i, 1);
    }
    // Fart Gas
    for (let i = fartParticles.length - 1; i >= 0; i--) {
        let p = fartParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.size *= 1.05; // Expands outward
        p.life -= p.decay;
        if (p.life <= 0) fartParticles.splice(i, 1);
    }
}

function render() {
    gl.viewport(0, 0, width, height);
    gl.clearColor(0.1, 0.1, 0.18, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.uniform2f(resolutionLocation, width, height);

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

    // Draw Platforms
    for (let p of platforms) {
        drawRect(p.x, p.y, p.w, p.h, [0.3, 0.4, 0.5, 1.0]);
    }

    // Draw Fart Particles (Toxic Green/Brown)
    for (let p of fartParticles) {
        let alpha = Math.max(0, p.life);
        drawRect(p.x, p.y, p.size, p.size, [0.4, 0.9, 0.2, alpha]);
    }

    // Draw Wind Twirl Particles
    let pCenterX = player.x + player.w/2;
    let pCenterY = player.y + player.h/2;
    for (let p of windParticles) {
        let px = pCenterX + Math.cos(p.angle) * p.radius;
        let py = pCenterY + p.yOffset + Math.sin(p.angle) * (p.radius * 0.5);
        let alpha = Math.max(0, p.life);
        drawRect(px, py, 6, 6, [0.6, 0.9, 1.0, alpha]);
    }

    // Draw Player
    let playerColor = player.dashTimer > 0 ? [0.0, 1.0, 0.8, 1.0] : [0.9, 0.6, 0.1, 1.0];
    drawRect(player.x, player.y, player.w, player.h, playerColor);
}

function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
