<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mindstudio-ai/image-to-3d · GitHub</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            /* GitHub Dark Mode Color Palette */
            --bg-color: #0d1117;
            --header-bg: #010409;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --btn-primary: #238636;
            --btn-primary-hover: #2ea043;
            --btn-default: #21262d;
            --btn-default-border: rgba(240, 246, 252, 0.1);
            --link-color: #58a6ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Styles */
        header {
            background-color: var(--header-bg);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            gap: 16px;
        }

        .octicon {
            fill: var(--text-main);
        }

        .repo-title {
            font-size: 14px;
            color: var(--link-color);
            cursor: pointer;
            font-weight: 600;
        }

        .repo-title span {
            color: var(--text-main);
        }

        /* Main Container */
        main {
            max-width: 1012px;
            margin: 32px auto;
            width: 100%;
            padding: 0 16px;
        }

        /* GitHub Box UI Components */
        .Box {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 24px;
        }

        .Box-header {
            background-color: var(--panel-bg);
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .Box-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Forms & Buttons */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"] {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 5px 12px;
            font-size: 14px;
            border-radius: 6px;
            line-height: 20px;
            width: 100%;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--link-color);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        .btn {
            padding: 5px 16px;
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid;
            display: inline-block;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: var(--btn-primary);
            color: #ffffff;
            border-color: rgba(240, 246, 252, 0.1);
            align-self: flex-start;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--btn-primary-hover);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 3D Viewer & Actions Terminal */
        .terminal {
            background-color: var(--panel-bg);
            padding: 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 12px;
            color: var(--text-muted);
            display: none;
            flex-direction: column;
            gap: 6px;
        }

        .terminal.active {
            display: flex;
        }

        .log-line {
            opacity: 0;
            animation: fadeIn 0.2s forwards;
        }

        .log-line.success {
            color: #3fb950;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .viewer-container {
            display: none;
            width: 100%;
            height: 500px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            background-color: var(--panel-bg);
            position: relative;
        }

        .viewer-container.active {
            display: block;
            animation: fadeIn 0.5s forwards;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }
    </style>
</head>
<body>

<header>
    <svg height="32" aria-hidden="true" viewBox="0 0 16 16" version="1.1" width="32" class="octicon">
        <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.46-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
    </svg>
    <div class="repo-title">mindstudio-ai <span>/</span> image-to-3d-generator</div>
</header>

<main>
    <div class="Box">
        <div class="Box-header">
            <svg class="octicon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16"><path d="M2 1.75C2 .784 2.784 0 3.75 0h8.5C13.216 0 14 .784 14 1.75v12.5A1.75 1.75 0 0 1 12.25 16h-8.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25Zm6.5 4a.75.75 0 0 1 .75-.75h.5a.75.75 0 0 1 0 1.5h-.5a.75.75 0 0 1-.75-.75Zm0 3a.75.75 0 0 1 .75-.75h.5a.75.75 0 0 1 0 1.5h-.5a.75.75 0 0 1-.75-.75Zm0 3a.75.75 0 0 1 .75-.75h.5a.75.75 0 0 1 0 1.5h-.5a.75.75 0 0 1-.75-.75ZM4.75 5.5a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5a.75.75 0 0 1-.75-.75Zm0 3a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5a.75.75 0 0 1-.75-.75Zm0 3a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5a.75.75 0 0 1-.75-.75Z"></path></svg>
            MindStudio API: 3D Generation Pipeline
        </div>
        <div class="Box-body">
            <div class="form-group">
                <label for="imageUrl">Source Image URL</label>
                <input type="text" id="imageUrl" placeholder="https://example.com/character.png" value="https://example.com/sample-product.png">
            </div>
            
            <div class="form-group" style="margin-top: 8px;">
                <button class="btn btn-primary" id="generateBtn" onclick="runGeneration()">
                    Run Workflow (generate3dModel)
                </button>
            </div>

            <div class="terminal" id="terminal">
                </div>

            <div class="viewer-container" id="viewerContainer">
                <model-viewer 
                    id="modelViewer" 
                    alt="AI Generated 3D Model" 
                    auto-rotate 
                    camera-controls 
                    environment-image="neutral"
                    shadow-intensity="1"
                    interaction-prompt="auto">
                </model-viewer>
            </div>
        </div>
    </div>
</main>

<script>
    // Simulated build logs for the MindStudio Agent
    const terminalLogs = [
        "$ mindstudio generate-3d-model --image-url \"{{imageUrl}}\"",
        "⟡ Initializing MindStudio agent...",
        "⟡ Routing request to model: WaveSpeed Meshy 6...",
        "⟡ Pre-processing 2D image boundaries...",
        "⟡ Running image-to-3d generation pipeline...",
        "⟡ Calculating topology and PBR materials...",
        "⟡ Task complete! Converting to .GLB format...",
        "✓ Render successful. Loading viewer..."
    ];

    async function runGeneration() {
        const btn = document.getElementById('generateBtn');
        const terminal = document.getElementById('terminal');
        const viewerContainer = document.getElementById('viewerContainer');
        const modelViewer = document.getElementById('modelViewer');
        const inputUrl = document.getElementById('imageUrl').value;
        
        // Reset the UI states for a fresh run
        btn.disabled = true;
        btn.innerText = "Running Build...";
        terminal.innerHTML = "";
        terminal.classList.add('active');
        viewerContainer.classList.remove('active');

        // Simulate CLI / API polling logs sequentially
        for (let i = 0; i < terminalLogs.length; i++) {
            // Randomize the "processing" delay slightly to feel like a real API call
            await new Promise(resolve => setTimeout(resolve, 600 + Math.random() * 600));
            
            const logElement = document.createElement('div');
            logElement.className = 'log-line';
            
            if (terminalLogs[i].startsWith('✓')) {
                logElement.classList.add('success');
            }
            
            // Simple string replacement to insert the user's requested URL into the log
            logElement.innerText = `> ${terminalLogs[i].replace('{{imageUrl}}', inputUrl)}`;
            terminal.appendChild(logElement);
        }

        // Wait a beat before revealing the 3D model
        await new Promise(resolve => setTimeout(resolve, 800));
        terminal.classList.remove('active');
        viewerContainer.classList.add('active');
        
        // Load a publicly hosted, safe GLB file to represent the final output in the viewer
        modelViewer.src = "https://modelviewer.dev/shared-assets/models/Astronaut.glb";
        
        // Reset the button
        btn.disabled = false;
        btn.innerText = "Run Workflow (generate3dModel)";
    }
</script>
</body>
</html>
