<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Arm Unloading Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue outside the truck */
            font-family: sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
            z-index: 100;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="info">
        <h2>Robotic Unloading Simulation</h2>
        <p>Click and drag to rotate the camera. Scroll to zoom.</p>
    </div>

    <script>
        // --- 1. Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(-8, 6, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2, 0);
        controls.update();

        // --- 2. Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- 3. Environment (Truck Trailer & Conveyor) ---
        // Trailer Floor
        const floorGeo = new THREE.PlaneGeometry(10, 20);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Trailer Walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.9 });
        const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(20, 6), wallMat);
        leftWall.position.set(-5, 3, 0);
        leftWall.rotation.y = Math.PI / 2;
        leftWall.receiveShadow = true;
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(20, 6), wallMat);
        rightWall.position.set(5, 3, 0);
        rightWall.rotation.y = -Math.PI / 2;
        rightWall.receiveShadow = true;
        scene.add(rightWall);

        // Conveyor Belt
        const conveyorGeo = new THREE.BoxGeometry(2, 0.5, 12);
        const conveyorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const conveyor = new THREE.Mesh(conveyorGeo, conveyorMat);
        conveyor.position.set(0, 0.25, 6); // Placed behind the robot
        conveyor.receiveShadow = true;
        conveyor.castShadow = true;
        scene.add(conveyor);

        // --- 4. Robot Arm Construction ---
        const robotGroup = new THREE.Group();
        scene.add(robotGroup);

        const robotMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.4, metalness: 0.5 });
        const jointMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.7 });

        // Base
        const baseMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1, 0.5, 32), jointMat);
        baseMesh.position.y = 0.25;
        baseMesh.castShadow = true;
        robotGroup.add(baseMesh);

        // Swivel (Rotates around Y)
        const swivel = new THREE.Group();
        swivel.position.y = 0.5;
        robotGroup.add(swivel);
        
        const swivelMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 1, 32), robotMat);
        swivelMesh.position.y = 0.5;
        swivelMesh.castShadow = true;
        swivel.add(swivelMesh);

        // Shoulder (Rotates around X)
        const shoulder = new THREE.Group();
        shoulder.position.y = 1.0;
        swivel.add(shoulder);

        const shoulderJoint = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.2, 32), jointMat);
        shoulderJoint.rotation.z = Math.PI / 2;
        shoulderJoint.castShadow = true;
        shoulder.add(shoulderJoint);

        const upperArm = new THREE.Mesh(new THREE.BoxGeometry(0.6, 3, 0.6), robotMat);
        upperArm.position.y = 1.5;
        upperArm.castShadow = true;
        shoulder.add(upperArm);

        // Elbow (Rotates around X)
        const elbow = new THREE.Group();
        elbow.position.y = 3.0; // Top of upper arm
        shoulder.add(elbow);

        const elbowJoint = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.0, 32), jointMat);
        elbowJoint.rotation.z = Math.PI / 2;
        elbowJoint.castShadow = true;
        elbow.add(elbowJoint);

        const lowerArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 2.5, 0.4), robotMat);
        lowerArm.position.y = 1.25;
        lowerArm.castShadow = true;
        elbow.add(lowerArm);

        // Wrist & Gripper
        const wrist = new THREE.Group();
        wrist.position.y = 2.5; // Top of lower arm
        elbow.add(wrist);

        const gripperBase = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.2, 0.8), jointMat);
        gripperBase.castShadow = true;
        wrist.add(gripperBase);

        // Dummy end-effector attachment point
        const attachmentPoint = new THREE.Object3D();
        attachmentPoint.position.y = 0.5;
        wrist.add(attachmentPoint);

        // --- 5. Boxes to Unload ---
        const boxes = [];
        const activeBoxes = []; // Boxes on the conveyor
        const boxGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const boxMat = new THREE.MeshStandardMaterial({ map: createCardboardTexture() });

        // Generate a stack of boxes inside the trailer
        for (let y = 0; y < 3; y++) {
            for (let x = -1; x <= 1; x++) {
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set(x * 1.3, 0.6 + y * 1.21, -4); // Stacked in front of robot
                box.castShadow = true;
                box.receiveShadow = true;
                scene.add(box);
                boxes.push(box);
            }
        }

        // Texture generator for boxes
        function createCardboardTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const context = canvas.getContext('2d');
            context.fillStyle = '#C19A6B';
            context.fillRect(0, 0, 256, 256);
            context.strokeStyle = '#a68053';
            context.lineWidth = 4;
            context.strokeRect(0, 0, 256, 256);
            return new THREE.CanvasTexture(canvas);
        }

        // --- 6. Animation & State Machine ---
        let state = 0; 
        // 0: Move to box, 1: Grab, 2: Move to Conveyor, 3: Release, 4: Idle
        let targetBox = boxes.pop();
        
        // Inverse Kinematics approximations (pre-calculated angles)
        const poses = {
            pick: { swivel: 0, shoulder: 0.8, elbow: -1.5 },
            place: { swivel: Math.PI, shoulder: 0.5, elbow: -0.8 },
            idle: { swivel: 0, shoulder: 0, elbow: 0 }
        };
        
        let currentTargetPose = { ...poses.pick };

        // Adjust pick pose based on box position
        function updatePickPose(box) {
            const xOffset = box.position.x;
            const yOffset = box.position.y;
            // Simple heuristics to aim arm at box
            currentTargetPose.swivel = -xOffset * 0.2;
            currentTargetPose.shoulder = 0.5 + (3 - yOffset) * 0.15;
            currentTargetPose.elbow = -1.2 - (3 - yOffset) * 0.1;
        }

        if (targetBox) updatePickPose(targetBox);

        function animate() {
            requestAnimationFrame(animate);

            // Lerp joints towards target angles for smooth movement
            const speed = 0.04;
            swivel.rotation.y += (currentTargetPose.swivel - swivel.rotation.y) * speed;
            shoulder.rotation.x += (currentTargetPose.shoulder - shoulder.rotation.x) * speed;
            elbow.rotation.x += (currentTargetPose.elbow - elbow.rotation.x) * speed;

            // Check if robot has reached its target pose
            const distance = Math.abs(swivel.rotation.y - currentTargetPose.swivel) + 
                             Math.abs(shoulder.rotation.x - currentTargetPose.shoulder) + 
                             Math.abs(elbow.rotation.x - currentTargetPose.elbow);

            if (distance < 0.1) {
                if (state === 0 && targetBox) {
                    // Grab the box
                    attachmentPoint.attach(targetBox);
                    targetBox.position.set(0, 0, 0);
                    targetBox.rotation.set(0, 0, 0);
                    
                    state = 1; // Move to conveyor
                    currentTargetPose = { ...poses.place };
                } 
                else if (state === 1) {
                    // Release the box onto the conveyor
                    scene.attach(targetBox);
                    targetBox.position.set(0, 1.1, 2); // Drop point on conveyor
                    targetBox.rotation.set(0, 0, 0);
                    
                    activeBoxes.push(targetBox);
                    targetBox = boxes.pop(); // Get next box
                    
                    if (targetBox) {
                        state = 0; // Go back to picking
                        updatePickPose(targetBox);
                    } else {
                        state = 4; // Out of boxes, go to idle
                        currentTargetPose = { ...poses.idle };
                    }
                }
            }

            // Move boxes along the conveyor belt
            for (let i = 0; i < activeBoxes.length; i++) {
                activeBoxes[i].position.z += 0.05;
                // Remove boxes that fall off the end of the conveyor
                if (activeBoxes[i].position.z > 12) {
                    scene.remove(activeBoxes[i]);
                    activeBoxes.splice(i, 1);
                    i--;
                }
            }

            renderer.render(scene, camera);
        }

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start animation loop
        animate();
    </script>
</body>
</html>
