<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fixed WebGL Glass</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>

    <script id="vs" type="x-shader/x-vertex">
        varying vec3 vNormal;
        varying vec3 vWorldPos;
        varying vec3 vViewDir;

        void main() {
            vec4 worldPos = modelMatrix * vec4(position, 1.0);
            vWorldPos = worldPos.xyz;
            vNormal = normalize(normalMatrix * normal);
            vViewDir = normalize(worldPos.xyz - cameraPosition);
            gl_Position = projectionMatrix * viewMatrix * worldPos;
        }
    </script>

    <script id="fs" type="x-shader/x-fragment">
        precision mediump float; // mediump is more stable on iPhone

        varying vec3 vNormal;
        varying vec3 vWorldPos;
        varying vec3 vViewDir;
        uniform samplerCube envMap;

        float hash(vec3 p) {
            p = fract(p * 0.3183099 + 0.1);
            p *= 17.0;
            return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
        }

        void main() {
            vec3 n = normalize(vNormal);
            vec3 v = normalize(vViewDir);

            // Dispersion - 3 Refractions
            vec3 reR = refract(v, n, 1.0/1.12);
            vec3 reG = refract(v, n, 1.0/1.16);
            vec3 reB = refract(v, n, 1.0/1.20);

            float r = textureCube(envMap, reR).r;
            float g = textureCube(envMap, reG).g;
            float b = textureCube(envMap, reB).b;

            // Bubbles
            vec3 bPos = vWorldPos * 12.0;
            float h = hash(floor(bPos));
            float bubble = 0.0;
            if(h > 0.97) {
                bubble = smoothstep(0.18, 0.0, length(fract(bPos) - 0.5)) * 0.7;
            }

            vec3 color = vec3(r, g, b) + bubble;
            
            // Fresnel (Edge highlights)
            float fresnel = pow(clamp(1.0 + dot(v, n), 0.0, 1.0), 3.0);
            vec3 finalColor = mix(color, vec3(1.0), fresnel * 0.5);

            gl_FragColor = vec4(finalColor, 1.0);
        }
    </script>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('glCanvas'), 
            antialias: true 
        });
        
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Grid Room ---
        const roomCanvas = document.createElement('canvas');
        roomCanvas.width = roomCanvas.height = 512;
        const ctx = roomCanvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,512,512);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 20; ctx.strokeRect(0,0,512,512);
        ctx.font = 'bold 60px Arial'; ctx.fillStyle = '#000'; ctx.fillText('METEOR', 120, 280);
        
        const gridTex = new THREE.CanvasTexture(roomCanvas);
        gridTex.wrapS = gridTex.wrapT = THREE.RepeatWrapping;
        gridTex.repeat.set(5, 5);

        const room = new THREE.Mesh(
            new THREE.BoxGeometry(30, 30, 30),
            new THREE.MeshBasicMaterial({ map: gridTex, side: THREE.BackSide })
        );
        scene.add(room);

        // --- Optimized Render Target ---
        const cubeRT = new THREE.WebGLCubeRenderTarget(256, { 
            generateMipmaps: true, 
            minFilter: THREE.LinearMipmapLinearFilter 
        });
        const cubeCam = new THREE.CubeCamera(0.1, 100, cubeRT);

        // --- Glass Sphere ---
        const glassMat = new THREE.ShaderMaterial({
            uniforms: {
                envMap: { value: cubeRT.texture }
            },
            vertexShader: document.getElementById('vs').textContent,
            fragmentShader: document.getElementById('fs').textContent
        });

        const sphere = new THREE.Mesh(new THREE.SphereBufferGeometry(2, 48, 48), glassMat);
        scene.add(sphere);

        camera.position.set(0, 0, 8);

        function animate() {
            requestAnimationFrame(animate);
            
            // Hide sphere while capturing reflection
            sphere.visible = false;
            cubeCam.update(renderer, scene);
            sphere.visible = true;

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
