<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebGL Glass Orb with Dispersion</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec3 position;
        attribute vec3 normal;
        varying vec3 vNormal;
        varying vec3 vEyeVec;
        varying vec3 vWorldPos;
        uniform mat4 modelMatrix;
        uniform mat4 viewMatrix;
        uniform mat4 projectionMatrix;
        uniform vec3 cameraPosition;

        void main() {
            vec4 worldPos = modelMatrix * vec4(position, 1.0);
            vWorldPos = worldPos.xyz;
            vNormal = normalize(mat3(modelMatrix) * normal);
            vEyeVec = normalize(worldPos.xyz - cameraPosition);
            gl_Position = projectionMatrix * viewMatrix * worldPos;
        }
    </script>

    <script id="fs" type="x-shader/x-fragment">
        precision highp float;
        varying vec3 vNormal;
        varying vec3 vEyeVec;
        varying vec3 vWorldPos;
        uniform sampler2D envMap;
        uniform float time;

        // Simple pseudo-random for bubbles
        float hash(vec3 p) {
            p = fract(p * 0.3183099 + 0.1);
            p *= 17.0;
            return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
        }

        void main() {
            vec3 N = normalize(vNormal);
            vec3 I = normalize(vEyeVec);

            // Refraction Indices (R, G, B) for Dispersion
            float iorR = 1.15;
            float iorG = 1.18;
            float iorB = 1.22;

            // Calculate refracted vectors for each color channel
            vec3 refractR = refract(I, N, 1.0/iorR);
            vec3 refractG = refract(I, N, 1.0/iorG);
            vec3 refractB = refract(I, N, 1.0/iorB);

            // Map refracted vectors to UV coordinates (Spherical mapping simplified)
            vec2 uvR = vec2(0.5 + atan(refractR.z, refractR.x) / (2.0 * 3.14159), 0.5 + asin(refractR.y) / 3.14159);
            vec2 uvG = vec2(0.5 + atan(refractG.z, refractG.x) / (2.0 * 3.14159), 0.5 + asin(refractG.y) / 3.14159);
            vec2 uvB = vec2(0.5 + atan(refractB.z, refractB.x) / (2.0 * 3.14159), 0.5 + asin(refractB.y) / 3.14159);

            float r = texture2D(envMap, uvR).r;
            float g = texture2D(envMap, uvG).g;
            float b = texture2D(envMap, uvB).b;

            // --- Bubble Logic ---
            // We use the world position to "carve" bubbles into the glass volume
            vec3 bubblePos = vWorldPos * 8.0; 
            float noise = hash(floor(bubblePos));
            float bubble = 0.0;
            if(noise > 0.95) {
                float dist = length(fract(bubblePos) - 0.5);
                bubble = smoothstep(0.15, 0.1, dist) * 0.7;
            }

            vec3 color = vec3(r, g, b);
            color += bubble; // Highlight bubbles
            
            // Fresnel effect for surface reflection
            float fresnel = pow(1.0 + dot(I, N), 3.0);
            color = mix(color, vec3(1.0), fresnel * 0.5);

            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('glCanvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // 1. Create the Grid Room (Environment)
        const roomSize = 10;
        const roomGeo = new THREE.BoxGeometry(roomSize, roomSize, roomSize);
        const textureLoader = new THREE.TextureLoader();
        
        // Generate a grid texture procedurally
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, 512, 512);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 10;
        ctx.strokeRect(0,0, 512, 512);
        ctx.font = 'bold 80px Arial';
        ctx.fillStyle = '#000';
        ctx.fillText('METEOR', 100, 280);
        
        const gridTex = new THREE.CanvasTexture(canvas);
        gridTex.wrapS = gridTex.wrapT = THREE.RepeatWrapping;
        gridTex.repeat.set(2, 2);

        const roomMat = new THREE.MeshBasicMaterial({ 
            map: gridTex, 
            side: THREE.BackSide 
        });
        const room = new THREE.Mesh(roomGeo, roomMat);
        scene.add(room);

        // 2. Setup Cube Camera for Real-time Refraction
        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, { format: THREE.RGBFormat, generateMipmaps: true, minFilter: THREE.LinearMipmapLinearFilter });
        const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRenderTarget);

        // 3. The Glass Sphere
        const glassGeo = new THREE.SphereGeometry(1.5, 64, 64);
        const glassMat = new THREE.ShaderMaterial({
            uniforms: {
                envMap: { value: cubeRenderTarget.texture },
                cameraPosition: { value: camera.position },
                time: { value: 0 }
            },
            vertexShader: document.getElementById('vs').textContent,
            fragmentShader: document.getElementById('fs').textContent
        });
        const sphere = new THREE.Mesh(glassGeo, glassMat);
        scene.add(sphere);

        camera.position.z = 5;

        function animate(t) {
            requestAnimationFrame(animate);
            
            // Rotate sphere and room slightly
            sphere.rotation.y = t * 0.0005;
            sphere.position.y = Math.sin(t * 0.001) * 0.2;

            // Hide sphere, update env map, show sphere
            sphere.visible = false;
            cubeCamera.update(renderer, scene);
            sphere.visible = true;

            glassMat.uniforms.time.value = t * 0.01;
            glassMat.uniforms.cameraPosition.value.copy(camera.position);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate(0);
    </script>
</body>
</html>
