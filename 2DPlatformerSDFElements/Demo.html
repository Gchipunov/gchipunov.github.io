<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL 2D Platformer with SDF Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <strong>Controls:</strong><br>
        Left / Right Arrows : Move<br>
        Up Arrow : Jump
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        // --- Game Setup & State ---
        const canvas = document.getElementById('gameCanvas');
        const gl = canvas.getContext('webgl');

        if (!gl) {
            alert('WebGL not supported');
        }

        // Resize Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        window.addEventListener('resize', resize);
        resize();

        // Game State
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        const player = {
            x: 100, y: 150, w: 40, h: 40, 
            vx: 0, vy: 0, 
            speed: 1.2, jumpForce: 14, 
            grounded: false
        };

        const gravity = 0.6;
        const friction = 0.82;

        const platforms = [
            { x: -100, y: 0, w: 3000, h: 50, color: [0.1, 0.2, 0.4, 1.0] }, // Ground
            { x: 300, y: 150, w: 150, h: 20, color: [0.2, 0.4, 0.6, 1.0] },
            { x: 550, y: 280, w: 150, h: 20, color: [0.2, 0.4, 0.6, 1.0] },
            { x: 250, y: 400, w: 150, h: 20, color: [0.2, 0.4, 0.6, 1.0] },
            { x: 700, y: 500, w: 200, h: 20, color: [0.2, 0.4, 0.6, 1.0] }
        ];

        // --- WebGL Shaders ---
        
        // Vertex Shader: Standard 2D Orthographic Projection
        const vsSource = `
            attribute vec2 a_position;
            uniform mat3 u_matrix;
            varying vec2 v_uv;
            void main() {
                gl_Position = vec4((u_matrix * vec3(a_position, 1.0)).xy, 0.0, 1.0);
                v_uv = a_position; // Passes 0.0 to 1.0 to Fragment Shader
            }
        `;

        // Fragment Shader: Handles Standard Geometry AND SDF Player Rendering
        const fsSource = `
            precision mediump float;
            varying vec2 v_uv;
            uniform vec4 u_color;
            uniform float u_isPlayer;
            uniform vec2 u_velocity;

            // 2D Signed Distance Field function for a rounded box
            float sdRoundBox( vec2 p, vec2 b, float r ) {
                vec2 q = abs(p) - b + r;
                return length(max(q,0.0)) + min(max(q.x,q.y),0.0) - r;
            }

            void main() {
                if (u_isPlayer > 0.5) {
                    // Map UV coordinates from [0, 1] to [-1, 1] for SDF centering
                    vec2 p = v_uv * 2.0 - 1.0;

                    // Apply visual squash & stretch based on physics velocity
                    p.x /= 1.0 + abs(u_velocity.x) * 0.025;
                    p.y /= 1.0 + abs(u_velocity.y) * 0.025;

                    // Get distance to our shape (width/height, corner radius)
                    float d = sdRoundBox(p, vec2(0.5), 0.35);

                    // Anti-aliased edge
                    float alpha = smoothstep(0.03, -0.03, d);
                    
                    // Add an outer glowing aura
                    float glow = smoothstep(0.35, 0.0, d) * 0.6;

                    // Combine color, edges, and glow
                    gl_FragColor = vec4(u_color.rgb, max(alpha, glow) * u_color.a);
                } else {
                    // Standard color rendering for platforms
                    gl_FragColor = u_color;
                }
            }
        `;

        // --- WebGL Helper Functions ---

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        function createProgram(gl, vs, fs) {
            const program = gl.createProgram();
            gl.attachShader(program, vs);
            gl.attachShader(program, fs);
            gl.linkProgram(program);
            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                console.error(gl.getProgramInfoLog(program));
                return null;
            }
            return program;
        }

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);
        const program = createProgram(gl, vertexShader, fragmentShader);

        // Look up locations
        const positionLocation = gl.getAttribLocation(program, "a_position");
        const matrixLocation = gl.getUniformLocation(program, "u_matrix");
        const colorLocation = gl.getUniformLocation(program, "u_color");
        const isPlayerLocation = gl.getUniformLocation(program, "u_isPlayer");
        const velocityLocation = gl.getUniformLocation(program, "u_velocity");

        // Create a buffer for a unit quad (0 to 1)
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        const positions = [
            0, 0,
            1, 0,
            0, 1,
            0, 1,
            1, 0,
            1, 1,
        ];
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);

        // Matrix Math Functions (3x3 matrices for 2D)
        function projectionMatrix(width, height) {
            // Maps 0->w and 0->h to -1->1 (Bottom-Left Origin)
            return [
                2/width, 0, 0,
                0, 2/height, 0,
                -1, -1, 1
            ];
        }

        function translationMatrix(tx, ty) {
            return [
                1, 0, 0,
                0, 1, 0,
                tx, ty, 1
            ];
        }

        function scalingMatrix(sx, sy) {
            return [
                sx, 0, 0,
                0, sy, 0,
                0, 0, 1
            ];
        }

        function multiplyMatrices(a, b) {
            return [
                b[0]*a[0] + b[1]*a[3] + b[2]*a[6],
                b[0]*a[1] + b[1]*a[4] + b[2]*a[7],
                b[0]*a[2] + b[1]*a[5] + b[2]*a[8],
                b[3]*a[0] + b[4]*a[3] + b[5]*a[6],
                b[3]*a[1] + b[4]*a[4] + b[5]*a[7],
                b[3]*a[2] + b[4]*a[5] + b[5]*a[8],
                b[6]*a[0] + b[7]*a[3] + b[8]*a[6],
                b[6]*a[1] + b[7]*a[4] + b[8]*a[7],
                b[6]*a[2] + b[7]*a[5] + b[8]*a[8]
            ];
        }

        // --- Game Logic ---

        function isColliding(a, b) {
            return a.x < b.x + b.w && 
                   a.x + a.w > b.x && 
                   a.y < b.y + b.h && 
                   a.y + a.h > b.y;
        }

        function updatePhysics() {
            // Input
            if (keys['ArrowLeft']) player.vx -= player.speed;
            if (keys['ArrowRight']) player.vx += player.speed;
            
            // Jump
            if (keys['ArrowUp'] && player.grounded) {
                player.vy = player.jumpForce;
                player.grounded = false;
            }

            // Apply friction and gravity
            player.vx *= friction;
            player.vy -= gravity;

            // X-Axis Movement & Collision
            player.x += player.vx;
            for (let p of platforms) {
                if (isColliding(player, p)) {
                    if (player.vx > 0) {
                        player.x = p.x - player.w;
                    } else if (player.vx < 0) {
                        player.x = p.x + p.w;
                    }
                    player.vx = 0;
                }
            }

            // Screen wrap horizontally
            if (player.x > canvas.width) player.x = -player.w;
            if (player.x < -player.w) player.x = canvas.width;

            // Y-Axis Movement & Collision
            player.y += player.vy;
            player.grounded = false;
            for (let p of platforms) {
                if (isColliding(player, p)) {
                    if (player.vy > 0) { // Hitting ceiling
                        player.y = p.y - player.h;
                        player.vy = 0;
                    } else if (player.vy < 0) { // Landing on ground
                        player.y = p.y + p.h;
                        player.vy = 0;
                        player.grounded = true;
                    }
                }
            }
            
            // Death plane
            if(player.y < -100) {
                player.x = 100;
                player.y = 150;
                player.vx = 0;
                player.vy = 0;
            }
        }

        // --- Rendering Logic ---

        function drawRect(x, y, w, h, color, isPlayerObj) {
            let proj = projectionMatrix(canvas.width, canvas.height);
            let trans = translationMatrix(x, y);
            let scale = scalingMatrix(w, h);
            
            let mat = multiplyMatrices(proj, multiplyMatrices(trans, scale));

            gl.uniformMatrix3fv(matrixLocation, false, mat);
            gl.uniform4fv(colorLocation, color);
            gl.uniform1f(isPlayerLocation, isPlayerObj ? 1.0 : 0.0);
            
            if (isPlayerObj) {
                gl.uniform2f(velocityLocation, player.vx, player.vy);
            }

            gl.drawArrays(gl.TRIANGLES, 0, 6);
        }

        function render() {
            updatePhysics();

            // Setup GL state for rendering
            gl.clearColor(0.1, 0.1, 0.18, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            gl.enable(gl.BLEND);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

            gl.useProgram(program);
            gl.enableVertexAttribArray(positionLocation);
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

            // Draw Platforms
            for (let p of platforms) {
                drawRect(p.x, p.y, p.w, p.h, p.color, false);
            }

            // Draw SDF Player (Cyan/Neon Blue)
            drawRect(player.x, player.y, player.w, player.h, [0.0, 1.0, 0.8, 1.0], true);

            requestAnimationFrame(render);
        }

        // Start Loop
        requestAnimationFrame(render);
    </script>
</body>
</html>
