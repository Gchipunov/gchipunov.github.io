<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL RTS Foundation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #selection-box {
            border: 1px solid #00ff00;
            background-color: rgba(0, 255, 0, 0.1);
            position: fixed;
            pointer-events: none;
            display: none;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui">
    Left-Click & Drag: Select Units<br>
    Right-Click: Move Units
</div>
<div id="selection-box"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- Configuration & State ---
    const units = [];
    const selectedUnits = new Set();
    const mouse = new THREE.Vector2();
    const raycaster = new THREE.Raycaster();
    let isDragging = false;
    const dragStart = new THREE.Vector2();

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 40, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // --- Ground ---
    const groundGeo = new THREE.PlaneGeometry(100, 100);
    const groundMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    const grid = new THREE.GridHelper(100, 20, 0x444444, 0x222222);
    scene.add(grid);

    // --- Unit Class ---
    class Unit {
        constructor(x, z, color) {
            this.mesh = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 1.5, 1.5),
                new THREE.MeshPhongMaterial({ color: color })
            );
            this.mesh.position.set(x, 0.75, z);
            
            // Selection Ring
            const ringGeo = new THREE.RingGeometry(1.2, 1.4, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide });
            this.selectionRing = new THREE.Mesh(ringGeo, ringMat);
            this.selectionRing.rotation.x = -Math.PI / 2;
            this.selectionRing.position.y = -0.7;
            this.selectionRing.visible = false;
            this.mesh.add(this.selectionRing);

            this.target = null;
            this.speed = 0.2;
            scene.add(this.mesh);
            units.push(this);
        }

        update() {
            if (this.target) {
                const dir = new THREE.Vector3().subVectors(this.target, this.mesh.position);
                dir.y = 0; // Keep on ground
                if (dir.length() > 0.1) {
                    dir.normalize();
                    this.mesh.position.addScaledVector(dir, this.speed);
                    // Look towards movement
                    const lookTarget = new THREE.Vector3().copy(this.mesh.position).add(dir);
                    this.mesh.lookAt(lookTarget);
                } else {
                    this.target = null;
                }
            }
        }

        select() {
            this.selectionRing.visible = true;
            selectedUnits.add(this);
        }

        deselect() {
            this.selectionRing.visible = false;
            selectedUnits.delete(this);
        }
    }

    // Spawn some initial units
    for(let i = 0; i < 5; i++) {
        new Unit(-10 + i * 5, 0, 0x3366ff); // Allied Blue
        new Unit(-10 + i * 5, 10, 0xff3333); // Soviet Red
    }

    // --- Input Handling ---
    const selectionBox = document.getElementById('selection-box');

    window.addEventListener('mousedown', (e) => {
        if (e.button === 0) { // Left Click
            isDragging = true;
            dragStart.set(e.clientX, e.clientY);
            selectionBox.style.display = 'block';
            selectionBox.style.left = `${e.clientX}px`;
            selectionBox.style.top = `${e.clientY}px`;
            selectionBox.style.width = '0px';
            selectionBox.style.height = '0px';
        }
    });

    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

        if (isDragging) {
            const width = e.clientX - dragStart.x;
            const height = e.clientY - dragStart.y;
            selectionBox.style.width = `${Math.abs(width)}px`;
            selectionBox.style.height = `${Math.abs(height)}px`;
            selectionBox.style.left = `${width > 0 ? dragStart.x : e.clientX}px`;
            selectionBox.style.top = `${height > 0 ? dragStart.y : e.clientY}px`;
        }
    });

    window.addEventListener('mouseup', (e) => {
        if (e.button === 0) {
            isDragging = false;
            selectionBox.style.display = 'none';
            performSelection();
        }
    });

    window.addEventListener('contextmenu', (e) => {
        e.preventDefault(); // Disable browser menu
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(ground);
        
        if (intersects.length > 0) {
            const targetPos = intersects[0].point;
            selectedUnits.forEach(unit => {
                // Add a small random offset so units don't stack perfectly
                unit.target = targetPos.clone().add(new THREE.Vector3(
                    (Math.random() - 0.5) * 3, 0, (Math.random() - 0.5) * 3
                ));
            });
        }
    });

    function performSelection() {
        // Simple 2D screen-space selection
        const rect = selectionBox.getBoundingClientRect();
        
        // If it's just a click (no drag), we select one unit or clear
        const isClick = rect.width < 5 && rect.height < 5;

        if (isClick) {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(units.map(u => u.mesh));
            
            // Clear current selection unless Shift is held
            units.forEach(u => u.deselect());
            
            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const unit = units.find(u => u.mesh === hitMesh);
                unit.select();
            }
        } else {
            // Box selection
            units.forEach(unit => {
                const vector = unit.mesh.position.clone().project(camera);
                const x = (vector.x + 1) * window.innerWidth / 2;
                const y = (-vector.y + 1) * window.innerHeight / 2;

                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    unit.select();
                } else {
                    unit.deselect();
                }
            });
        }
    }

    // --- Main Loop ---
    function animate() {
        requestAnimationFrame(animate);
        units.forEach(u => u.update());
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
