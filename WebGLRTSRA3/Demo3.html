<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebGL RTS - Mini Map Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; }
        #selection-box {
            border: 1px solid #00ff00;
            background-color: rgba(0, 255, 0, 0.1);
            position: fixed;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            pointer-events: none;
            border-radius: 8px;
            font-size: 13px;
            border-left: 4px solid #0f0;
        }
        .label { position: absolute; bottom: 170px; right: 10px; color: #aaa; font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="ui">
    <b>COMMAND INTERFACE</b><br>
    Select: Click-Drag / Tap-Drag<br>
    Move: Right-Click / Long-Press
</div>
<div class="label">Radar Map</div>
<div id="selection-box"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- MINI MAP CLASS ---
    class MiniMap {
        constructor(worldSize) {
            this.worldSize = worldSize;
            this.camera = new THREE.OrthographicCamera(-worldSize/2, worldSize/2, worldSize/2, -worldSize/2, 1, 500);
            this.camera.position.set(0, 100, 0);
            this.camera.lookAt(0, 0, 0);
            this.camera.up.set(0, 0, -1);

            this.renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
            this.renderer.setSize(150, 150);
            this.domElement = this.renderer.domElement;
            this.domElement.style.position = 'fixed';
            this.domElement.style.bottom = '10px';
            this.domElement.style.right = '10px';
            this.domElement.style.border = '2px solid #0f0';
            this.domElement.style.background = 'rgba(0,10,0,0.9)';
            this.domElement.style.zIndex = '100';
            document.body.appendChild(this.domElement);
        }
        render(scene) { this.renderer.render(scene, this.camera); }
    }

    // --- State & Variables ---
    const units = [];
    const selectedUnits = new Set();
    const mouse = new THREE.Vector2();
    const raycaster = new THREE.Raycaster();
    let isDragging = false;
    const dragStart = new THREE.Vector2();
    let touchStartTime = 0;
    const LONG_PRESS_THRESHOLD = 500;

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 60, 60);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(20, 50, 20);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x222222));

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.MeshPhongMaterial({ color: 0x111111 })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);
    scene.add(new THREE.GridHelper(200, 20, 0x00ff00, 0x113311));

    const minimap = new MiniMap(200);

    // --- Unit Class ---
    class Unit {
        constructor(x, z, color) {
            this.mesh = new THREE.Mesh(
                new THREE.BoxGeometry(2.5, 2.5, 2.5),
                new THREE.MeshPhongMaterial({ color: color })
            );
            this.mesh.position.set(x, 1.25, z);
            
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(1.8, 2.1, 32),
                new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide })
            );
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = -1.15;
            ring.visible = false;
            this.mesh.add(ring);
            this.selectionRing = ring;

            this.target = null;
            this.speed = 0.4;
            scene.add(this.mesh);
            units.push(this);
        }
        update() {
            if (this.target) {
                const dir = new THREE.Vector3().subVectors(this.target, this.mesh.position);
                dir.y = 0;
                if (dir.length() > 0.5) {
                    dir.normalize();
                    this.mesh.position.addScaledVector(dir, this.speed);
                    this.mesh.lookAt(this.mesh.position.clone().add(dir));
                } else { this.target = null; }
            }
        }
        select() { this.selectionRing.visible = true; selectedUnits.add(this); }
        deselect() { this.selectionRing.visible = false; selectedUnits.delete(this); }
    }

    // Spawn 2 squads
    for(let i = 0; i < 4; i++) {
        new Unit(-30 + i * 10, -20, 0x00aaff); // Team A
        new Unit(-30 + i * 10, 20, 0xff4400);  // Team B
    }

    // --- Controls ---
    const selectionBox = document.getElementById('selection-box');
    function updateMouse(x, y) {
        mouse.x = (x / window.innerWidth) * 2 - 1;
        mouse.y = -(y / window.innerHeight) * 2 + 1;
    }

    function moveSelected(x, y) {
        updateMouse(x, y);
        raycaster.setFromCamera(mouse, camera);
        const hit = raycaster.intersectObject(ground);
        if (hit.length > 0) {
            const point = hit[0].point;
            selectedUnits.forEach(u => {
                u.target = point.clone().add(new THREE.Vector3((Math.random()-0.5)*8, 0, (Math.random()-0.5)*8));
            });
        }
    }

    // Input Listeners
    window.addEventListener('mousedown', e => {
        if(e.button === 0) {
            isDragging = true; dragStart.set(e.clientX, e.clientY);
            selectionBox.style.display = 'block';
            selectionBox.style.width = '0px'; selectionBox.style.height = '0px';
        }
    });

    window.addEventListener('mousemove', e => {
        updateMouse(e.clientX, e.clientY);
        if(isDragging) {
            const w = e.clientX - dragStart.x; const h = e.clientY - dragStart.y;
            selectionBox.style.width = Math.abs(w) + 'px'; selectionBox.style.height = Math.abs(h) + 'px';
            selectionBox.style.left = (w > 0 ? dragStart.x : e.clientX) + 'px';
            selectionBox.style.top = (h > 0 ? dragStart.y : e.clientY) + 'px';
        }
    });

    window.addEventListener('mouseup', e => {
        if(e.button === 0) {
            isDragging = false; selectionBox.style.display = 'none';
            const rect = selectionBox.getBoundingClientRect();
            if(rect.width < 5 && rect.height < 5) {
                raycaster.setFromCamera(mouse, camera);
                const hit = raycaster.intersectObjects(units.map(u => u.mesh));
                units.forEach(u => u.deselect());
                if(hit.length > 0) units.find(u => u.mesh === hit[0].object).select();
            } else {
                units.forEach(u => {
                    const v = u.mesh.position.clone().project(camera);
                    const x = (v.x + 1) * window.innerWidth / 2;
                    const y = (-v.y + 1) * window.innerHeight / 2;
                    (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) ? u.select() : u.deselect();
                });
            }
        }
    });

    window.addEventListener('contextmenu', e => { e.preventDefault(); moveSelected(e.clientX, e.clientY); });

    // Touch Support
    window.addEventListener('touchstart', e => { touchStartTime = Date.now(); dragStart.set(e.touches[0].clientX, e.touches[0].clientY); isDragging = true; selectionBox.style.display = 'block'; }, {passive: false});
    window.addEventListener('touchend', e => {
        const duration = Date.now() - touchStartTime;
        if(duration > LONG_PRESS_THRESHOLD) moveSelected(dragStart.x, dragStart.y);
        else window.dispatchEvent(new MouseEvent('mouseup', {button: 0}));
        isDragging = false; selectionBox.style.display = 'none';
    }, {passive: false});

    function animate() {
        requestAnimationFrame(animate);
        units.forEach(u => u.update());
        renderer.render(scene, camera);
        minimap.render(scene);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
