<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebGL IK Character Climb</title>
    <style>
        body { margin: 0; background: #2b2b2b; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #overlay { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="overlay">
        <h3>IK Climbing System</h3>
        <p>Move Mouse: Move Character<br>Auto-snaps to box edge like your Blender model.</p>
    </div>
    <canvas id="c"></canvas>

<script type="module">
    // --- Boilerplate Setup ---
    const canvas = document.querySelector("#c");
    const gl = canvas.getContext("webgl");

    const vs = `
        attribute vec4 a_position;
        uniform mat4 u_matrix;
        void main() { gl_Position = u_matrix * a_position; }
    `;
    const fs = `
        precision mediump float;
        uniform vec4 u_color;
        void main() { gl_FragColor = u_color; }
    `;

    function createProgram(gl, vs, fs) {
        const p = gl.createProgram();
        [vs, fs].forEach((src, i) => {
            const s = gl.createShader(i ? gl.FRAGMENT_SHADER : gl.VERTEX_SHADER);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            gl.attachShader(p, s);
        });
        gl.linkProgram(p);
        return p;
    }

    const program = createProgram(gl, vs, fs);
    const posLoc = gl.getAttribLocation(program, "a_position");
    const matLoc = gl.getUniformLocation(program, "u_matrix");
    const colLoc = gl.getUniformLocation(program, "u_color");

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-0.5,-0.5, 0.5,-0.5, 0.5,0.5, -0.5,0.5]), gl.STATIC_DRAW);

    // --- Math & IK Logic ---
    const m3 = {
        projection: (w, h) => [2/w, 0, 0, 0, -2/h, 0, -1, 1, 1],
        translate: (m, x, y) => [m[0], m[1], m[2], m[3], m[4], m[5], m[0]*x + m[3]*y + m[6], m[1]*x + m[4]*y + m[7], 1],
        scale: (m, x, y) => [m[0]*x, m[1]*x, m[2], m[3]*y, m[4]*y, m[5], m[6], m[7], m[8]],
        rotate: (m, r) => {
            const c = Math.cos(r), s = Math.sin(r);
            return [m[0]*c + m[3]*s, m[1]*c + m[4]*s, 0, m[0]*-s + m[3]*c, m[1]*-s + m[4]*c, 0, m[6], m[7], 1];
        }
    };

    function solveIK(root, target, len1, len2) {
        const dx = target.x - root.x;
        const dy = target.y - root.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const clampedDist = Math.max(0.1, Math.min(len1 + len2 - 0.1, dist));
        
        const a = len1;
        const b = len2;
        const c = clampedDist;
        
        // Law of Cosines to find internal angle
        const cosAngle = (a*a + c*c - b*b) / (2*a*c);
        const angle1 = Math.atan2(dy, dx) - Math.acos(cosAngle);
        
        const elbow = {
            x: root.x + Math.cos(angle1) * len1,
            y: root.y + Math.sin(angle1) * len1
        };
        const angle2 = Math.atan2(target.y - elbow.y, target.x - elbow.x);
        
        return { elbow, angle1, angle2 };
    }

    // --- State & Loop ---
    let mouse = { x: 0, y: 0 };
    window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };

    const boxes = [
        { x: 500, y: 300, w: 120, h: 120 },
        { x: 380, y: 420, w: 120, h: 120 }
    ];

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
        gl.clearColor(0.17, 0.17, 0.17, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.useProgram(program);
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

        const char = { x: mouse.x, y: mouse.y + 100 };
        const shoulder = { x: char.x + 20, y: char.y - 80 };
        let handGoal = { x: char.x + 80, y: char.y - 120 };

        // Surface Attachment Logic (Climbing Sequence)
        boxes.forEach(b => {
            const leftEdge = b.x - b.w/2;
            const topEdge = b.y - b.h/2;
            // If hand is near the box, snap it to the corner/edge
            if (handGoal.x > leftEdge - 30 && handGoal.x < b.x + b.w/2 &&
                handGoal.y > topEdge - 30 && handGoal.y < b.y + b.h/2) {
                handGoal.x = leftEdge;
                handGoal.y = Math.max(topEdge, Math.min(handGoal.y, b.y + b.h/2));
            }
        });

        const ik = solveIK(shoulder, handGoal, 60, 50);

        const draw = (x, y, w, h, r, col) => {
            let m = m3.projection(gl.canvas.width, gl.canvas.height);
            m = m3.translate(m, x, y);
            m = m3.rotate(m, r);
            m = m3.scale(m, w, h);
            gl.uniformMatrix4fv(matLoc, false, m);
            gl.uniform4fv(colLoc, col);
            gl.drawArrays(gl.TRIANGLE_FAN, 0, 4);
        };

        // Draw Environment Boxes
        boxes.forEach(b => draw(b.x, b.y, b.w, b.h, 0, [0.4, 0.4, 0.4, 1]));

        // Draw Character
        draw(char.x, char.y, 40, 100, 0, [0.8, 0.8, 0.8, 1]); // Body
        
        // Upper Arm
        draw(shoulder.x + Math.cos(ik.angle1)*30, shoulder.y + Math.sin(ik.angle1)*30, 60, 10, ik.angle1, [0.6, 0.6, 0.6, 1]);
        // Forearm
        draw(ik.elbow.x + Math.cos(ik.angle2)*25, ik.elbow.y + Math.sin(ik.angle2)*25, 50, 8, ik.angle2, [0.5, 0.5, 0.5, 1]);
        // Hand (Attachment point)
        draw(handGoal.x, handGoal.y, 12, 12, 0, [1, 0.5, 0, 1]);

        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
