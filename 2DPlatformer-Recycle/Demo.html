<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Cleanup: WebGL Platformer</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; image-rendering: pixelated; }
        
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            user-select: none;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 5px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #555;
            pointer-events: auto;
            margin-top: 10px;
        }

        .slot {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .slot img { width: 32px; height: 32px; }
        
        .label { font-weight: bold; text-shadow: 2px 2px 0 #000; margin-bottom: 5px; }
        .controls { position: absolute; bottom: 20px; left: 20px; font-size: 0.8em; opacity: 0.7; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="label">RECYCLING BAG</div>
    <div class="inventory-grid" id="inventory">
        </div>
    <div id="msg" style="margin-top: 10px; color: #4ade80;"></div>
    <div class="controls">WASD / ARROWS to Move & Jump</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/** * SHADERS 
 */
const vsSource = `
    attribute vec2 aPosition;
    attribute vec2 aTexCoord;
    uniform vec2 uResolution;
    uniform vec2 uOffset;
    varying vec2 vTexCoord;
    void main() {
        vec2 p = aPosition + uOffset;
        vec2 zeroToOne = p / uResolution;
        vec2 zeroToTwo = zeroToOne * 2.0;
        vec2 clipSpace = zeroToTwo - 1.0;
        gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
        vTexCoord = aTexCoord;
    }
`;

const fsSource = `
    precision mediump float;
    varying vec2 vTexCoord;
    uniform sampler2D uSampler;
    void main() {
        gl_FragColor = texture2D(uSampler, vTexCoord);
        if(gl_FragColor.a < 0.1) discard;
    }
`;

/**
 * GAME CONFIG & STATE
 */
const TILE_SIZE = 32;
const GRAVITY = 0.5;
const JUMP_FORCE = -10;
const SPEED = 4;

const state = {
    player: { x: 100, y: 100, vx: 0, vy: 0, w: 24, h: 32, grounded: false },
    camera: { x: 0, y: 0 },
    keys: {},
    inventory: Array(8).fill(null),
    items: [
        { x: 300, y: 350, type: 'bottle', collected: false },
        { x: 600, y: 300, type: 'can', collected: false },
        { x: 800, y: 400, type: 'butt', collected: false },
        { x: 1200, y: 350, type: 'bottle', collected: false },
        { x: 450, y: 150, type: 'can', collected: false }
    ],
    level: [
        "                                        ",
        "                                        ",
        "                                        ",
        "          ####                          ",
        "                                        ",
        "    ####          ####            ####  ",
        "                                        ",
        "             ####          ####         ",
        "                                        ",
        "########################################"
    ]
};

const ITEM_TYPES = {
    bottle: { color: '#4da6ff', name: 'Plastic Bottle' },
    can:    { color: '#ff4d4d', name: 'Aluminum Can' },
    butt:   { color: '#ffd14d', name: 'Cigarette Butt' }
};

/**
 * INITIALIZATION
 */
const canvas = document.getElementById('gameCanvas');
const gl = canvas.getContext('webgl');
let program, texture;

function init() {
    // Setup Canvas
    resize();
    window.onresize = resize;

    // Compile Shaders
    const vs = compileShader(gl.VERTEX_SHADER, vsSource);
    const fs = compileShader(gl.FRAGMENT_SHADER, fsSource);
    program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    gl.useProgram(program);

    // Create Atlas Texture (Procedural)
    createTextureAtlas();
    
    // Setup Inventory UI
    const invDom = document.getElementById('inventory');
    for(let i=0; i<8; i++) {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.id = `slot-${i}`;
        invDom.appendChild(slot);
    }

    // Controls
    window.onkeydown = (e) => state.keys[e.code] = true;
    window.onkeyup = (e) => state.keys[e.code] = false;

    requestAnimationFrame(loop);
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
}

/**
 * CORE LOGIC
 */
function update() {
    const p = state.player;

    // Movement
    if (state.keys['ArrowLeft'] || state.keys['KeyA']) p.vx = -SPEED;
    else if (state.keys['ArrowRight'] || state.keys['KeyD']) p.vx = SPEED;
    else p.vx *= 0.8;

    if ((state.keys['ArrowUp'] || state.keys['KeyW'] || state.keys['Space']) && p.grounded) {
        p.vy = JUMP_FORCE;
        p.grounded = false;
    }

    p.vy += GRAVITY;
    
    // Move X
    p.x += p.vx;
    checkCollisions(p, 'x');
    
    // Move Y
    p.y += p.vy;
    p.grounded = false;
    checkCollisions(p, 'y');

    // Camera follow
    state.camera.x += (p.x - canvas.width/2 - state.camera.x) * 0.1;
    
    // Item Pickups
    state.items.forEach(item => {
        if (!item.collected && rectIntersect(p.x, p.y, p.w, p.h, item.x, item.y, 20, 20)) {
            addToInventory(item.type);
            item.collected = true;
        }
    });
}

function checkCollisions(ent, axis) {
    const left = Math.floor(ent.x / TILE_SIZE);
    const right = Math.floor((ent.x + ent.w) / TILE_SIZE);
    const top = Math.floor(ent.y / TILE_SIZE);
    const bottom = Math.floor((ent.y + ent.h) / TILE_SIZE);

    for (let row = top; row <= bottom; row++) {
        for (let col = left; col <= right; col++) {
            if (state.level[row] && state.level[row][col] === '#') {
                if (axis === 'x') {
                    if (ent.vx > 0) ent.x = col * TILE_SIZE - ent.w;
                    else if (ent.vx < 0) ent.x = (col + 1) * TILE_SIZE;
                    ent.vx = 0;
                } else {
                    if (ent.vy > 0) {
                        ent.y = row * TILE_SIZE - ent.h;
                        ent.grounded = true;
                    } else if (ent.vy < 0) ent.y = (row + 1) * TILE_SIZE;
                    ent.vy = 0;
                }
            }
        }
    }
}

function addToInventory(type) {
    const emptyIdx = state.inventory.indexOf(null);
    if (emptyIdx !== -1) {
        state.inventory[emptyIdx] = type;
        const slot = document.getElementById(`slot-${emptyIdx}`);
        slot.innerHTML = `<div style="width:20px; height:30px; background:${ITEM_TYPES[type].color}; border-radius:4px;"></div>`;
        document.getElementById('msg').innerText = `Picked up: ${ITEM_TYPES[type].name}`;
        setTimeout(() => document.getElementById('msg').innerText = '', 2000);
    }
}

/**
 * RENDERING
 */
function draw() {
    gl.clearColor(0.15, 0.15, 0.18, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT);

    const resLoc = gl.getUniformLocation(program, "uResolution");
    gl.uniform2f(resLoc, canvas.width, canvas.height);

    const offsetLoc = gl.getUniformLocation(program, "uOffset");

    // Draw Tiles
    state.level.forEach((row, y) => {
        for(let x = 0; x < row.length; x++) {
            if(row[x] === '#') {
                drawRect(x * TILE_SIZE - state.camera.x, y * TILE_SIZE, TILE_SIZE, TILE_SIZE, [0.3, 0.6, 0.3, 1]);
            }
        }
    });

    // Draw Items
    state.items.forEach(item => {
        if(!item.collected) {
            const col = hexToRgb(ITEM_TYPES[item.type].color);
            drawRect(item.x - state.camera.x, item.y, 16, 24, [...col, 1]);
        }
    });

    // Draw Player
    drawRect(state.player.x - state.camera.x, state.player.y, state.player.w, state.player.h, [0.9, 0.9, 0.9, 1]);
}

function drawRect(x, y, w, h, color) {
    const posLoc = gl.getAttribLocation(program, "aPosition");
    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
        x, y,   x+w, y,   x, y+h,
        x, y+h, x+w, y,   x+w, y+h
    ]), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

    // Simple color bypassing texture for this demo's speed
    // In a full engine we'd use a single white pixel in the atlas
    gl.drawArrays(gl.TRIANGLES, 0, 6);
}

/**
 * HELPERS
 */
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function compileShader(type, source) {
    const s = gl.createShader(type);
    gl.shaderSource(s, source);
    gl.compileShader(s);
    return s;
}

function createTextureAtlas() {
    // Basic 1x1 white texture for colored rects
    texture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([255, 255, 255, 255]));
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
}

function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x2 < x1 + w1 && x2 + w2 > x1 && y2 < y1 + h1 && y2 + h2 > y1;
}

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16) / 255;
    const g = parseInt(hex.slice(3, 5), 16) / 255;
    const b = parseInt(hex.slice(5, 7), 16) / 255;
    return [r, g, b];
}

init();
</script>
</body>
</html>
