<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebGL Spatial Inventory - Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1b; font-family: sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/regl/2.1.0/regl.min.js"></script>
<script>
const canvas = document.getElementById('glCanvas');
const regl = createREGL(canvas);

// --- Configuration & State ---
const GRID_SIZE = 45; 
const PADDING = 2;
const INVENTORY_COLS = 8;
const INVENTORY_ROWS = 6;

let state = {
    mouse: [0, 0],
    draggingItem: null,
    dragOffset: [0, 0],
    slots: {
        head: { x: 450, y: 50, w: 2, h: 2, item: null, type: 'hat', label: 'HEAD' },
        body: { x: 450, y: 150, w: 2, h: 3, item: null, type: 'armor', label: 'BODY' },
        primary: { x: 560, y: 100, w: 5, h: 2, item: null, type: 'weapon', label: 'PRIMARY' }
    },
    // Pure WebGL Button State
    buttons: [
        { id: 'spawn', x: 50, y: 20, w: 120, h: 40, color: [0.3, 0.6, 0.3, 1], text: 'ADD ITEM' }
    ],
    items: [
        { id: Date.now(), name: 'M4A1', type: 'weapon', w: 5, h: 2, x: 0, y: 0, color: [0.4, 0.3, 0.2, 1], count: 1 },
        { id: Date.now()+1, name: 'Ammo', type: 'stackable', w: 1, h: 1, x: 5, y: 0, color: [0.8, 0.7, 0.2, 1], count: 30 }
    ]
};

// --- Rendering Core ---

const drawRect = regl({
    frag: `
    precision mediump float;
    uniform vec4 color;
    void main() { gl_FragColor = color; }`,
    vert: `
    attribute vec2 position;
    uniform vec2 offset;
    uniform vec2 scale;
    uniform vec2 resolution;
    void main() {
        // Convert pixel coordinates to -1 to 1 WebGL space
        vec2 pos = (position * scale + offset) / resolution * 2.0 - 1.0;
        gl_Position = vec4(pos.x, 1.0 - pos.y, 0, 1);
    }`,
    attributes: { position: [[0, 0], [1, 0], [0, 1], [0, 1], [1, 0], [1, 1]] },
    uniforms: {
        color: regl.prop('color'),
        offset: regl.prop('offset'),
        scale: regl.prop('scale'),
        resolution: () => [canvas.width, canvas.height]
    },
    count: 6
});

function render() {
    regl.clear({ color: [0.08, 0.08, 0.09, 1], depth: 1 });

    // 1. Draw Spawn Button (WebGL UI)
    state.buttons.forEach(btn => {
        drawRect({ offset: [btn.x, btn.y], scale: [btn.w, btn.h], color: btn.color });
    });

    // 2. Draw Grid
    for (let i = 0; i < INVENTORY_COLS; i++) {
        for (let j = 0; j < INVENTORY_ROWS; j++) {
            drawRect({
                offset: [50 + i * GRID_SIZE, 100 + j * GRID_SIZE],
                scale: [GRID_SIZE - PADDING, GRID_SIZE - PADDING],
                color: [0.15, 0.15, 0.17, 1]
            });
        }
    }

    // 3. Draw Loadout Slots
    Object.values(state.slots).forEach(slot => {
        drawRect({
            offset: [slot.x, slot.y],
            scale: [slot.w * GRID_SIZE, slot.h * GRID_SIZE],
            color: [0.12, 0.12, 0.14, 1]
        });
    });

    // 4. Draw Items
    state.items.forEach(item => {
        if (item === state.draggingItem) return;
        drawItem(item);
    });

    if (state.draggingItem) {
        drawItem(state.draggingItem, state.mouse[0] - state.dragOffset[0], state.mouse[1] - state.dragOffset[1]);
    }
}

function drawItem(item, overrideX, overrideY) {
    const x = overrideX !== undefined ? overrideX : (item.inSlot ? item.slotRef.x : 50 + item.x * GRID_SIZE);
    const y = overrideY !== undefined ? overrideY : (item.inSlot ? item.slotRef.y : 100 + item.y * GRID_SIZE);
    
    // Draw item body
    drawRect({
        offset: [x, y],
        scale: [item.w * GRID_SIZE - PADDING, item.h * GRID_SIZE - PADDING],
        color: item.color
    });

    // Draw "Stack" indicator if applicable (small square in corner)
    if (item.type === 'stackable') {
        drawRect({
            offset: [x + 2, y + 2],
            scale: [10, 10],
            color: [1, 1, 1, 0.5]
        });
    }
}

// --- Interaction Core ---

function handleDown(mx, my) {
    // Check Buttons first
    state.buttons.forEach(btn => {
        if (mx > btn.x && mx < btn.x + btn.w && my > btn.y && my < btn.y + btn.h) {
            addItem();
            render();
            return;
        }
    });

    state.items.forEach(item => {
        const ix = item.inSlot ? item.slotRef.x : 50 + item.x * GRID_SIZE;
        const iy = item.inSlot ? item.slotRef.y : 100 + item.y * GRID_SIZE;
        
        if (mx > ix && mx < ix + item.w * GRID_SIZE && my > iy && my < iy + item.h * GRID_SIZE) {
            state.draggingItem = item;
            state.dragOffset = [mx - ix, my - iy];
            if (item.inSlot) {
                item.slotRef.item = null;
                item.inSlot = false;
            }
        }
    });
}

function handleMove(mx, my) {
    state.mouse = [mx, my];
    if (state.draggingItem) render();
}

function handleUp() {
    if (!state.draggingItem) return;
    const item = state.draggingItem;
    const mx = state.mouse[0] - state.dragOffset[0];
    const my = state.mouse[1] - state.dragOffset[1];

    let placed = false;

    // 1. Try Loadout Slot
    Object.keys(state.slots).forEach(key => {
        const s = state.slots[key];
        if (mx > s.x - 20 && mx < s.x + 40 && my > s.y - 20 && my < s.y + 40) {
            if (s.type === item.type && !s.item) {
                item.inSlot = true;
                item.slotRef = s;
                s.item = item;
                placed = true;
            }
        }
    });

    // 2. Try Grid & Stacking
    if (!placed) {
        const gridX = Math.round((mx - 50) / GRID_SIZE);
        const gridY = Math.round((my - 100) / GRID_SIZE);

        // Check if dropping on another item for stacking
        const targetItem = state.items.find(i => 
            i !== item && i.type === 'stackable' && item.type === 'stackable' &&
            i.x === gridX && i.y === gridY
        );

        if (targetItem) {
            targetItem.count += item.count;
            state.items = state.items.filter(i => i !== item); // Remove the merged item
            placed = true;
        } else if (gridX >= 0 && gridX + item.w <= INVENTORY_COLS && gridY >= 0 && gridY + item.h <= INVENTORY_ROWS) {
            item.x = gridX;
            item.y = gridY;
            item.inSlot = false;
            placed = true;
        }
    }

    state.draggingItem = null;
    render();
}

function addItem() {
    const types = [
        { name: 'Pistol', type: 'weapon', w: 2, h: 1, color: [0.3, 0.3, 0.5, 1] },
        { name: 'Ammo', type: 'stackable', w: 1, h: 1, color: [0.8, 0.7, 0.2, 1] },
        { name: 'Hat', type: 'hat', w: 2, h: 2, color: [0.2, 0.5, 0.2, 1] }
    ];
    const proto = types[Math.floor(Math.random() * types.length)];
    state.items.push({ ...proto, id: Date.now(), x: 0, y: 5, count: 1 });
}

// --- Event Listeners (Mouse + Touch) ---

canvas.addEventListener('mousedown', e => handleDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
window.addEventListener('mouseup', () => handleUp());

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const touch = e.touches[0];
    handleDown(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const touch = e.touches[0];
    handleMove(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener('touchend', e => {
    handleUp();
});

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    render();
});

// Init
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
render();

</script>
</body>
</html>
