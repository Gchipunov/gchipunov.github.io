<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concrete Commander - Build Protocol</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #hud-bottom {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 160px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0));
            display: flex; justify-content: center; align-items: center; pointer-events: auto;
        }
        .panel {
            background: rgba(20, 30, 40, 0.85); border: 2px solid #4a90e2; border-radius: 8px;
            padding: 15px; display: flex; gap: 10px; backdrop-filter: blur(5px); transition: opacity 0.3s;
        }
        .hidden { opacity: 0; pointer-events: none; }
        button {
            background: linear-gradient(to bottom, #3a4a5a, #2a3a4a); color: white;
            border: 1px solid #5a6a7a; padding: 10px; font-size: 11px; font-weight: bold;
            cursor: pointer; border-radius: 4px; width: 90px; height: 80px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.1s; text-transform: uppercase;
        }
        button:hover { background: #4a90e2; border-color: #7ab0f2; transform: translateY(-2px); }
        .icon { font-size: 22px; margin-bottom: 5px; }
        #info-box { position: absolute; top: 20px; left: 20px; color: #4a90e2; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px; }
        #cursor-tooltip { position: absolute; background: rgba(0,0,0,0.8); color: white; padding: 5px 10px; border-radius: 4px; display: none; font-size: 12px; z-index: 1000; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="info-box">
            <h3>Alliance & Allegence</h3>
            <p>Deploy MCV to enable Construction Yard.</p>
        </div>

        <div id="hud-bottom">
            <div id="panel-mcv" class="panel hidden">
                <div style="color:white; margin-right:10px; width: 80px;"><h3>MCV</h3></div>
                <button id="btn-deploy"><span class="icon">🏗️</span>Deploy</button>
            </div>

            <div id="panel-base" class="panel hidden">
                <div style="color:white; margin-right:10px; width: 80px;"><h3>Base</h3></div>
                <button data-build="Shed"><span class="icon">🛖</span>Shed</button>
                <button data-build="CoalPlant"><span class="icon">🏭</span>Coal Plant</button>
                <button data-build="Barracks"><span class="icon">🎖️</span>Barracks</button>
                <button data-build="Garage"><span class="icon">🚘</span>Garage</button>
                <button data-build="Factory"><span class="icon">⚙️</span>Factory</button>
                <button data-build="Warehouse"><span class="icon">📦</span>Warehouse</button>
            </div>
        </div>
        <div id="cursor-tooltip"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- ENUMS & CONFIG ---
        const BuildType = {
            None: 0,
            Shed: 1,
            CoalPlant: 2,
            Barracks: 3,
            Garage: 4,
            Factory: 5,
            Warehouse: 6
        };

        const COLORS = {
            ground: 0x222222, grid: 0x333333, selection: 0x00ff00,
            mcv: 0xffaa00, base: 0xffcc00, ghost: 0x4490e2,
            [BuildType.Shed]: 0x8b4513,
            [BuildType.CoalPlant]: 0x444444,
            [BuildType.Barracks]: 0x4b5320,
            [BuildType.Garage]: 0x708090,
            [BuildType.Factory]: 0xcc4444,
            [BuildType.Warehouse]: 0x556b2f
        };

        let scene, camera, renderer, controls, raycaster, clock = new THREE.Clock();
        let mouse = new THREE.Vector2(), groundPlane, units = [], buildings = [], selectedEntity = null, placementMode = null;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(-40, 50, 40);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(50, 100, 20);
            sun.castShadow = true;
            scene.add(sun);

            groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: COLORS.ground }));
            groundPlane.rotation.x = -Math.PI / 2;
            groundPlane.receiveShadow = true;
            scene.add(groundPlane);
            scene.add(new THREE.GridHelper(200, 40, COLORS.grid, COLORS.grid));

            raycaster = new THREE.Raycaster();
            spawnMCV(new THREE.Vector3(0, 0, 0));

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('pointermove', onPointerMove);
            window.addEventListener('contextmenu', e => e.preventDefault());

            document.getElementById('btn-deploy').onclick = deployMCV;
            document.querySelectorAll('#panel-base button').forEach(btn => {
                btn.onclick = () => startPlacement(BuildType[btn.dataset.build]);
            });

            animate();
        }

        // --- MESH GENERATORS ---
        // --- MESH GENERATORS ---
        function createBuildingMesh(type) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: COLORS[type] || 0xffffff });
            const detailMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            let geo;

            switch(type) {
                case BuildType.Shed:
                    // Smaller scale, taller roof
                    geo = new THREE.BoxGeometry(1.5, 1.2, 1.5);
                    const shedRoof = new THREE.Mesh(new THREE.ConeGeometry(1.3, 1.8, 4), mat);
                    shedRoof.position.y = 1.8; 
                    shedRoof.rotation.y = Math.PI/4;
                    group.add(shedRoof);
                    break;

                case BuildType.CoalPlant:
                    // Main plant body
                    geo = new THREE.BoxGeometry(4, 2.5, 4);
                    // Dual Cooling Towers (Hyperbolic-ish shape)
                    [ {x: -1, z: -1}, {x: 1, z: 1} ].forEach(p => {
                        const tower = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 1, 3.5, 16), mat);
                        tower.position.set(p.x, 1.5, p.z);
                        group.add(tower);
                        // Smoke rim
                        const rim = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.1, 8, 16), detailMat);
                        rim.rotation.x = Math.PI/2; rim.position.set(p.x, 3.25, p.z);
                        group.add(rim);
                    });
                    break;

                case BuildType.Barracks:
                    // Long segmented military hut
                    geo = new THREE.BoxGeometry(5, 1.8, 3.5);
                    const roofCyl = new THREE.Mesh(new THREE.CylinderGeometry(1.85, 1.85, 5, 3, 1, false, 0, Math.PI), mat);
                    roofCyl.rotation.z = Math.PI/2;
                    roofCyl.position.y = 1.8;
                    group.add(roofCyl);
                    // Add some vents/windows
                    for(let i=-1.5; i<=1.5; i+=1.5) {
                        const vent = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.5, 3.6), detailMat);
                        vent.position.set(i, 1, 0);
                        group.add(vent);
                    }
                    break;

                case BuildType.Garage:
                    // Wide flat building with a prominent bay door
                    geo = new THREE.BoxGeometry(5, 2.2, 5);
                    const bayDoor = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.8, 0.2), detailMat);
                    bayDoor.position.set(0, 0.9, 2.5);
                    group.add(bayDoor);
                    // Add a small side office
                    const office = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), mat);
                    office.position.set(2.8, 0.75, -1);
                    group.add(office);
                    break;

                case BuildType.Factory:
                    // Sawtooth roof design (industrial look)
                    geo = new THREE.BoxGeometry(6, 3, 5);
                    for(let i=-2; i<=2; i+=2) {
                        const sawtooth = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 5, 3), mat);
                        sawtooth.rotation.z = Math.PI/2;
                        sawtooth.position.set(i, 3, 0);
                        group.add(sawtooth);
                    }
                    const craneArm = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, 0.5), detailMat);
                    craneArm.position.set(-2.5, 2, 2);
                    group.add(craneArm);
                    break;

                case BuildType.Warehouse:
                    // Large blocky building with loading docks
                    geo = new THREE.BoxGeometry(6, 4, 6);
                    // Add loading dock stripes
                    const stripes = new THREE.Mesh(new THREE.BoxGeometry(6.1, 0.3, 0.3), new THREE.MeshStandardMaterial({color: 0xffff00}));
                    stripes.position.y = 1; stripes.position.z = 3;
                    group.add(stripes);
                    // Roof AC units
                    const ac = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 1.5), detailMat);
                    ac.position.set(1.5, 4.2, 1.5);
                    group.add(ac);
                    break;

                default: geo = new THREE.BoxGeometry(2, 2, 2);
            }

            const body = new THREE.Mesh(geo, mat);
            body.position.y = geo.parameters.height / 2;
            body.castShadow = body.receiveShadow = true;
            group.add(body);
            return group;
        }
        function createMCVMesh() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 4), new THREE.MeshStandardMaterial({ color: COLORS.mcv }));
            body.position.y = 1.25; group.add(body);
            return group;
        }

        // --- CLASSES ---
        class Entity {
            constructor(mesh, type) {
                this.mesh = mesh;
                this.type = type;
                this.mesh.userData.entity = this;
                this.ring = new THREE.Mesh(new THREE.RingGeometry(3, 3.2, 32), new THREE.MeshBasicMaterial({ color: COLORS.selection, transparent: true, opacity: 0, side: THREE.DoubleSide }));
                this.ring.rotation.x = -Math.PI/2; this.ring.position.y = 0.1;
                this.mesh.add(this.ring);
                scene.add(this.mesh);
            }
            setSelected(val) { 
                this.ring.material.opacity = val ? 1 : 0; 
                document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            }
        }

        class Unit extends Entity {
            constructor(pos) {
                super(createMCVMesh(), 'MCV');
                this.mesh.position.copy(pos);
                this.target = null;
            }
            update(dt) {
                if (this.target) {
                    const dir = new THREE.Vector3().subVectors(this.target, this.mesh.position);
                    if (dir.length() > 0.5) {
                        dir.normalize();
                        this.mesh.position.add(dir.multiplyScalar(10 * dt));
                        this.mesh.lookAt(this.target.x, 0, this.target.z);
                    } else { this.target = null; }
                }
            }
            setSelected(val) {
                super.setSelected(val);
                if(val) document.getElementById('panel-mcv').classList.remove('hidden');
            }
        }

        class Building extends Entity {
            constructor(pos, type) {
                super(createBuildingMesh(type), type);
                this.mesh.position.copy(pos);
                if (type === 'Base') {
                    this.mesh.scale.set(1.5, 1.5, 1.5);
                }
            }
            setSelected(val) {
                super.setSelected(val);
                if(val && this.type === 'Base') document.getElementById('panel-base').classList.remove('hidden');
            }
        }

        // --- GAME ACTIONS ---
        function spawnMCV(pos) { const u = new Unit(pos); units.push(u); }

        function deployMCV() {
            if (selectedEntity && selectedEntity.type === 'MCV') {
                const pos = selectedEntity.mesh.position.clone();
                scene.remove(selectedEntity.mesh);
                units = units.filter(u => u !== selectedEntity);
                const base = new Building(pos, 'Base');
                buildings.push(base);
                deselect();
            }
        }

        function startPlacement(type) {
            if (placementMode) scene.remove(placementMode.mesh);
            const ghost = createBuildingMesh(type);
            ghost.traverse(c => { if(c.isMesh) { c.material = c.material.clone(); c.material.transparent = true; c.material.opacity = 0.6; }});
            scene.add(ghost);
            placementMode = { type, mesh: ghost };
            document.getElementById('cursor-tooltip').style.display = 'block';
            document.getElementById('cursor-tooltip').innerText = "Placing " + Object.keys(BuildType).find(k => BuildType[k] === type);
        }

        function onPointerDown(e) {
            if (e.target.closest('button')) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            if (placementMode && e.button === 0) {
                buildings.push(new Building(placementMode.mesh.position.clone(), placementMode.type));
                scene.remove(placementMode.mesh);
                placementMode = null;
                document.getElementById('cursor-tooltip').style.display = 'none';
                return;
            }

            const intersects = raycaster.intersectObjects([...units.map(u=>u.mesh), ...buildings.map(b=>b.mesh), groundPlane], true);
            if (intersects.length > 0) {
                const hit = intersects[0];
                const entity = hit.object.userData.entity || hit.object.parent?.userData.entity;
                
                if (e.button === 0) {
                    deselect();
                    if (entity) { selectedEntity = entity; entity.setSelected(true); }
                } else if (e.button === 2 && selectedEntity?.type === 'MCV') {
                    selectedEntity.target = hit.point.clone();
                }
            }
        }

        function onPointerMove(e) {
            if (placementMode) {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const hit = raycaster.intersectObject(groundPlane);
                if (hit.length > 0) {
                    placementMode.mesh.position.set(Math.round(hit[0].point.x/2)*2, 0, Math.round(hit[0].point.z/2)*2);
                }
                const tip = document.getElementById('cursor-tooltip');
                tip.style.left = e.clientX + 15 + 'px'; tip.style.top = e.clientY + 15 + 'px';
            }
        }

        function deselect() { if(selectedEntity) selectedEntity.setSelected(false); selectedEntity = null; }
        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            units.forEach(u => u.update(dt));
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
