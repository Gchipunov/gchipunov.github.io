<!DOCTYPE html>
<html>
<body style="margin: 0; overflow: hidden; background: #000;">
<canvas id="glCanvas"></canvas>

<script>
const canvas = document.getElementById('glCanvas');
const gl = canvas.getContext('webgl');

// Vertex Shader: Same as before
const vsSource = `
    attribute vec2 position;
    varying vec2 vTexCoord;
    void main() {
        vTexCoord = vec2((position.x + 1.0) / 2.0, 1.0 - (position.y + 1.0) / 2.0);
        gl_Position = vec4(position, 0.0, 1.0);
    }
`;

// Fragment Shader: Using your specific glitch code
const fsSource = `
    precision highp float;
    uniform float u_time;
    uniform sampler2D u_texture;
    varying vec2 vTexCoord;

    float rand(vec2 co) {
        return fract(sin(dot(co.xy, vec2(12.9898, 78.233))) * 43758.5453);
    }

    void main() {
        vec2 uv = vTexCoord;
        // 1. Scanline Effect
        float scanline = sin(uv.y * 800.0 + u_time * 2.0) * 0.05;
        uv.x += scanline;
        // 2. Glitch Effect
        float glitchIntensity = smoothstep(0.95, 1.0, rand(vec2(u_time * 0.1, 0.0)));
        if (rand(vec2(floor(uv.y * 20.0), u_time)) < 0.05 * glitchIntensity) {
            uv.x += (rand(vec2(u_time, 0.0)) - 0.5) * 0.1;
        }
        // 3. Chromatic Aberration
        float r = texture2D(u_texture, uv + vec2(0.002, 0.0)).r;
        float g = texture2D(u_texture, uv).g;
        float b = texture2D(u_texture, uv - vec2(0.002, 0.0)).b;
        gl_FragColor = vec4(r, g, b, 1.0);
    }
`;

// --- WebGL Setup ---
function createShader(gl, type, source) {
    const s = gl.createShader(type);
    gl.shaderSource(s, source);
    gl.compileShader(s);
    return s;
}

const program = gl.createProgram();
gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
gl.linkProgram(program);
gl.useProgram(program);

// Quad geometry
const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const posAttrib = gl.getAttribLocation(program, "position");
gl.enableVertexAttribArray(posAttrib);
gl.vertexAttribPointer(posAttrib, 2, gl.FLOAT, false, 0, 0);

// Load Texture
const texture = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, texture);
// Set parameters so we don't need power-of-two images
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);

const img = new Image();
img.crossOrigin = "anonymous";
img.onload = () => {
    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
    requestAnimationFrame(render);
};
// REPLACE THIS URL WITH YOUR CHARACTER IMAGE
img.src = "https://www.denofwolves.com/_next/image?url=%2Fimages%2Flanding%2Fguys2-min.webp&w=3840&q=75";

const timeLoc = gl.getUniformLocation(program, "u_time");

function render(time) {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.uniform1f(timeLoc, time * 0.001);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
}
</script>
</body>
</html>
