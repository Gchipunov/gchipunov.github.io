<!DOCTYPE html>
<html>
<body style="margin: 0; overflow: hidden; background: #000;">
<canvas id="glCanvas"></canvas>

<script>
const canvas = document.getElementById('glCanvas');
const gl = canvas.getContext('webgl');

// Vertex Shader: Standard Full-Screen Quad
const vsSource = `
    attribute vec2 position;
    varying vec2 vTexCoord;
    void main() {
        vTexCoord = position * 0.5 + 0.5;
        gl_Position = vec4(position, 0.0, 1.0);
    }
`;

// Fragment Shader: Glitch & Scanline Effect
const fsSource = `
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_res;
    varying vec2 vTexCoord;

    float rand(vec2 co) {
        return fract(sin(dot(co.xy, vec2(12.9898, 78.233))) * 43758.5453);
    }

    void main() {
        vec2 uv = vTexCoord;
        // Glitch displacement
        float glitch = step(0.98, rand(vec2(u_time * 0.1, floor(uv.y * 20.0))));
        uv.x += (rand(vec2(u_time, 0.0)) - 0.5) * glitch * 0.2;
        
        // Scanline
        float scanline = sin(uv.y * 400.0 + u_time * 5.0) * 0.02;
        
        gl_FragColor = vec4(0.1, 0.8, 1.0, 1.0) * (0.8 + scanline);
    }
`;

function createShader(gl, type, source) {
    const s = gl.createShader(type);
    gl.shaderSource(s, source);
    gl.compileShader(s);
    return s;
}

const program = gl.createProgram();
gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
gl.linkProgram(program);
gl.useProgram(program);

const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const posAttrib = gl.getAttribLocation(program, "position");
gl.enableVertexAttribArray(posAttrib);
gl.vertexAttribPointer(posAttrib, 2, gl.FLOAT, false, 0, 0);

const timeLoc = gl.getUniformLocation(program, "u_time");

function render(time) {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.uniform1f(timeLoc, time * 0.001);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
