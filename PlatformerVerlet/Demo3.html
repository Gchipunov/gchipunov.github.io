<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebGL Verlet - Recycling Center</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .touch-ctrl { position: absolute; bottom: 30px; user-select: none; pointer-events: auto; z-index: 10; }
        #joystick-container { left: 20px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
        #joystick-knob { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: #fff; border-radius: 50%; opacity: 0.5; }
        .btn-group { right: 20px; display: flex; gap: 15px; }
        .action-btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid #fff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        #debug { position: absolute; top: 10px; left: 10px; color: #444; pointer-events: none; font-size: 10px; }
    </style>
</head>
<body>
    <div id="debug">CRUSHER TEST | VERLET CAMERA FOLLOW</div>
    <div id="joystick-container" class="touch-ctrl"><div id="joystick-knob"></div></div>
    <div class="touch-ctrl btn-group">
        <div id="btn-duck" class="action-btn">DUCK</div>
        <div id="btn-jump" class="action-btn">JUMP</div>
    </div>
    <canvas id="canvas"></canvas>

<script>
/** @type {HTMLCanvasElement} */
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl');

const vsSource = `
    attribute vec2 aPosition;
    uniform vec2 uResolution;
    uniform vec2 uCameraPos;
    void main() {
        vec2 worldPos = aPosition - uCameraPos;
        vec2 screenPos = (worldPos / uResolution) * 2.0 - 1.0;
        gl_Position = vec4(screenPos * vec2(1, -1), 0, 1);
    }
`;
const fsSource = `
    precision mediump float;
    uniform vec4 uColor;
    void main() { gl_FragColor = uColor; }
`;

function createShader(gl, type, source) {
    const s = gl.createShader(type);
    gl.shaderSource(s, source);
    gl.compileShader(s);
    return s;
}

const program = gl.createProgram();
gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
gl.linkProgram(program);
gl.useProgram(program);

const posLoc = gl.getAttribLocation(program, "aPosition");
const resLoc = gl.getUniformLocation(program, "uResolution");
const camLoc = gl.getUniformLocation(program, "uCameraPos");
const colLoc = gl.getUniformLocation(program, "uColor");
const buffer = gl.createBuffer();

class Particle {
    constructor(x, y, isStatic = false) {
        this.x = x; this.y = y; this.oldX = x; this.oldY = y;
        this.isStatic = isStatic;
    }
}

class Constraint {
    constructor(p1, p2, length, isRope = false) {
        this.p1 = p1; this.p2 = p2; this.length = length; this.isRope = isRope;
    }
}

let particles = [], constraints = [], player = [], crushers = [];
let camX = 0, camY = 0;
const gravity = 0.35, friction = 0.97, groundY = 1200;
const input = { left: false, right: false, up: false, down: false, jump: false, duck: false };

function createBox(x, y, w, h, isStatic = false) {
    let p1 = new Particle(x, y, isStatic);
    let p2 = new Particle(x + w, y, isStatic);
    let p3 = new Particle(x + w, y + h, isStatic);
    let p4 = new Particle(x, y + h, isStatic);
    particles.push(p1, p2, p3, p4);
    constraints.push(
        new Constraint(p1, p2, w), new Constraint(p2, p3, h),
        new Constraint(p3, p4, w), new Constraint(p4, p1, h),
        new Constraint(p1, p3, Math.sqrt(w*w + h*h)),
        new Constraint(p2, p4, Math.sqrt(w*w + h*h))
    );
    return [p1, p2, p3, p4];
}

function init() {
    particles = []; constraints = []; crushers = [];
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // Player
    player = createBox(200, 100, 30, 50);

    // Static Platforms
    createBox(100, 400, 300, 20, true);
    createBox(500, 600, 200, 20, true);
    createBox(800, 450, 100, 300, true);

    // Crane Crusher (Moving platform test)
    crushers.push({
        parts: createBox(1000, 200, 150, 40),
        originY: 200,
        timer: 0
    });
}

// Input setup
const knob = document.getElementById('joystick-knob');
const container = document.getElementById('joystick-container');
container.ontouchmove = (e) => {
    const rect = container.getBoundingClientRect();
    const touch = e.touches[0];
    let dx = touch.clientX - (rect.left + 50), dy = touch.clientY - (rect.top + 50);
    const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
    const a = Math.atan2(dy, dx);
    const tx = Math.cos(a)*d, ty = Math.sin(a)*d;
    knob.style.transform = `translate(${tx}px,${ty}px)`;
    input.left = tx < -10; input.right = tx > 10;
    input.up = ty < -10; input.down = ty > 10;
};
container.ontouchend = () => {
    knob.style.transform = `translate(0,0)`;
    input.left = input.right = input.up = input.down = false;
};
document.getElementById('btn-jump').ontouchstart = () => input.jump = true;
document.getElementById('btn-jump').ontouchend = () => input.jump = false;
document.getElementById('btn-duck').ontouchstart = () => input.duck = true;
document.getElementById('btn-duck').ontouchend = () => input.duck = false;

function update() {
    // Player Physics
    const pTop = player[0], pBot = player[2];
    if (input.left) { pTop.x -= 0.7; pBot.x -= 0.7; }
    if (input.right) { pTop.x += 0.7; pBot.x += 0.7; }
    if (input.jump && pBot.y >= groundY - 5) player.forEach(p => p.y -= 15);

    // Ducking logic
    const h = input.duck ? 20 : 50;
    constraints[1].length = constraints[3].length = h;

    // Crusher Logic
    crushers.forEach(c => {
        c.timer += 0.05;
        const targetY = c.originY + Math.abs(Math.sin(c.timer)) * 400;
        const dy = targetY - c.parts[0].y;
        c.parts.forEach(p => { p.y += dy; p.oldY = p.y; }); // Force move static-like
    });

    // Verlet Integration
    particles.forEach(p => {
        if (!p.isStatic) {
            let vx = (p.x - p.oldX) * friction;
            let vy = (p.y - p.oldY) * friction;
            p.oldX = p.x; p.oldY = p.y;
            p.x += vx; p.y += vy + gravity;
            if (p.y > groundY) { p.y = groundY; p.oldY = p.y + vy * 0.5; }
        }
    });

    // Constraint Solver
    for (let i = 0; i < 8; i++) {
        constraints.forEach(c => {
            let dx = c.p2.x - c.p1.x, dy = c.p2.y - c.p1.y;
            let d = Math.sqrt(dx*dx+dy*dy);
            let diff = (c.length - d) / d * 0.5;
            if (!c.p1.isStatic) { c.p1.x -= dx * diff; c.p1.y -= dy * diff; }
            if (!c.p2.isStatic) { c.p2.x += dx * diff; c.p2.y += dy * diff; }
        });
    }

    // Camera Follow (Center on player)
    const targetX = pTop.x - canvas.width / 2;
    const targetY = pTop.y - canvas.height / 2 + (input.up ? -100 : input.down ? 100 : 0);
    camX += (targetX - camX) * 0.1;
    camY += (targetY - camY) * 0.1;
}

function draw() {
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0.04, 0.04, 0.04, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    
    gl.uniform2f(resLoc, canvas.width, canvas.height);
    gl.uniform2f(camLoc, camX, camY);

    const lines = [];
    constraints.forEach(c => lines.push(c.p1.x, c.p1.y, c.p2.x, c.p2.y));
    lines.push(-5000, groundY, 5000, groundY); // Ground line

    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(lines), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
    
    gl.uniform4f(colLoc, 0, 1, 0.5, 1);
    gl.drawArrays(gl.LINES, 0, lines.length / 2);

    requestAnimationFrame(() => { update(); draw(); });
}

window.onresize = init;
init();
draw();
</script>
</body>
</html>
