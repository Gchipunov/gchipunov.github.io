<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebGL Verlet - Slopes & Rotation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .touch-ctrl { position: absolute; bottom: 30px; user-select: none; pointer-events: auto; z-index: 10; }
        #joystick-container { left: 20px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }
        #joystick-knob { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: #0ff; border-radius: 50%; opacity: 0.4; }
        .btn-group { right: 20px; display: flex; gap: 15px; }
        .action-btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(0,255,255,0.1); border: 2px solid #0ff; color: #0ff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; text-shadow: 0 0 5px #0ff; }
    </style>
</head>
<body>
    <div id="joystick-container" class="touch-ctrl"><div id="joystick-knob"></div></div>
    <div class="touch-ctrl btn-group">
        <div id="btn-duck" class="action-btn">DUCK</div>
        <div id="btn-jump" class="action-btn">JUMP</div>
    </div>
    <canvas id="canvas"></canvas>

<script>
/** @type {HTMLCanvasElement} */
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl');

const vsSource = `
    attribute vec2 aPosition;
    uniform vec2 uResolution;
    uniform vec2 uCameraPos;
    void main() {
        vec2 worldPos = aPosition - uCameraPos;
        vec2 screenPos = (worldPos / uResolution) * 2.0 - 1.0;
        gl_Position = vec4(screenPos * vec2(1, -1), 0, 1);
    }
`;
const fsSource = `
    precision mediump float;
    uniform vec4 uColor;
    void main() { gl_FragColor = uColor; }
`;

function createShader(gl, type, source) {
    const s = gl.createShader(type);
    gl.shaderSource(s, source);
    gl.compileShader(s);
    return s;
}

const program = gl.createProgram();
gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
gl.linkProgram(program);
gl.useProgram(program);

const posLoc = gl.getAttribLocation(program, "aPosition");
const resLoc = gl.getUniformLocation(program, "uResolution");
const camLoc = gl.getUniformLocation(program, "uCameraPos");
const colLoc = gl.getUniformLocation(program, "uColor");
const buffer = gl.createBuffer();

class Particle {
    constructor(x, y) { this.x = x; this.y = y; this.oldX = x; this.oldY = y; }
}

class Constraint {
    constructor(p1, p2, length) { this.p1 = p1; this.p2 = p2; this.length = length; }
}

// Sloped/Angled Platform
class LinePlatform {
    constructor(x1, y1, x2, y2, thickness = 10) {
        this.x1 = x1; this.y1 = y1; this.x2 = x2; this.y2 = y2;
        this.thickness = thickness;
    }
}

let particles = [], constraints = [], player = [], platforms = [];
let camX = 0, camY = 0, time = 0;
const gravity = 0.45, friction = 0.97, groundY = 1800;
const input = { left: false, right: false, up: false, down: false, jump: false, duck: false };

function createBox(x, y, w, h) {
    let p1 = new Particle(x, y), p2 = new Particle(x + w, y);
    let p3 = new Particle(x + w, y + h), p4 = new Particle(x, y + h);
    particles.push(p1, p2, p3, p4);
    constraints.push(
        new Constraint(p1, p2, w), new Constraint(p2, p3, h),
        new Constraint(p3, p4, w), new Constraint(p4, p1, h),
        new Constraint(p1, p3, Math.sqrt(w*w + h*h)), new Constraint(p2, p4, Math.sqrt(w*w + h*h))
    );
    return [p1, p2, p3, p4];
}

function init() {
    particles = []; constraints = []; platforms = [];
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    player = createBox(200, 100, 35, 55);

    // Dynamic NAA Platforms (Slopes)
    platforms.push(new LinePlatform(100, 600, 500, 800)); // Downward slope
    platforms.push(new LinePlatform(600, 800, 1000, 500)); // Upward slope
    platforms.push(new LinePlatform(1100, 500, 1500, 500)); // Flat
    
    // Spinning Crusher (Recycling Center)
    platforms.push(new LinePlatform(1700, 600, 2100, 600, 20)); 
}

// Mobile Input
const knob = document.getElementById('joystick-knob');
const container = document.getElementById('joystick-container');
container.ontouchmove = (e) => {
    const rect = container.getBoundingClientRect();
    const touch = e.touches[0];
    let dx = touch.clientX - (rect.left + 50), dy = touch.clientY - (rect.top + 50);
    const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
    const a = Math.atan2(dy, dx);
    const tx = Math.cos(a)*d, ty = Math.sin(a)*d;
    knob.style.transform = `translate(${tx}px,${ty}px)`;
    input.left = tx < -10; input.right = tx > 10;
    input.up = ty < -10; input.down = ty > 10;
};
container.ontouchend = () => { knob.style.transform = `translate(0,0)`; input.left = input.right = input.up = input.down = false; };
document.getElementById('btn-jump').ontouchstart = () => input.jump = true;
document.getElementById('btn-jump').ontouchend = () => input.jump = false;
document.getElementById('btn-duck').ontouchstart = () => input.duck = true;
document.getElementById('btn-duck').ontouchend = () => input.duck = false;

function resolveCollisions(p) {
    if (p.y > groundY) { p.y = groundY; p.oldY = p.y + (p.y - p.oldY) * 0.3; }

    platforms.forEach(line => {
        const dx = line.x2 - line.x1;
        const dy = line.y2 - line.y1;
        const l2 = dx*dx + dy*dy;
        if (l2 === 0) return;

        let t = ((p.x - line.x1) * dx + (p.y - line.y1) * dy) / l2;
        t = Math.max(0, Math.min(1, t));

        const closestX = line.x1 + t * dx;
        const closestY = line.y1 + t * dy;

        const distDx = p.x - closestX;
        const distDy = p.y - closestY;
        const dist = Math.sqrt(distDx*distDx + distDy*distDy);

        if (dist < line.thickness) {
            const overlap = line.thickness - dist;
            const nx = distDx / dist;
            const ny = distDy / dist;
            p.x += nx * overlap;
            p.y += ny * overlap;
        }
    });
}

function update() {
    time += 0.02;
    // Animate the spinning platform (Crusher)
    const spin = platforms[3];
    const cx = 1900, cy = 600, r = 250;
    spin.x1 = cx + Math.cos(time) * r;
    spin.y1 = cy + Math.sin(time) * r;
    spin.x2 = cx + Math.cos(time + Math.PI) * r;
    spin.y2 = cy + Math.sin(time + Math.PI) * r;

    const pBot = player[2];
    if (input.left) player.forEach(p => p.x -= 0.6);
    if (input.right) player.forEach(p => p.x += 0.6);
    
    // Jump logic
    let grounded = pBot.y >= groundY - 5;
    if (!grounded) {
        platforms.forEach(l => {
            const d = Math.sqrt((pBot.x - l.x1)**2 + (pBot.y - l.y1)**2);
            if (d < l.thickness + 10) grounded = true;
        });
    }
    if (input.jump && grounded) player.forEach(p => p.y -= 15);

    // Physics
    particles.forEach(p => {
        let vx = (p.x - p.oldX) * friction;
        let vy = (p.y - p.oldY) * friction;
        p.oldX = p.x; p.oldY = p.y;
        p.x += vx; p.y += vy + gravity;
        resolveCollisions(p);
    });

    for (let i = 0; i < 5; i++) {
        constraints.forEach(c => {
            let dx = c.p2.x - c.p1.x, dy = c.p2.y - c.p1.y;
            let d = Math.sqrt(dx*dx+dy*dy);
            let diff = (c.length - d) / d * 0.5;
            c.p1.x -= dx * diff; c.p1.y -= dy * diff;
            c.p2.x += dx * diff; c.p2.y += dy * diff;
        });
        particles.forEach(p => resolveCollisions(p));
    }

    camX += ((player[0].x - canvas.width/2) - camX) * 0.1;
    camY += ((player[0].y - canvas.height/2) - camY) * 0.1;
}

function draw() {
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0.02, 0.02, 0.03, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.uniform2f(resLoc, canvas.width, canvas.height);
    gl.uniform2f(camLoc, camX, camY);

    let lines = [];
    constraints.forEach(c => lines.push(c.p1.x, c.p1.y, c.p2.x, c.p2.y));
    platforms.forEach(l => lines.push(l.x1, l.y1, l.x2, l.y2));
    lines.push(-2000, groundY, 5000, groundY);

    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(lines), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
    gl.uniform4f(colLoc, 0, 1, 1, 1);
    gl.drawArrays(gl.LINES, 0, lines.length / 2);

    requestAnimationFrame(() => { update(); draw(); });
}

window.onresize = init;
init();
draw();
</script>
</body>
</html>
