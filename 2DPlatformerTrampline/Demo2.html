<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebGL Bending Trampoline Platformer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            overflow: hidden; /* Prevent scrolling when pressing buttons */
        }
        
        canvas {
            background-color: #222;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            /* Make canvas scale down on mobile screens while keeping aspect ratio */
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        .instructions {
            position: absolute;
            top: 10px;
            text-align: center;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
            font-size: 14px;
        }

        /* --- Mobile Controls CSS --- */
        #mobileControls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none; /* Let clicks pass through empty space */
        }

        .control-group {
            display: flex;
            gap: 15px;
            pointer-events: auto; /* Re-enable clicks for the buttons */
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 24px;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none; /* iOS Safari */
            touch-action: none; /* Prevents default touch actions like panning */
            cursor: pointer;
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.5);
            border-color: white;
        }

        /* Hide buttons on larger desktop screens if desired (optional) */
        @media (min-width: 900px) {
            #mobileControls {
                opacity: 0.5; /* Keeping them visible but faded for desktop testing */
            }
        }
    </style>
</head>
<body>

    <div class="instructions">
        <h2>WebGL Platformer</h2>
        <p>Use <b>Arrow Keys / Touch Buttons</b> to move and jump.<br>Land on the orange trampoline!</p>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="mobileControls">
        <div class="control-group">
            <div class="btn" id="btnLeft">⬅️</div>
            <div class="btn" id="btnRight">➡️</div>
        </div>
        <div class="control-group">
            <div class="btn" id="btnJump">⬆️</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const gl = canvas.getContext('webgl');

        if (!gl) {
            alert('WebGL not supported in your browser.');
        }

        // --- WebGL Setup & Shaders ---
        const vsSource = `
            attribute vec2 a_position;
            uniform vec2 u_resolution;
            void main() {
                vec2 zeroToOne = a_position / u_resolution;
                vec2 zeroToTwo = zeroToOne * 2.0;
                vec2 clipSpace = zeroToTwo - 1.0;
                gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
            }
        `;

        const fsSource = `
            precision mediump float;
            uniform vec4 u_color;
            void main() {
                gl_FragColor = u_color;
            }
        `;

        function compileShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
            }
            return shader;
        }

        const vertexShader = compileShader(gl, gl.VERTEX_SHADER, vsSource);
        const fragmentShader = compileShader(gl, gl.FRAGMENT_SHADER, fsSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        gl.useProgram(program);

        const positionLocation = gl.getAttribLocation(program, "a_position");
        const resolutionLocation = gl.getUniformLocation(program, "u_resolution");
        const colorLocation = gl.getUniformLocation(program, "u_color");

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);

        gl.uniform2f(resolutionLocation, canvas.width, canvas.height);

        // --- Drawing Helpers ---
        function drawTriangles(positions, color) {
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);
            
            gl.enableVertexAttribArray(positionLocation);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
            
            gl.uniform4f(colorLocation, color[0], color[1], color[2], color[3]);
            gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
        }

        function drawRect(x, y, w, h, color) {
            const positions = [
                x, y,        x + w, y,        x, y + h,
                x, y + h,    x + w, y,        x + w, y + h
            ];
            drawTriangles(positions, color);
        }

        function drawBendingTrampoline(x, y, w, h, springY, impactX, color) {
            const positions = [
                x, y + h,       x, y,                   impactX, y + springY,
                x, y + h,       impactX, y + springY,   x + w, y + h,        
                x + w, y + h,   impactX, y + springY,   x + w, y             
            ];
            drawTriangles(positions, color);
        }

        // --- Input Handling (Keyboard & Mobile) ---
        const keys = {};
        
        // Keyboard Listeners
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Mobile Touch Listeners
        function setupTouchButton(buttonId, keyCode) {
            const btn = document.getElementById(buttonId);
            
            // Touch events for mobile
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyCode] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyCode] = false; });
            btn.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[keyCode] = false; });
            
            // Mouse events so it also works if you click them on desktop
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); keys[keyCode] = true; });
            btn.addEventListener('mouseup', (e) => { e.preventDefault(); keys[keyCode] = false; });
            btn.addEventListener('mouseleave', (e) => { e.preventDefault(); keys[keyCode] = false; });
        }

        // Map UI buttons to the keyboard codes the engine already expects
        setupTouchButton('btnLeft', 'ArrowLeft');
        setupTouchButton('btnRight', 'ArrowRight');
        setupTouchButton('btnJump', 'ArrowUp');


        // --- Game State & Physics ---
        const player = {
            x: 100, y: 100, w: 30, h: 30,
            vx: 0, vy: 0,
            color: [0.2, 0.6, 1.0, 1.0] 
        };

        const ground = {
            x: 0, y: 500, w: 800, h: 100,
            color: [0.2, 0.8, 0.3, 1.0] 
        };

        const tramp = {
            x: 400, y: 450, w: 150, h: 50,
            springY: 0, springVy: 0, impactX: 475,
            color: [1.0, 0.4, 0.0, 1.0] 
        };

        const gravity = 0.6;
        const friction = 0.8;

        function update() {
            if (keys['ArrowLeft']) player.vx -= 1.5;
            if (keys['ArrowRight']) player.vx += 1.5;
            player.vx *= friction;

            let oldY = player.y;
            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 0) player.x = 0;
            if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

            let isGrounded = false;

            if (player.y + player.h >= ground.y && oldY + player.h <= ground.y) {
                player.y = ground.y - player.h;
                player.vy = 0;
                isGrounded = true;
            }

            if (player.vy > 0) { 
                if (player.y + player.h >= tramp.y && oldY + player.h <= tramp.y + 10 &&
                    player.x + player.w > tramp.x && player.x < tramp.x + tramp.w) {
                    
                    player.y = tramp.y - player.h;
                    player.vy = -18; 
                    
                    tramp.springY = 45; 
                    tramp.springVy = 0;
                    tramp.impactX = Math.max(tramp.x, Math.min(tramp.x + tramp.w, player.x + player.w / 2));
                }
            }

            if ((keys['ArrowUp'] || keys['Space']) && isGrounded) {
                player.vy = -12;
            }

            const springK = 0.15;   
            const springDamp = 0.12; 
            
            tramp.springVy += -springK * tramp.springY - springDamp * tramp.springVy;
            tramp.springY += tramp.springVy;
        }

        function draw() {
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.clearColor(0.1, 0.1, 0.1, 1.0); 
            gl.clear(gl.COLOR_BUFFER_BIT);

            drawRect(ground.x, ground.y, ground.w, ground.h, ground.color);
            drawBendingTrampoline(tramp.x, tramp.y, tramp.w, tramp.h, tramp.springY, tramp.impactX, tramp.color);
            drawRect(player.x, player.y, player.w, player.h, player.color);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
