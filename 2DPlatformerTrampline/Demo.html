<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Bending Trampoline Platformer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            background-color: #222;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
        .instructions {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="instructions">
        <h2>WebGL Platformer</h2>
        <p>Use <b>Arrow Keys</b> to move. Press <b>Up</b> to jump.<br>Land on the orange trampoline to see it bend and super-jump!</p>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const gl = canvas.getContext('webgl');

        if (!gl) {
            alert('WebGL not supported in your browser.');
        }

        // --- WebGL Setup & Shaders ---

        // Vertex Shader: Converts pixel coordinates to WebGL clip space (-1 to 1)
        const vsSource = `
            attribute vec2 a_position;
            uniform vec2 u_resolution;
            void main() {
                vec2 zeroToOne = a_position / u_resolution;
                vec2 zeroToTwo = zeroToOne * 2.0;
                vec2 clipSpace = zeroToTwo - 1.0;
                // Invert Y so 0 is at the top (like standard 2D canvas)
                gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
            }
        `;

        // Fragment Shader: Colors the pixels
        const fsSource = `
            precision mediump float;
            uniform vec4 u_color;
            void main() {
                gl_FragColor = u_color;
            }
        `;

        function compileShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
            }
            return shader;
        }

        const vertexShader = compileShader(gl, gl.VERTEX_SHADER, vsSource);
        const fragmentShader = compileShader(gl, gl.FRAGMENT_SHADER, fsSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        gl.useProgram(program);

        // Look up memory locations
        const positionLocation = gl.getAttribLocation(program, "a_position");
        const resolutionLocation = gl.getUniformLocation(program, "u_resolution");
        const colorLocation = gl.getUniformLocation(program, "u_color");

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);

        gl.uniform2f(resolutionLocation, canvas.width, canvas.height);

        // --- Drawing Helpers ---

        function drawTriangles(positions, color) {
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);
            
            gl.enableVertexAttribArray(positionLocation);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
            
            gl.uniform4f(colorLocation, color[0], color[1], color[2], color[3]);
            gl.drawArrays(gl.TRIANGLES, 0, positions.length / 2);
        }

        function drawRect(x, y, w, h, color) {
            const positions = [
                x, y,        x + w, y,        x, y + h,
                x, y + h,    x + w, y,        x + w, y + h
            ];
            drawTriangles(positions, color);
        }

        function drawBendingTrampoline(x, y, w, h, springY, impactX, color) {
            // Draws a rectangle made of 3 triangles so the top surface can visually bend at impactX
            const positions = [
                x, y + h,       x, y,                   impactX, y + springY,  // Left Triangle
                x, y + h,       impactX, y + springY,   x + w, y + h,          // Bottom Triangle
                x + w, y + h,   impactX, y + springY,   x + w, y               // Right Triangle
            ];
            drawTriangles(positions, color);
        }

        // --- Game State & Physics ---

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        const player = {
            x: 100, y: 100, w: 30, h: 30,
            vx: 0, vy: 0,
            color: [0.2, 0.6, 1.0, 1.0] // Blue
        };

        const ground = {
            x: 0, y: 500, w: 800, h: 100,
            color: [0.2, 0.8, 0.3, 1.0] // Green
        };

        const tramp = {
            x: 400, y: 450, w: 150, h: 50,
            springY: 0, springVy: 0, impactX: 475,
            color: [1.0, 0.4, 0.0, 1.0] // Orange
        };

        const gravity = 0.6;
        const friction = 0.8;

        function update() {
            // Player horizontal movement
            if (keys['ArrowLeft']) player.vx -= 1.5;
            if (keys['ArrowRight']) player.vx += 1.5;
            player.vx *= friction;

            // Apply gravity
            let oldY = player.y;
            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;

            // Screen boundaries
            if (player.x < 0) player.x = 0;
            if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

            let isGrounded = false;

            // 1. Ground Collision (Standard)
            if (player.y + player.h >= ground.y && oldY + player.h <= ground.y) {
                player.y = ground.y - player.h;
                player.vy = 0;
                isGrounded = true;
            }

            // 2. Trampoline Collision (Bending Logic)
            if (player.vy > 0) { // Only collide if falling down
                if (player.y + player.h >= tramp.y && oldY + player.h <= tramp.y + 10 &&
                    player.x + player.w > tramp.x && player.x < tramp.x + tramp.w) {
                    
                    player.y = tramp.y - player.h;
                    player.vy = -18; // Super Jump bounce!
                    
                    // Trigger the visual bend physics
                    tramp.springY = 45; // Push the surface down 45 pixels
                    tramp.springVy = 0;
                    
                    // Center the bend exactly where the player landed
                    tramp.impactX = Math.max(tramp.x, Math.min(tramp.x + tramp.w, player.x + player.w / 2));
                }
            }

            // Normal Jump
            if ((keys['ArrowUp'] || keys['Space']) && isGrounded) {
                player.vy = -12;
            }

            // Update Trampoline Spring Physics (Hooke's Law)
            const springK = 0.15;   // Stiffness
            const springDamp = 0.12; // Damping/friction
            
            tramp.springVy += -springK * tramp.springY - springDamp * tramp.springVy;
            tramp.springY += tramp.springVy;
        }

        function draw() {
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.clearColor(0.1, 0.1, 0.1, 1.0); // Dark gray background
            gl.clear(gl.COLOR_BUFFER_BIT);

            // Draw Ground
            drawRect(ground.x, ground.y, ground.w, ground.h, ground.color);

            // Draw Trampoline (with dynamic bending top)
            drawBendingTrampoline(tramp.x, tramp.y, tramp.w, tramp.h, tramp.springY, tramp.impactX, tramp.color);

            // Draw Player
            drawRect(player.x, player.y, player.w, player.h, player.color);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the loop
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
