<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRIME WARS Glitch Effect</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .glitch-container {
            position: relative;
            font-family: 'Impact', sans-serif;
            font-size: 8rem;
            color: #fff;
            text-transform: uppercase;
        }

        .text {
            position: relative;
            z-index: 2;
        }

        /* Glitch Animation */
        .text::before, .text::after {
            content: "CRIME WARS";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .text::before {
            color: #ff003c;
            animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
        }

        .text::after {
            color: #00e5ff;
            animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) reverse both infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-5px, 5px) }
            40% { transform: translate(-5px, -5px) }
            60% { transform: translate(5px, 5px) }
            80% { transform: translate(5px, -5px) }
            100% { transform: translate(0) }
        }
    </style>
</head>
<body>

    <div class="glitch-container">
        <div class="text">CRIME WARS</div>
    </div>

</body>
</html>
