<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden;">
<canvas id="glCanvas"></canvas>

<script type="x-shader/x-vertex" id="vs">
    attribute vec2 position;
    void main() { gl_Position = vec4(position, 0.0, 1.0); }
</script>

<script type="x-shader/x-fragment" id="fs">
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_resolution;

    // Simple pseudo-random function
    float rand(vec2 co) { return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); }

    void main() {
        vec2 uv = gl_FragCoord.xy / u_resolution.xy;
        
        // Glitch intensity based on time
        float glitch = step(0.95, rand(vec2(floor(u_time * 10.0), 0.0)));
        vec2 offset = vec2(glitch * 0.05 * (rand(uv) - 0.5), 0.0);
        
        // Chromatic aberration (RGB shift)
        float r = texture2D(vec4(1.0), uv + offset).r;
        float g = texture2D(vec4(1.0), uv).g;
        float b = texture2D(vec4(1.0), uv - offset).b;
        
        // Mock text rendering (simplistic signal block)
        float mask = (uv.y > 0.4 && uv.y < 0.6) ? 1.0 : 0.0;
        vec3 color = mix(vec3(0.1), vec3(r + 0.1, g + 0.1, b + 0.1), mask);
        
        gl_FragColor = vec4(color, 1.0);
    }
</script>

<script>
    const canvas = document.getElementById('glCanvas');
    const gl = canvas.getContext('webgl');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const program = gl.createProgram();
    const addShader = (type, src) => {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        gl.attachShader(program, s);
    };
    addShader(gl.VERTEX_SHADER, document.getElementById('vs').text);
    addShader(gl.FRAGMENT_SHADER, document.getElementById('fs').text);
    gl.linkProgram(program);
    gl.useProgram(program);

    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    
    const pos = gl.getAttribLocation(program, "position");
    gl.enableVertexAttribArray(pos);
    gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

    const uTime = gl.getUniformLocation(program, "u_time");
    const uRes = gl.getUniformLocation(program, "u_resolution");

    function render(time) {
        gl.uniform1f(uTime, time * 0.001);
        gl.uniform2f(uRes, canvas.width, canvas.height);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
</script>
</body>
</html>
