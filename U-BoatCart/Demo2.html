<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>U-Boat Cart: Mobile Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; 
            font-family: Arial, sans-serif;
            background-color: #222;
            /* Prevent text selection and zooming on mobile */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            text-shadow: 2px 2px 4px #000000;
            pointer-events: none;
        }
        h1 { margin: 0; font-size: 20px; }
        p { margin: 5px 0 0 0; font-size: 14px; color: #ccc;}
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        /* --- MOBILE CONTROLS UI --- */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 20;
        }
        #joystick-knob {
            position: absolute;
            top: 35px; /* Center it (120/2 - 50/2) */
            left: 35px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none; /* Let touches pass through to the zone */
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 40px;
            width: 90px;
            height: 90px;
            background: rgba(43, 87, 151, 0.7);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 18px;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        #action-btn:active {
            background: rgba(43, 87, 151, 1.0);
            transform: scale(0.95);
        }
        
        /* Hide controls on larger screens if desired, but we'll leave them visible for testing */
    </style>
</head>
<body>

    <div id="ui">
        <h1>Grab a package and park at S5</h1>
        <p>Use joystick to drive, right button to grab/drop.</p>
    </div>
    
    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    <div id="action-btn">GRAB</div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. LIGHTING
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 3. WAREHOUSE FLOOR & S5 LOCATION
        const floorGeo = new THREE.PlaneGeometry(150, 150);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const targetGeo = new THREE.PlaneGeometry(8, 12);
        const targetMat = new THREE.MeshBasicMaterial({ color: 0x00aa00 });
        const s5Zone = new THREE.Mesh(targetGeo, targetMat);
        s5Zone.rotation.x = -Math.PI / 2;
        s5Zone.position.set(20, 0.05, -20);
        scene.add(s5Zone);

        // 4. THE U-BOAT CART
        const cart = new THREE.Group();
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x2b5797 });
        const handleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
        
        const base = new THREE.Mesh(new THREE.BoxGeometry(3, 0.5, 8), baseMat);
        base.position.y = 0.5;
        cart.add(base);
        
        const frontHandle = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 0.3), handleMat);
        frontHandle.position.set(0, 3, 3.85);
        cart.add(frontHandle);
        
        const backHandle = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 0.3), handleMat);
        backHandle.position.set(0, 3, -3.85);
        cart.add(backHandle);

        cart.position.set(-10, 0, 10);
        scene.add(cart);

        // 5. PACKAGES (Cardboard Boxes)
        const packages = [];
        const boxGeo = new THREE.BoxGeometry(2, 2, 2);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0xc19a6b }); // Cardboard brown

        // Create 3 random boxes
        const boxPositions = [
            {x: 5, z: 5}, {x: -15, z: -5}, {x: 0, z: -15}
        ];

        boxPositions.forEach(pos => {
            const box = new THREE.Mesh(boxGeo, boxMat);
            box.position.set(pos.x, 1, pos.z); // Y is 1 so it sits on the floor
            scene.add(box);
            packages.push(box);
        });

        // 6. JOYSTICK & INPUT LOGIC
        const keys = { w: false, a: false, s: false, d: false };
        let stickX = 0; // -1 (left) to 1 (right)
        let stickY = 0; // -1 (up) to 1 (down)
        
        // Keyboard fallbacks
        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        // Virtual Joystick Logic
        const joyZone = document.getElementById('joystick-zone');
        const joyKnob = document.getElementById('joystick-knob');
        const maxRadius = 35; // How far the knob can move
        let joystickCenter = { x: 0, y: 0 };
        let touchingJoystick = false;

        joyZone.addEventListener('touchstart', (e) => {
            touchingJoystick = true;
            const rect = joyZone.getBoundingClientRect();
            joystickCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
        });

        joyZone.addEventListener('touchmove', (e) => {
            if (!touchingJoystick) return;
            e.preventDefault(); // Prevent scrolling
            updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
        });

        joyZone.addEventListener('touchend', () => {
            touchingJoystick = false;
            stickX = 0;
            stickY = 0;
            joyKnob.style.transform = `translate(0px, 0px)`;
        });

        function updateJoystick(touchX, touchY) {
            let dx = touchX - joystickCenter.x;
            let dy = touchY - joystickCenter.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            // Clamp to max radius
            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            
            // Normalize for game engine (-1.0 to 1.0)
            stickX = dx / maxRadius;
            stickY = dy / maxRadius;
        }

        // 7. PACKAGE PICKUP LOGIC
        const actionBtn = document.getElementById('action-btn');
        let heldPackage = null;

        function handleAction() {
            if (heldPackage) {
                // DROP PACKAGE
                // Convert local cart coordinates back to world coordinates
                const worldPos = new THREE.Vector3();
                heldPackage.getWorldPosition(worldPos);
                
                cart.remove(heldPackage);
                scene.add(heldPackage);
                
                heldPackage.position.copy(worldPos);
                heldPackage.position.y = 1; // Drop it to the floor
                
                heldPackage = null;
                actionBtn.innerText = "GRAB";
                actionBtn.style.background = "rgba(43, 87, 151, 0.7)"; // Blue
            } else {
                // PICK UP PACKAGE
                let closestPkg = null;
                let minDistance = 5.0; // Pickup range

                packages.forEach(pkg => {
                    if (pkg.parent === scene) { // Only check packages on the floor
                        const dist = cart.position.distanceTo(pkg.position);
                        if (dist < minDistance) {
                            minDistance = dist;
                            closestPkg = pkg;
                        }
                    }
                });

                if (closestPkg) {
                    scene.remove(closestPkg);
                    cart.add(closestPkg);
                    
                    // Place it nicely on the center of the U-Boat deck
                    closestPkg.position.set(0, 1.75, 0); 
                    closestPkg.rotation.set(0, 0, 0);
                    
                    heldPackage = closestPkg;
                    actionBtn.innerText = "DROP";
                    actionBtn.style.background = "rgba(200, 50, 50, 0.7)"; // Red
                }
            }
        }

        // Support both touch and mouse click for the action button
        actionBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(); });
        actionBtn.addEventListener('mousedown', (e) => { e.preventDefault(); handleAction(); });

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        // 8. GAME LOOP
        const uiText = document.querySelector('#ui h1');
        let gameWon = false;

        function animate() {
            requestAnimationFrame(animate);

            if (!gameWon) {
                // Calculate speeds from both keyboard and joystick
                let moveSpeed = 0;
                let tSpeed = 0;

                // Keyboard input
                if (keys.w) moveSpeed = -0.15;
                if (keys.s) moveSpeed = 0.15;
                if (keys.a) tSpeed = 0.03;
                if (keys.d) tSpeed = -0.03;

                // Joystick input (Overrides keyboard if being used)
                if (touchingJoystick) {
                    moveSpeed = stickY * 0.15; // Up on stick = negative Y = forward
                    tSpeed = -stickX * 0.03;   // Left on stick = negative X = positive rotation
                }

                cart.translateZ(moveSpeed);
                cart.rotation.y += tSpeed;

                // Smooth Camera Follow
                const relativeCameraOffset = new THREE.Vector3(0, 15, 20);
                const cameraOffset = relativeCameraOffset.applyMatrix4(cart.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(cart.position);

                // Win Condition: Parked at S5 WITH a package
                const distanceToTarget = cart.position.distanceTo(s5Zone.position);
                if (distanceToTarget < 4.0 && heldPackage) {
                    gameWon = true;
                    uiText.innerText = "Delivery Complete! Good job.";
                    uiText.style.color = "#00ff00";
                    actionBtn.style.display = 'none'; // Hide button on win
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
