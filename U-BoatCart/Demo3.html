<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>U-Boat Cart: Collision Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; 
            font-family: Arial, sans-serif;
            background-color: #222;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            text-shadow: 2px 2px 4px #000000;
            pointer-events: none;
        }
        h1 { margin: 0; font-size: 20px; }
        p { margin: 5px 0 0 0; font-size: 14px; color: #ccc;}
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        /* --- MOBILE CONTROLS UI --- */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 20;
        }
        #joystick-knob {
            position: absolute;
            top: 35px; 
            left: 35px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 40px;
            width: 90px;
            height: 90px;
            background: rgba(43, 87, 151, 0.7);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 18px;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        #action-btn:active {
            background: rgba(43, 87, 151, 1.0);
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Grab a package and park at S5</h1>
        <p>Watch out for parked carts! They are solid now.</p>
    </div>
    
    <div id="joystick-zone"><div id="joystick-knob"></div></div>
    <div id="action-btn">GRAB</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 2. FLOOR & TARGET ZONE
        const floorGeo = new THREE.PlaneGeometry(150, 150);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const targetGeo = new THREE.PlaneGeometry(8, 12);
        const targetMat = new THREE.MeshBasicMaterial({ color: 0x00aa00 });
        const s5Zone = new THREE.Mesh(targetGeo, targetMat);
        s5Zone.rotation.x = -Math.PI / 2;
        s5Zone.position.set(20, 0.05, -20);
        scene.add(s5Zone);

        // 3. CART GENERATOR FUNCTION
        // We use a function so we can make multiple carts easily
        function createCart(baseColor) {
            const cartGroup = new THREE.Group();
            const baseMat = new THREE.MeshStandardMaterial({ color: baseColor });
            const handleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
            
            const base = new THREE.Mesh(new THREE.BoxGeometry(3, 0.5, 8), baseMat);
            base.position.y = 0.5;
            cartGroup.add(base);
            
            const frontHandle = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 0.3), handleMat);
            frontHandle.position.set(0, 3, 3.85);
            cartGroup.add(frontHandle);
            
            const backHandle = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 0.3), handleMat);
            backHandle.position.set(0, 3, -3.85);
            cartGroup.add(backHandle);

            return cartGroup;
        }

        // --- THE PLAYER CART ---
        const cart = createCart(0x2b5797); // Blue
        cart.position.set(-10, 0, 10);
        scene.add(cart);

        // --- OBSTACLE CARTS ---
        const collidables = []; // Array to hold everything we can crash into

        const obsCart1 = createCart(0x972b2b); // Red
        obsCart1.position.set(5, 0, 0);
        obsCart1.rotation.y = Math.PI / 4; // Angled slightly
        scene.add(obsCart1);
        collidables.push(obsCart1);

        const obsCart2 = createCart(0x8a972b); // Yellow
        obsCart2.position.set(10, 0, -10);
        obsCart2.rotation.y = Math.PI / 2; // Sideways
        scene.add(obsCart2);
        collidables.push(obsCart2);

        // 4. PACKAGES (Cardboard Boxes)
        const packages = [];
        const boxGeo = new THREE.BoxGeometry(2, 2, 2);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0xc19a6b }); 

        const boxPositions = [ {x: 5, z: 15}, {x: -15, z: -5}, {x: 0, z: -15} ];

        boxPositions.forEach(pos => {
            const box = new THREE.Mesh(boxGeo, boxMat);
            box.position.set(pos.x, 1, pos.z); 
            scene.add(box);
            packages.push(box);
            collidables.push(box); // Add boxes to collision list
        });

        // 5. INPUT LOGIC (Keyboard & Joystick)
        const keys = { w: false, a: false, s: false, d: false };
        let stickX = 0, stickY = 0;
        
        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        const joyZone = document.getElementById('joystick-zone');
        const joyKnob = document.getElementById('joystick-knob');
        const maxRadius = 35; 
        let joystickCenter = { x: 0, y: 0 };
        let touchingJoystick = false;

        joyZone.addEventListener('touchstart', (e) => {
            touchingJoystick = true;
            const rect = joyZone.getBoundingClientRect();
            joystickCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
        });
        joyZone.addEventListener('touchmove', (e) => {
            if (!touchingJoystick) return;
            e.preventDefault(); 
            updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
        });
        joyZone.addEventListener('touchend', () => {
            touchingJoystick = false;
            stickX = 0; stickY = 0;
            joyKnob.style.transform = `translate(0px, 0px)`;
        });

        function updateJoystick(touchX, touchY) {
            let dx = touchX - joystickCenter.x;
            let dy = touchY - joystickCenter.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance > maxRadius) { dx = (dx / distance) * maxRadius; dy = (dy / distance) * maxRadius; }
            joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            stickX = dx / maxRadius; stickY = dy / maxRadius;
        }

        // 6. PACKAGE PICKUP LOGIC
        const actionBtn = document.getElementById('action-btn');
        let heldPackage = null;

        function handleAction() {
            if (heldPackage) {
                // Drop Package
                const worldPos = new THREE.Vector3();
                heldPackage.getWorldPosition(worldPos);
                cart.remove(heldPackage);
                scene.add(heldPackage);
                heldPackage.position.copy(worldPos);
                heldPackage.position.y = 1; 
                collidables.push(heldPackage); // Re-add to collidables
                heldPackage = null;
                actionBtn.innerText = "GRAB";
                actionBtn.style.background = "rgba(43, 87, 151, 0.7)"; 
            } else {
                // Pickup Package
                let closestPkg = null;
                let minDistance = 5.0; 

                packages.forEach(pkg => {
                    if (pkg.parent === scene) { 
                        const dist = cart.position.distanceTo(pkg.position);
                        if (dist < minDistance) { minDistance = dist; closestPkg = pkg; }
                    }
                });

                if (closestPkg) {
                    scene.remove(closestPkg);
                    cart.add(closestPkg);
                    closestPkg.position.set(0, 1.75, 0); 
                    closestPkg.rotation.set(0, 0, 0);
                    
                    // Remove from collidables so we don't crash into our own package
                    const index = collidables.indexOf(closestPkg);
                    if (index > -1) collidables.splice(index, 1);

                    heldPackage = closestPkg;
                    actionBtn.innerText = "DROP";
                    actionBtn.style.background = "rgba(200, 50, 50, 0.7)"; 
                }
            }
        }

        actionBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(); });
        actionBtn.addEventListener('mousedown', (e) => { e.preventDefault(); handleAction(); });

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        // 7. COLLISION DETECTION HELPER
        // Checks if the player's bounding box overlaps with any obstacle's bounding box
        function checkCollisions() {
            const playerBox = new THREE.Box3().setFromObject(cart);
            for (let i = 0; i < collidables.length; i++) {
                const obstacleBox = new THREE.Box3().setFromObject(collidables[i]);
                if (playerBox.intersectsBox(obstacleBox)) {
                    return true; // Collision detected!
                }
            }
            return false;
        }

        // 8. GAME LOOP
        const uiText = document.querySelector('#ui h1');
        let gameWon = false;

        function animate() {
            requestAnimationFrame(animate);

            if (!gameWon) {
                let moveSpeed = 0;
                let tSpeed = 0;

                if (keys.w) moveSpeed = -0.15;
                if (keys.s) moveSpeed = 0.15;
                if (keys.a) tSpeed = 0.03;
                if (keys.d) tSpeed = -0.03;

                if (touchingJoystick) {
                    moveSpeed = stickY * 0.15; 
                    tSpeed = -stickX * 0.03;   
                }

                // --- 2-STEP COLLISION CHECK ---
                
                // Step 1: Check Rotation
                const oldRotation = cart.rotation.y;
                cart.rotation.y += tSpeed;
                if (checkCollisions()) {
                    cart.rotation.y = oldRotation; // Bumped! Undo rotation.
                }

                // Step 2: Check Movement
                const oldPosition = cart.position.clone();
                cart.translateZ(moveSpeed);
                if (checkCollisions()) {
                    cart.position.copy(oldPosition); // Bumped! Undo movement.
                }

                // Camera Follow
                const relativeCameraOffset = new THREE.Vector3(0, 15, 20);
                const cameraOffset = relativeCameraOffset.applyMatrix4(cart.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(cart.position);

                // Win Condition
                const distanceToTarget = cart.position.distanceTo(s5Zone.position);
                if (distanceToTarget < 4.0 && heldPackage) {
                    gameWon = true;
                    uiText.innerText = "Delivery Complete! Good job.";
                    uiText.style.color = "#00ff00";
                    actionBtn.style.display = 'none'; 
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
