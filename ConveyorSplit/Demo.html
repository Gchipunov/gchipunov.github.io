<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Conveyor Sortation System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .color-box { width: 15px; height: 15px; margin-right: 10px; border: 1px solid #fff; }
    </style>
</head>
<body>

<div id="info">
    <h3>Logistics Sorting Center</h3>
    <p>Logic: A & B are diverted to C & D lanes.</p>
    <div class="legend-item"><div class="color-box" style="background: #ff4444;"></div> Type A (To C)</div>
    <div class="legend-item"><div class="color-box" style="background: #ffaa00;"></div> Type B (To D)</div>
    <div class="legend-item"><div class="color-box" style="background: #4444ff;"></div> Others (E, G, H, J)</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- Configuration ---
    const BELT_SPEED = 0.05;
    const SPAWN_RATE = 1500; // ms
    const types = ['A', 'B', 'C', 'D', 'E', 'G', 'H', 'J'];
    const packages = [];

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(10, 12, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- Lights ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // --- Environment (Belts) ---
    function createBelt(width, length, color = 0x333333) {
        const geometry = new THREE.BoxGeometry(width, 0.2, length);
        const material = new THREE.MeshPhongMaterial({ color });
        const belt = new THREE.Mesh(geometry, material);
        belt.receiveShadow = true;
        return belt;
    }

    // Main Belt
    const mainBelt = createBelt(2, 30);
    scene.add(mainBelt);

    // Divert Arm Path (Side Belt)
    const divertBelt = createBelt(10, 2, 0x444444);
    divertBelt.position.set(5, 0, 2);
    scene.add(divertBelt);

    // Destination Belts (C and D)
    const beltC = createBelt(2, 10, 0x224422);
    beltC.position.set(6, 0, 8);
    scene.add(beltC);

    const beltD = createBelt(2, 10, 0x442222);
    beltD.position.set(10, 0, 8);
    scene.add(beltD);

    // --- Package Logic ---
    class Package {
        constructor() {
            this.type = types[Math.floor(Math.random() * types.length)];
            const geometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            
            let color = 0x4444ff; // Default
            if (this.type === 'A') color = 0xff4444;
            if (this.type === 'B') color = 0xffaa00;

            const material = new THREE.MeshPhongMaterial({ color });
            this.mesh = new THREE.Mesh(geometry, material);
            this.mesh.castShadow = true;
            this.mesh.position.set(0, 0.5, -15);
            
            this.state = 'MAIN_BELT'; // Pathing state
            scene.add(this.mesh);
        }

        update() {
            switch(this.state) {
                case 'MAIN_BELT':
                    this.mesh.position.z += BELT_SPEED;
                    // Check for diversion (A or B)
                    if ((this.type === 'A' || this.type === 'B') && this.mesh.position.z >= 2) {
                        this.state = 'DIVERTING';
                    }
                    break;

                case 'DIVERTING':
                    this.mesh.position.x += BELT_SPEED;
                    // Move to specific lane based on A or B
                    if (this.type === 'A' && this.mesh.position.x >= 6) this.state = 'LANE_C';
                    if (this.type === 'B' && this.mesh.position.x >= 10) this.state = 'LANE_D';
                    break;

                case 'LANE_C':
                case 'LANE_D':
                    this.mesh.position.z += BELT_SPEED;
                    break;
            }

            // Cleanup
            if (this.mesh.position.z > 15 || this.mesh.position.x > 15) {
                this.destroy();
            }
        }

        destroy() {
            scene.remove(this.mesh);
            packages.splice(packages.indexOf(this), 1);
        }
    }

    // --- Spawn Loop ---
    setInterval(() => {
        packages.push(new Package());
    }, SPAWN_RATE);

    // --- Animation Loop ---
    function animate() {
        requestAnimationFrame(animate);
        
        packages.forEach(pkg => pkg.update());

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
